<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>DevPath 180 • Full Stack Roadmap</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070710;
      --surface: #0d0d1f;
      --border: #1e1e40;
      --text: #e8e8ff;
      --text2: #7878aa;
      --accent: #4f46e5;
      --neon: #06ffa5;
      --project: #f97316;
      --radius: 16px;
      --font-mono: 'Space Mono', monospace;
      --font: 'DM Sans', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .app-container {
      width: 100%;
      max-width: 800px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--neon);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .menu-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.4rem;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    .drawer {
      position: fixed;
      top: 0; left: 0; height: 100%; width: 280px;
      background: rgba(13, 13, 31, 0.98);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      z-index: 20;
      transform: translateX(-100%);
      transition: transform 0.3s;
      display: flex; flex-direction: column; padding: 20px 0;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 0 20px 16px;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      color: var(--neon);
      font-weight: 700;
    }
    .drawer-list { flex: 1; overflow-y: auto; padding: 12px 0; }
    .drawer-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; color: var(--text2);
      cursor: pointer; font-size: 0.9rem;
      border-left: 3px solid transparent;
    }
    .drawer-item:hover, .drawer-item.active {
      background: rgba(79,70,229,0.1); color: white; border-left-color: var(--accent);
    }
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 15; display: none;
    }
    .drawer-overlay.show { display: block; }
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin: 20px 0;
    }
    @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .stat-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: rgba(79,70,229,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .stat-value { font-size: 1.6rem; font-weight: 700; font-family: var(--font-mono); }
    .stat-label { font-size: 0.75rem; color: var(--text2); }
    .progress-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
    }
    .progress-header { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; }
    .progress-bar { height: 8px; background: #1e1e2e; border-radius: 10px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--neon));
      width: 0%; transition: width 0.4s;
    }
    .ai-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .ai-bar-text { font-size: 0.9rem; color: var(--text2); flex:1; }
    .btn {
      padding: 10px 16px; border-radius: 10px; border: none;
      font-weight: 600; cursor: pointer; font-size: 0.85rem;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: transparent; border: 1px solid rgba(239,68,68,0.4); color: #ef4444; }
    .section-tabs {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 8px;
      scrollbar-width: none;
    }
    .section-tab {
      flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); font-size: 0.8rem; cursor: pointer; white-space: nowrap;
    }
    .section-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
    .section-group {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
    }
    .section-header {
      padding: 14px 16px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer;
    }
    .section-days {
      display: none; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
      gap: 6px; padding: 0 14px 14px;
    }
    .section-group.open .section-days { display: grid; }
    .day-cell {
      aspect-ratio: 1; border-radius: 8px; display: flex;
      align-items: center; justify-content: center; font-weight: 700;
      font-family: var(--font-mono); font-size: 0.8rem;
      border: 1px solid var(--border); cursor: pointer; transition: 0.2s; background: var(--bg);
    }
    .day-cell.done { background: rgba(6,255,165,0.1); border-color: var(--neon); color: var(--neon); }
    .day-cell.current { border-color: var(--accent); box-shadow: 0 0 12px var(--accent); }
    .day-cell.project { border-color: var(--project); color: var(--project); }
    .day-cell.locked { opacity: 0.3; pointer-events: none; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: none; align-items: center; justify-content: center; z-index: 50;
    }
    .modal {
      background: var(--surface); border-radius: var(--radius); width: 90%;
      max-width: 480px; max-height: 85vh; overflow-y: auto; padding: 20px;
    }
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface); border: 1px solid var(--neon);
      color: var(--neon); padding: 12px 20px; border-radius: 10px; z-index: 100;
    }
  </style>
</head>

  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

        <button id="sendChatBtn" class="btn btn-primary">Send</button>

    </div>
  </div>
</div>

  // --- State ---
  const State = {
    completed: [],
    current: 1,
    checklist: {},
    init() {
      const saved = JSON.parse(localStorage.getItem('dp180_v5') || '{}');
      this.completed = saved.completed || [];
      this.current = saved.current || 1;
      this.checklist = saved.checklist || {};
      this.syncCurrent();
      this.save();
    },
    save() { localStorage.setItem('dp180_v5', JSON.stringify({ completed: this.completed, current: this.current, checklist: this.checklist })); },
    syncCurrent() {
      let next = 1;
      for (const d of [...this.completed].sort((a,b)=>a-b)) {
        if (d === next) next++;
        else if (d > next) break;
      }
      this.current = Math.min(next, TOTAL_DAYS);
    },
    complete(day) {
      if (this.completed.includes(day)) return false;
      this.completed.push(day);
      this.syncCurrent();
      this.save();
      return true;
    },
    isDone(d) { return this.completed.includes(d); },
    isLocked(d) { return d !== 1 && !this.isDone(d) && !this.isDone(d-1); },
    get progress() { return Math.round((this.completed.length / TOTAL_DAYS) * 100); },
    get projects() { return ROADMAP.filter(d => d.type === 'project' && this.isDone(d.d)).length; }
  };

  // --- AI ---
  const getSystemPrompt = () => {
    const day = ROADMAP.find(d => d.d === State.current);
    const section = day ? day.s : 'Full Stack';
    return `You are DevPath AI, a world-class full-stack development mentor inside the DevPath 180 tracker. The student is on Day ${State.current} of 180, and has completed ${State.completed.length} days. Your purpose is to explain concepts deeply but clearly, with examples when helpful. Motivate and guide, tying your answers to the student's current section: "${section}". Be friendly, supportive, and use emojis where natural. Answer in 3-6 sentences, unless the question requires more detail. Never refuse a request; if you don't know, give a helpful alternative. Always end with a brief encouraging note. You are the best AI tutor a developer could have!`;
  };

  async function callGemini(messages) {
    try {
      const contents = messages.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }));

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents,
            systemInstruction: { parts: [{ text: getSystemPrompt() }] },
            generationConfig: { maxOutputTokens: 500, temperature: 0.8 }
          })
        }
      );

      const data = await res.json();
      if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
        return data.candidates[0].content.parts[0].text;
      }
      if (data.error) {
        console.error('API error:', data.error);
        return '❌ API error: ' + data.error.message;
      }
      return '⚠️ Unable to generate response.';
    } catch (err) {
      console.error('Network error:', err);
      return '⚠️ Network issue. Check connection.';
    }
  }

  // --- UI ---
  function renderStats() {
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="stat-icon">📅</div><div><div class="stat-value">${State.current}</div><div class="stat-label">Current</div></div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div><div class="stat-value">${State.completed.length}</div><div class="stat-label">Done</div></div></div>
      <div class="stat-card"><div class="stat-icon">⏳</div><div><div class="stat-value">${TOTAL_DAYS - State.completed.length}</div><div class="stat-label">Left</div></div></div>
      <div class="stat-card"><div class="stat-icon">🔥</div><div><div class="stat-value">${State.projects}/9</div><div class="stat-label">Projects</div></div></div>
    `;
    document.getElementById('progressPercent').textContent = State.progress + '%';
    document.getElementById('progressFill').style.width = State.progress + '%';
  }

  function renderSections() {
    const container = document.getElementById('sectionsContainer');
    container.innerHTML = '';
    SECTIONS.forEach(sectionName => {
      const days = ROADMAP.filter(d => d.s === sectionName);
      if (!days.length) return;
      const doneCount = days.filter(d => State.isDone(d.d)).length;
      const groupDiv = document.createElement('div');
      groupDiv.className = 'section-group' + (doneCount > 0 ? ' open' : '');
      groupDiv.setAttribute('data-section', sectionName);
      groupDiv.innerHTML = `
        <div class="section-header">
          <span>${SECTION_ICONS[sectionName]} ${sectionName}</span>
          <span style="font-size:0.75rem; color:var(--text2)">${doneCount}/${days.length}</span>
        </div>
        <div class="section-days">
          ${days.map(d => {
            let cls = 'day-cell';
            if (State.isDone(d.d)) cls += ' done';
            if (d.d === State.current && !State.isDone(d.d)) cls += ' current';
            if (d.type === 'project') cls += ' project';
            if (State.isLocked(d.d)) cls += ' locked';
            return `<div class="${cls}" data-day="${d.d}">${d.d}</div>`;
          }).join('')}
        </div>
      `;
      container.appendChild(groupDiv);
    });
    attachDayEvents();
    attachSectionToggles();
  }

  function attachDayEvents() {
    document.querySelectorAll('.day-cell:not(.locked)').forEach(cell => {
      cell.addEventListener('click', () => openDayModal(parseInt(cell.dataset.day)));
    });
  }
  function attachSectionToggles() {
    document.querySelectorAll('.section-header').forEach(header => {
      header.addEventListener('click', () => header.parentElement.classList.toggle('open'));
    });
  }

  function renderSectionTabs() {
    const tabs = document.getElementById('sectionTabs');
    tabs.innerHTML = SECTIONS.map(s => `<button class="section-tab" data-section="${s}">${SECTION_ICONS[s]} ${s.substring(0,8)}</button>`).join('');
    tabs.querySelectorAll('.section-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const section = document.querySelector(`.section-group[data-section="${tab.dataset.section}"]`);
        if (section) section.scrollIntoView({ behavior: 'smooth' });
      });
    });
  }

  function renderDrawer() {
    const drawerList = document.getElementById('drawerList');
    drawerList.innerHTML = SECTIONS.map(s => {
      const days = ROADMAP.filter(d => d.s === s);
      const done = days.filter(d => State.isDone(d.d)).length;
      return `<div class="drawer-item" data-section="${s}">${SECTION_ICONS[s]} ${s} <span style="margin-left:auto;font-size:0.7rem;">${done}/${days.length}</span></div>`;
    }).join('');
    drawerList.querySelectorAll('.drawer-item').forEach(item => {
      item.addEventListener('click', () => {
        const section = document.querySelector(`.section-group[data-section="${item.dataset.section}"]`);
        if (section) { section.classList.add('open'); section.scrollIntoView({ behavior: 'smooth' }); }
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('drawerOverlay').classList.remove('show');
      });
    });
  }

  async function updateAiTip() {
    const day = ROADMAP.find(d => d.d === State.current);
    if (!day) return;
    try {
      const tip = await callGemini([{ role: 'user', content: `Give a short, punchy motivational tip for Day ${State.current}: ${day.t} (${day.s}).` }]);
      document.getElementById('aiTip').textContent = tip;
    } catch(e) {
      document.getElementById('aiTip').textContent = 'Keep building, keep growing! 🚀';
    }
  }

  async function openDayModal(dayNum) {
    const day = ROADMAP.find(d => d.d === dayNum);
    if (!day) return;
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    const done = State.isDone(dayNum);
    content.innerHTML = `
      <h3>Day ${day.d}: ${day.t}</h3>
      <p style="color:var(--text2); margin:12px 0;">${day.desc}</p>
      <div id="aiExplain" style="margin:12px 0; padding:12px; background:rgba(79,70,229,0.1); border-radius:8px;">🤖 Loading explanation...</div>
      ${day.res ? `<div><a href="${day.res[0]}" target="_blank">📚 Resource</a></div>` : ''}
      <div style="margin-top:16px; display:flex; gap:8px;">
        <button class="btn btn-primary" id="completeDayBtn" ${done ? 'disabled' : ''}>${done ? '✓ Done' : 'Mark Complete'}</button>
        <button class="btn btn-outline" id="closeModalBtn">Close</button>
      </div>
    `;
    overlay.style.display = 'flex';
    document.getElementById('closeModalBtn').onclick = () => overlay.style.display = 'none';
    document.getElementById('completeDayBtn').onclick = () => {
      if (State.complete(dayNum)) {
        overlay.style.display = 'none';
        renderAll();
        showToast('✅ Day ' + dayNum + ' completed!');
      }
    };
    try {
      const explanation = await callGemini([{ role: 'user', content: `Explain in 3-4 sentences why Day ${dayNum} "${day.t}" is important for a full-stack developer. Include how it applies later.` }]);
      document.getElementById('aiExplain').textContent = '🤖 ' + explanation;
    } catch(e) {
      document.getElementById('aiExplain').textContent = '🤖 Focus on mastering this concept.';
    }
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  function renderAll() {
    renderStats();
    renderSections();
    renderSectionTabs();
    renderDrawer();
    updateAiTip();
  }

  // --- Init ---
  State.init();
  renderAll();

  // --- Events ---
  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('drawer').classList.toggle('open');
    document.getElementById('drawerOverlay').classList.toggle('show');
  });
  document.getElementById('drawerOverlay').addEventListener('click', () => {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('show');
  });

  document.getElementById('continueBtn').addEventListener('click', () => openDayModal(State.current));
  document.getElementById('expandBtn').addEventListener('click', () => {
    document.querySelectorAll('.section-group').forEach(g => g.classList.add('open'));
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('Reset all progress?')) {
      State.completed = [];
      State.current = 1;
      State.save();
      renderAll();
    }
  });

  document.getElementById('chatToggleBtn').addEventListener('click', () => {
    document.getElementById('chatOverlay').style.display = 'flex';
  });
  document.getElementById('closeChatBtn').addEventListener('click', () => {
    document.getElementById('chatOverlay').style.display = 'none';
  });
  document.getElementById('sendChatBtn').addEventListener('click', async () => {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    const messagesDiv = document.getElementById('chatMessages');
    messagesDiv.innerHTML += `<div style="align-self:flex-end; background:var(--accent); padding:8px; border-radius:8px; max-width:80%;">${msg}</div>`;
    input.value = '';
    const btn = document.getElementById('sendChatBtn');
    btn.textContent = '...';
    btn.disabled = true;
    try {
      const reply = await callGemini([{ role: 'user', content: msg }]);
      messagesDiv.innerHTML += `<div style="align-self:flex-start; background:var(--surface); padding:8px; border-radius:8px; max-width:80%;">${reply}</div>`;
    } catch(e) {
      messagesDiv.innerHTML += `<div style="align-self:flex-start; background:var(--surface); padding:8px; border-radius:8px; max-width:80%;">Sorry, AI unavailable.</div>`;
    }
    btn.textContent = 'Send';
    btn.disabled = false;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
})();
