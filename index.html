<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevPath 180 • Full Stack Learning Path</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #000;
      --card: #1a1a24;
      --border: #2a2a36;
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --accent2: #409cff;
      --green: #30d158;
      --red: #ff453a;
      --orange: #ff9f0a;
      --radius: 14px;
      --radius-lg: 22px;
      --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      --shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: auto;
      -webkit-font-smoothing: antialiased;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .app-container {
      width: 100%; max-width: 800px; margin: 0 auto;
      padding: 0 16px; display: flex; flex-direction: column; min-height: 100%;
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== LOGIN SCREEN ===== */
    .login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; padding: 40px 20px;
    }
    .login-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .login-title { font-size: 1.6rem; font-weight: 700; text-align: center; color: var(--accent); }
    .input-field {
      background: #1c1c2e; border: 1px solid var(--border); color: var(--text);
      padding: 12px 16px; border-radius: 12px; font-size: 1rem; outline: none;
    }
    .error-msg { color: var(--red); font-size: 0.85rem; text-align: center; min-height: 20px; }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; position: sticky; top: 0; background: var(--bg);
      z-index: 10; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-weight: 700; font-size: 1.2rem; color: var(--green); text-decoration: none; }
    .logo-icon { width: 28px; height: 28px; }
    .top-actions { display: flex; align-items: center; gap: 8px; }
    .lang-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
    .notes-link { background: var(--card); border: 1px solid var(--border); color: var(--accent); padding: 8px 14px; border-radius: 10px; text-decoration: none; font-size: 0.85rem; }
    .menu-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 1.4rem; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
    .logout-btn { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 500; }

    /* ===== DRAWER ===== */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.35s; backdrop-filter: blur(4px); }
    .drawer-overlay.show { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 88vw; max-width: 340px; background: #111118; z-index: 60; transform: translateX(-100%); transition: transform 0.35s; display: flex; flex-direction: column; border-right: 1px solid var(--border); padding: 20px 0; }
    .drawer.open { transform: translateX(0); }
    .drawer-header { padding: 0 20px 16px; border-bottom: 1px solid var(--border); font-family: var(--mono); color: var(--green); font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .drawer-list { flex: 1; overflow-y: auto; padding: 12px 0; }
    .drawer-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: var(--secondary); cursor: pointer; border-left: 3px solid transparent; }
    .drawer-item:hover, .drawer-item.active { background: rgba(10,132,255,0.08); color: var(--text); border-left-color: var(--accent); }

    /* ===== STATS ===== */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
    @media(min-width:600px){ .stats-grid{ grid-template-columns: repeat(4,1fr); } }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 12px; }
    .stat-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(10,132,255,0.12); display: flex; align-items: center; justify-content: center; }
    .stat-value { font-size: 1.6rem; font-weight: 700; font-family: var(--mono); }
    .stat-label { font-size: 0.75rem; color: var(--secondary); }

    /* ===== PROGRESS ===== */
    .progress-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
    .progress-header { display: flex; justify-content: space-between; }
    .progress-bar { height: 6px; background: #1c1c2e; border-radius: 10px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 10px; width: 0%; transition: width 0.4s; }

    /* ===== BUTTONS ===== */
    .btn { padding: 10px 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .btn svg { width: 18px; height: 18px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:active { background: var(--accent2); }
    .btn-outline { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: transparent; border: 1px solid rgba(255,69,58,0.3); color: var(--red); }

    /* ===== SECTIONS ===== */
    .section-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; }
    .section-tab { flex-shrink: 0; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--secondary); cursor: pointer; font-size: 0.8rem; }
    .section-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .section-group { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .section-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-weight: 600; }
    .section-days { display: none; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 6px; padding: 0 14px 14px; }
    .section-group.open .section-days { display: grid; }
    .day-cell { aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: var(--mono); font-size: 0.8rem; border: 1px solid var(--border); cursor: pointer; background: var(--bg); color: var(--secondary); }
    .day-cell.done { background: rgba(48,209,88,0.1); border-color: var(--green); color: var(--green); }
    .day-cell.current { border-color: var(--accent); box-shadow: 0 0 12px var(--accent); color: #fff; }
    .day-cell.project { border-color: var(--orange); color: var(--orange); }
    .day-cell.locked { opacity: 0.25; pointer-events: none; }

    /* ===== MODAL ===== */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 50; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 90%; max-width: 480px; padding: 20px; }

    /* ===== TOAST ===== */
    .toast-panel { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 200; }
    .toast { background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 20px; font-weight: 500; animation: toastIn 0.4s ease; }
    @keyframes toastIn { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:none} }

    @media(min-width:769px){ .drawer{position:relative;transform:none;width:260px} .drawer-overlay{display:none} .menu-btn{display:none} .app-container{flex-direction:row;max-width:1000px;padding:0} .main-content{flex:1;padding:0 20px 20px;overflow-y:auto} }
    @media(max-width:768px){ .drawer{width:85vw} }
  </style>
</head>
<body>
<div class="app-container" id="app">

  <!-- ═══ LOGIN SCREEN ═══ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-title">DevPath 180</div>
      <input type="email" class="input-field" id="emailInput" placeholder="Email" autocomplete="email">
      <input type="password" class="input-field" id="passwordInput" placeholder="Password" autocomplete="current-password">
      <div class="error-msg" id="loginError"></div>
      <button class="btn btn-primary" id="loginBtn">Sign In</button>
      <button class="btn btn-outline" id="registerBtn">Create Account</button>
    </div>
  </div>

  <!-- ═══ MAIN CONTENT (hidden until login) ═══ -->
  <div id="mainWrapper" style="display:none;flex:1;flex-direction:column;">
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span data-i18n="sections_title">Sections</span>
      </div>
      <div class="drawer-list" id="drawerList"></div>
    </aside>

    <main class="main-content" id="mainContent">
      <div class="top-bar">
        <a href="index.html" class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="8" y1="11" x2="20" y2="11"/><polyline points="14 17 20 11 14 5"/></svg>
          DevPath 180
        </a>
        <div class="top-actions">
          <span class="user-email" id="userEmail" style="font-size:0.8rem;color:var(--secondary);"></span>
          <a href="notes.html" class="notes-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Notes
          </a>
          <button class="lang-btn" id="langToggle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
            <span id="langLabel">English</span>
          </button>
          <button class="logout-btn" id="logoutBtn">Logout</button>
          <button class="menu-btn" id="menuBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="stats-grid" id="stats"></div>
      <div class="progress-section">
        <div class="progress-header"><span data-i18n="progress_label">Progress</span><span id="progressPercent">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="continueBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg><span data-i18n="continue_btn">Continue</span></button>
        <button class="btn btn-outline" id="expandBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg><span id="expandBtnText" data-i18n="expand_btn">Expand All</span></button>
        <button class="btn btn-danger" id="resetBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg><span data-i18n="reset_btn">Reset</span></button>
      </div>
      <div class="section-tabs" id="sectionTabs"></div>
      <div id="sectionsContainer"></div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div class="toast-panel" id="toastPanel"></div>

<script>
(function() {
  // ═══ Firebase Config ═══
  const firebaseConfig = {
    apiKey: "AIzaSyAszFGDs1J92_53jHvj5aABmeiKZdc-mf0",
    authDomain: "gen-lang-client-0501601606.firebaseapp.com",
    projectId: "gen-lang-client-0501601606",
    storageBucket: "gen-lang-client-0501601606.firebasestorage.app",
    messagingSenderId: "1079712784218",
    appId: "1:1079712784218:web:598465155aa70938a6dd63",
    measurementId: "G-CRHRGYX74V"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const TOTAL_DAYS = 180;
  const SECTIONS = [/* ... نفس الأقسام ... */];
  const SECTION_ICONS = {/* ... نفس الرموز ... */};
  const STAT_ICONS = {/* ... نفس الرموز ... */};
  const ROADMAP = [/* ... نفس الـ 180 يوم ... */];
  const i18n = {/* ... نفس الترجمة ... */};

  let completedDays = [], currentDay = 1, expandedAll = false;
  let lang = localStorage.getItem('devpath_lang') || 'en';
  const $ = (id) => document.getElementById(id);
  function t(key) { return i18n[lang][key] || key; }

  // ═══ Auth ═══
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      $('loginScreen').style.display = 'none';
      $('mainWrapper').style.display = 'flex';
      $('userEmail').textContent = user.email;
      await loadProgress();
    } else {
      $('loginScreen').style.display = 'flex';
      $('mainWrapper').style.display = 'none';
    }
  });

  $('loginBtn').addEventListener('click', async () => {
    try {
      await auth.signInWithEmailAndPassword($('emailInput').value, $('passwordInput').value);
      $('loginError').textContent = '';
    } catch(e) { $('loginError').textContent = e.message; }
  });
  $('registerBtn').addEventListener('click', async () => {
    try {
      await auth.createUserWithEmailAndPassword($('emailInput').value, $('passwordInput').value);
      $('loginError').textContent = '';
    } catch(e) { $('loginError').textContent = e.message; }
  });
  $('logoutBtn').addEventListener('click', () => auth.signOut());

  // ═══ Firestore ═══
  async function loadProgress() {
    const doc = await db.collection('users').doc(auth.currentUser.uid).get();
    if (doc.exists && doc.data().progress) {
      const p = doc.data().progress;
      completedDays = p.completedDays || [];
      currentDay = p.currentDay || 1;
    } else {
      completedDays = []; currentDay = 1;
    }
    renderAll();
  }
  async function saveProgress() {
    if (!auth.currentUser) return;
    await db.collection('users').doc(auth.currentUser.uid).set({
      progress: { completedDays, currentDay }
    }, { merge: true });
  }

  function complete(day) {
    if (completedDays.includes(day)) return false;
    completedDays.push(day); completedDays.sort((a,b)=>a-b);
    let next = 1;
    for (let d of completedDays) { if (d===next) next++; else break; }
    currentDay = Math.min(next, TOTAL_DAYS);
    saveProgress(); renderAll();
    return true;
  }
  function uncomplete(day) {
    const idx = completedDays.indexOf(day);
    if (idx===-1) return false;
    completedDays.splice(idx,1);
    let next = 1;
    for (let d of completedDays) { if (d===next) next++; else break; }
    currentDay = Math.min(next, TOTAL_DAYS);
    saveProgress(); renderAll();
    return true;
  }
  function isDone(d){ return completedDays.includes(d); }
  function isLocked(d){ return d!==1 && !isDone(d) && !isDone(d-1); }
  function projectsDone(){ return ROADMAP.filter(d=>d.type==='project' && isDone(d.d)).length; }

  function renderAll() { renderStats(); renderSections(); renderSectionTabs(); renderDrawer(); }
  function renderStats() { /* ... same ... */ }
  function renderSections() { /* ... same ... */ }
  function renderSectionTabs() { /* ... same ... */ }
  function renderDrawer() { /* ... same ... */ }

  // ═══ Language ═══
  function applyLanguage() {
    document.documentElement.lang = lang;
    $('langLabel').textContent = lang==='ar'?'العربية':'English';
    document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
    renderAll();
  }
  $('langToggle').addEventListener('click',()=>{
    lang = lang==='ar'?'en':'ar';
    localStorage.setItem('devpath_lang',lang);
    applyLanguage();
  });

  function getTitle(day){ return (lang==='ar'?day.t:day.t_en) || day.t; }
  function getDesc(day){ return (lang==='ar'?day.desc:day.desc_en) || day.desc; }

  function openDayModal(dayNum){ /* ... same ... */ }
  function toast(msg){ /* ... same ... */ }

  // ═══ Events ═══
  $('menuBtn').addEventListener('click',()=>{$('drawer').classList.toggle('open');$('drawerOverlay').classList.toggle('show');});
  $('drawerOverlay').addEventListener('click',()=>{$('drawer').classList.remove('open');$('drawerOverlay').classList.remove('show');});
  $('continueBtn').addEventListener('click',()=>openDayModal(currentDay));
  $('expandBtn').addEventListener('click',()=>{expandedAll=!expandedAll;$('expandBtnText').textContent=expandedAll?t('collapse_btn'):t('expand_btn');renderSections();});
  $('resetBtn').addEventListener('click',()=>{if(confirm(t('reset_confirm'))){completedDays=[];currentDay=1;saveProgress();renderAll();}});

  applyLanguage();
})();
</script>
</body>
</html>
