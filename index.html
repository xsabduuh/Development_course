<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DevPath 180 – مسار تعلم البرمجة</title>
  <style>
    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --border: #2a2a3a;
      --text: #e0e0e0;
      --text-secondary: #a0a0b8;
      --accent: #6c5ce7;
      --accent-glow: #8b7cf0;
      --success: #2ecc71;
      --danger: #e74c3c;
      --project: #ff6b6b;
      --radius: 12px;
      --transition: 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* شريط التنقل العلوي */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo { font-size: 1.2rem; font-weight: 700; color: var(--accent-glow); text-decoration: none; display: flex; align-items: center; gap: 6px; }
    .nav-links { display: flex; gap: 8px; }
    .btn {
      padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all var(--transition); text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .btn:hover { background: rgba(108, 92, 231, 0.1); border-color: var(--accent); }
    .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-glow); }
    .btn.danger { color: var(--danger); border-color: var(--danger); }
    .btn.danger:hover { background: rgba(231, 76, 60, 0.1); }

    .container { max-width: 1000px; width: 100%; margin: 0 auto; padding: 16px; flex: 1; }

    /* الإحصائيات */
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; display: flex; align-items: center; gap: 10px;
    }
    .stat-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .stat-info .value { font-size: 1.4rem; font-weight: 700; }
    .stat-info .label { font-size: 0.7rem; color: var(--text-secondary); }

    /* شريط التقدم */
    .progress-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; margin-bottom: 20px;
    }
    .progress-header { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; }
    .progress-bar { height: 10px; background: #1e1e2e; border-radius: 20px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, #6c5ce7, #8b7cf0); transition: width 0.4s ease; }

    /* أزرار التصفية */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary); cursor: pointer;
      font-size: 0.8rem; font-weight: 500; transition: all var(--transition);
    }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* الأقسام القابلة للطي */
    .section {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 10px; overflow: hidden;
    }
    .section-header {
      padding: 14px 16px; cursor: pointer; display: flex; align-items: center;
      justify-content: space-between; font-weight: 600; font-size: 0.9rem; user-select: none;
    }
    .section-header:hover { background: rgba(255,255,255,0.03); }
    .section-title { display: flex; align-items: center; gap: 6px; }
    .section-arrow { transition: transform 0.3s; }
    .section.open .section-arrow { transform: rotate(180deg); }

    .days-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
      gap: 6px; padding: 0 12px; max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s;
    }
    .section.open .days-grid {
      max-height: 2000px; padding: 8px 12px 14px; border-top: 1px solid var(--border);
    }

    /* خلايا الأيام */
    .day-cell {
      aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; border: 1px solid var(--border);
      background: var(--bg); color: var(--text-secondary); cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .day-cell:active { transform: scale(0.95); }
    .day-cell.completed { background: rgba(46,204,113,0.2); border-color: var(--success); color: var(--success); }
    .day-cell.completed::after { content: '✓'; font-size: 0.5rem; position: absolute; top: 2px; right: 3px; }
    .day-cell.current { border-color: var(--accent-glow); box-shadow: 0 0 12px rgba(108,92,231,0.5); color: white; }
    .day-cell.locked { opacity: 0.4; pointer-events: none; }
    .day-cell.project { border-color: var(--project); background: rgba(255,107,107,0.1); color: var(--project); }
    .day-cell.hidden { display: none !important; }

    /* المودال */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto;
    }
    .modal h3 { margin-bottom: 8px; }
    .modal .resources { margin-top: 12px; font-size: 0.8rem; }
    .modal .resources a { color: var(--accent-glow); }

    @media (min-width: 768px) {
      .container { padding: 20px 24px; }
      .btn { padding: 10px 20px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">🛤️ DevPath 180</a>
    <div class="nav-links">
      <button class="btn primary" id="continueBtn">▶️ استمر</button>
      <button class="btn" id="jumpBtn">📍 اليوم الحالي</button>
      <button class="btn danger" id="resetBtn">🔄 إعادة</button>
    </div>
  </nav>

  <main class="container">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="progress-box">
      <div class="progress-header">
        <span>التقدم العام</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">الكل</button>
      <button class="filter-btn" data-filter="completed">✅ مكتمل</button>
      <button class="filter-btn" data-filter="pending">⏳ قيد الانتظار</button>
    </div>

    <div id="sectionsContainer"></div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal"></div>
  </div>

  <script>
    // ====================== 1. البيانات الكاملة (180 يوم) ======================
    const roadmap = [
      // HTML (1–10)
      { day: 1, title: 'مقدمة إلى تطوير الويب', section: 'HTML', type: 'learning',
        desc: 'فهم كيفية عمل الويب: العملاء، الخوادم، HTTP، المتصفحات، ودور HTML و CSS و JavaScript. إعداد بيئة التطوير باستخدام VS Code ومتصفح.',
        resources: ['https://developer.mozilla.org/ar/docs/Learn/Getting_started_with_the_web'] },
      { day: 2, title: 'هيكل مستند HTML', section: 'HTML', type: 'learning',
        desc: 'تعلم البنية الأساسية لمستند HTML: !DOCTYPE, html, head, body. فهم الوسوم الوصفية والعنوان وربط الملفات الخارجية.' },
      { day: 3, title: 'العناصر النصية والعناوين', section: 'HTML', type: 'learning',
        desc: 'إتقان العناوين (h1–h6)، الفقرات، الامتدادات، فواصل الأسطر، الخطوط الأفقية، ووسوم التنسيق مثل strong و em و mark و small.' },
      { day: 4, title: 'الروابط والصور', section: 'HTML', type: 'learning',
        desc: 'إنشاء ارتباطات تشعبية باستخدام وسم a (المسارات المطلقة مقابل النسبية، target="_blank"). تضمين الصور باستخدام img، وفهم src و alt والصور المتجاوبة.' },
      { day: 5, title: 'القوائم والجداول', section: 'HTML', type: 'learning',
        desc: 'بناء قوائم مرتبة وغير مرتبة، قوائم متداخلة. إنشاء جداول باستخدام table, thead, tbody, tr, th, td، وتعلم colspan/rowspan.' },
      { day: 6, title: 'النماذج وعناصر الإدخال', section: 'HTML', type: 'learning',
        desc: 'بناء نماذج باستخدام form، أنواع الإدخال المختلفة (text, email, password, number, date)، textarea، select، radio، checkbox، وزر الإرسال.' },
      { day: 7, title: 'HTML الدلالي (Semantic HTML)', section: 'HTML', type: 'learning',
        desc: 'استخدام العناصر الدلالية: header, nav, main, article, section, aside, footer. فهم أهمية الدلالات لتحسين محركات البحث والوصول.' },
      { day: 8, title: 'ميزات HTML5', section: 'HTML', type: 'learning',
        desc: 'استكشاف ميزات HTML5: audio, video, canvas, details/summary, progress, datalist، وعنصر output. تعلم اعتبارات دعم المتصفحات.' },
      { day: 9, title: 'أساسيات الوصول (Accessibility)', section: 'HTML', type: 'learning',
        desc: 'تعلم تسميات ARIA، النص البديل، tabindex، سمات الدور، تخطي التنقل، واستخدام الترميز الصديق لقارئ الشاشة. اجعل الويب شاملاً.' },
      { day: 10, title: '🔥 مشروع: صفحة HTML شخصية', section: 'HTML', type: 'project',
        desc: 'بناء صفحة شخصية كاملة باستخدام HTML فقط. تضمين رأس، قسم "حول"، قائمة مهارات، جدول مشاريع، نموذج اتصال، وتذييل. التركيز على البنية الدلالية والوصول.',
        resources: ['https://www.freecodecamp.org/news/how-to-build-a-developer-portfolio-website/'] },

      // CSS (11–25)
      { day: 11, title: 'تركيب CSS والمحددات', section: 'CSS', type: 'learning',
        desc: 'تعلم تركيب CSS: الخصائص، القيم، والقواعد. إتقان المحددات الأساسية (العنصر، class، ID)، المحددات المركبة (سليل، طفل، شقيق)، والتخصصية.' },
      { day: 12, title: 'الألوان والخلفيات', section: 'CSS', type: 'learning',
        desc: 'العمل مع تنسيقات الألوان (hex, rgb, hsl)، التدرجات (الخطية، الشعاعية)، صور الخلفية، حجم الخلفية، موضع الخلفية، والخلفيات المتعددة.' },
      { day: 13, title: 'نموذج الصندوق (Box Model)', section: 'CSS', type: 'learning',
        desc: 'غوص عميق في margin, border, padding, content. فهم box-sizing: border-box مقابل content-box، وكيفية التحكم في أبعاد العناصر.' },
      { day: 14, title: 'الخطوط والطباعة', section: 'CSS', type: 'learning',
        desc: 'تنسيق النص باستخدام font-family, font-size, font-weight, line-height, letter-spacing, text-align, text-transform، واستيراد خطوط Google.' },
      { day: 15, title: 'العرض والموضع (Display & Positioning)', section: 'CSS', type: 'learning',
        desc: 'إتقان display (block, inline, inline-block, none) والموضع (static, relative, absolute, fixed, sticky). فهم z-index وسياقات التكدس.' },
      { day: 16, title: 'أساسيات Flexbox', section: 'CSS', type: 'learning',
        desc: 'تعلم خصائص حاوية flex: display:flex, flex-direction, justify-content, align-items, flex-wrap, gap. بناء تخطيطات متجاوبة بسهولة.' },
      { day: 17, title: 'Flexbox متقدم', section: 'CSS', type: 'learning',
        desc: 'استكشاف خصائص عنصر flex: flex-grow, flex-shrink, flex-basis, align-self, order. إنشاء تخطيطات مرنة معقدة باستخدام حاويات flex متداخلة.' },
      { day: 18, title: 'أساسيات CSS Grid', section: 'CSS', type: 'learning',
        desc: 'إعداد حاويات الشبكة باستخدام display:grid, grid-template-columns, grid-template-rows, gap، ووضع العناصر باستخدام grid-column و grid-row.' },
      { day: 19, title: 'CSS Grid متقدم', section: 'CSS', type: 'learning',
        desc: 'استخدام مناطق الشبكة، auto-fit/auto-fill، minmax()، وإنشاء تخطيطات معقدة بأسلوب المجلات. دمج Grid مع Flexbox للتحكم النهائي في التخطيط.' },
      { day: 20, title: 'التصميم المتجاوب واستعلامات الوسائط', section: 'CSS', type: 'learning',
        desc: 'كتابة استعلامات الوسائط لتصميم mobile-first. استخدام نقاط التوقف، الوحدات المتجاوبة (vw, vh, %, em, rem)، وجعل التخطيطات تتكيف مع جميع أحجام الشاشات.' },
      { day: 21, title: 'الانتقالات والحركات', section: 'CSS', type: 'learning',
        desc: 'إنشاء انتقالات سلسة باستخدام transition-property, duration, timing-function. بناء حركات الإطارات المفتاحية باستخدام @keyframes وخصائص animation.' },
      { day: 22, title: 'متغيرات CSS والخصائص المخصصة', section: 'CSS', type: 'learning',
        desc: 'تعريف واستخدام خصائص CSS المخصصة (--var). تعلم النطاق، الوراثة، والتخصيص الديناميكي للسمات. بناء مبدل سمة بسيط (فاتح/داكن).' },
      { day: 23, title: 'الفئات الزائفة والعناصر الزائفة', section: 'CSS', type: 'learning',
        desc: 'استخدام :hover, :active, :focus, :nth-child(), :not(), ::before, ::after. إنشاء تلميحات، مربعات اختيار مخصصة، وعناصر زخرفية.' },
      { day: 24, title: 'أفضل ممارسات CSS', section: 'CSS', type: 'learning',
        desc: 'تعلم تسمية BEM، تنظيم أوراق الأنماط، تجنب حروب التخصصية، استخدام إعادة تعيين CSS، ونصائح الأداء مثل تجنب الخصائص المكلفة.' },
      { day: 25, title: '🔥 مشروع: صفحة هبوط متجاوبة', section: 'CSS', type: 'project',
        desc: 'تصميم وبناء صفحة هبوط متجاوبة بالكامل. تضمين قسم رئيسي، شبكة مميزات، جدول أسعار، شهادات، وتذييل. استخدام Flexbox و Grid واستعلامات الوسائط.',
        resources: ['https://www.frontendmentor.io/challenges'] },

      // JavaScript Basics (26–37)
      { day: 26, title: 'مقدمة JavaScript والإعداد', section: 'JavaScript Basics', type: 'learning',
        desc: 'تعلم ما هي JavaScript، وكيفية تضمينها في HTML (داخلية، خارجية). إعداد وحدة تحكم المتصفح وكتابة أول console.log().' },
      { day: 27, title: 'المتغيرات وأنواع البيانات', section: 'JavaScript Basics', type: 'learning',
        desc: 'إعلان المتغيرات باستخدام var, let, const. استكشاف أنواع البيانات الأولية: string, number, boolean, null, undefined, symbol. تعلم أساسيات تحويل الأنواع.' },
      { day: 28, title: 'المعاملات والتعابير', section: 'JavaScript Basics', type: 'learning',
        desc: 'إتقان المعاملات الحسابية، الإسناد، المقارنة، المنطقية، والمعامل الثلاثي. فهم أولويات المعاملات وتقييم الدائرة القصيرة.' },
      { day: 29, title: 'الشروط (if/else/switch)', section: 'JavaScript Basics', type: 'learning',
        desc: 'كتابة المنطق الشرطي باستخدام if, else if, else, switch. تعلم القيم truthy/falsy وأفضل الممارسات للشروط النظيفة.' },
      { day: 30, title: 'الحلقات (for/while)', section: 'JavaScript Basics', type: 'learning',
        desc: 'التكرار باستخدام for, while, do...while, for...of. تعلم break, continue، ومتى تستخدم كل نوع من الحلقات.' },
      { day: 31, title: 'أساسيات الدوال', section: 'JavaScript Basics', type: 'learning',
        desc: 'إعلان الدوال واستدعاؤها. فهم المعاملات، الوسائط، قيم الإرجاع، والفرق بين تعبيرات الدالة وإعلانات الدالة.' },
      { day: 32, title: 'الدوال المتقدمة', section: 'JavaScript Basics', type: 'learning',
        desc: 'استكشاف المعاملات الافتراضية، معاملات rest، دوال callback، ومفهوم الدوال ذات الترتيب الأعلى. مقدمة في النطاق والإغلاقات.' },
      { day: 33, title: 'أساسيات المصفوفات', section: 'JavaScript Basics', type: 'learning',
        desc: 'إنشاء المصفوفات والتعامل معها. الوصول إلى العناصر بالفهرس، استخدام .length، الإضافة/الحذف باستخدام push, pop, shift, unshift, splice.' },
      { day: 34, title: 'طرق المصفوفات', section: 'JavaScript Basics', type: 'learning',
        desc: 'إتقان .map(), .filter(), .reduce(), .forEach(), .find(), .some(), .every(). هذه أساسية لتطوير JavaScript الحديث.' },
      { day: 35, title: 'أساسيات الكائنات', section: 'JavaScript Basics', type: 'learning',
        desc: 'إنشاء كائنات ذات خصائص وطرق. الوصول إلى القيم باستخدام الترميز النقطي والأقواس المربعة. تعلم إضافة وتحديث وحذف خصائص الكائن.' },
      { day: 36, title: 'طرق الكائن و "this"', section: 'JavaScript Basics', type: 'learning',
        desc: 'فهم الكلمة المفتاحية "this" في سياقات مختلفة. تعلم Object.keys(), Object.values(), Object.entries()، وتفكيك الكائنات.' },
      { day: 37, title: 'أساسيات التعامل مع DOM', section: 'JavaScript Basics', type: 'learning',
        desc: 'اختيار العناصر باستخدام querySelector و querySelectorAll. تغيير النص، HTML، الأنماط، والسمات. إنشاء وإضافة عناصر جديدة ديناميكيًا.' },

      // Practice (38–45)
      { day: 38, title: 'أحداث DOM', section: 'Practice', type: 'learning',
        desc: 'التعامل مع أحداث click, submit, input, change, keydown، وغيرها. استخدام addEventListener وفهم فقاعات الأحداث والتفويض.' },
      { day: 39, title: 'التحقق من صحة النماذج', section: 'Practice', type: 'learning',
        desc: 'التحقق من صحة مدخلات النموذج باستخدام JavaScript. التحقق من الحقول الفارغة، تنسيق البريد الإلكتروني، قوة كلمة المرور. عرض رسائل خطأ مخصصة.' },
      { day: 40, title: 'مقدمة في التخزين المحلي', section: 'Practice', type: 'learning',
        desc: 'استخدام localStorage.setItem(), getItem(), removeItem(). تخزين واسترجاع تفضيلات المستخدم. فهم JSON.stringify و JSON.parse للكائنات.' },
      { day: 41, title: 'بناء تطبيق عداد', section: 'Practice', type: 'learning',
        desc: 'إنشاء عداد بسيط مع أزرار زيادة، نقصان، وإعادة تعيين. عرض العد وممارسة التعامل مع الأحداث وتحديثات DOM.' },
      { day: 42, title: 'بناء تطبيق قائمة مهام', section: 'Practice', type: 'learning',
        desc: 'بناء قائمة مهام كاملة: إضافة مهام، وضع علامة كمكتملة، حذف المهام، وحفظ البيانات في localStorage. ممارسة عمليات CRUD.' },
      { day: 43, title: 'بناء تطبيق اختبار', section: 'Practice', type: 'learning',
        desc: 'إنشاء اختبار اختيار من متعدد. تتبع النتيجة، عرض النتائج في النهاية، والسماح بإعادة المحاولة. ممارسة المصفوفات والكائنات والعرض الشرطي.' },

    // ====================== 2. نظام الحالة (StateManager) ======================
    const StateManager = {
      _completed: [],
      _currentDay: 1,
      _filter: 'all',
      _openSections: new Set(),

      init() {
        const saved = JSON.parse(localStorage.getItem('devpath_state') || '{}');
        this._completed = saved.completedDays || [];
        this._currentDay = saved.currentDay || 1;
        this._filter = saved.filter || 'all';
        this._openSections = new Set(saved.openSections || []);
        this.syncCurrentDay();
        this.save();
      },

      save() {
        localStorage.setItem('devpath_state', JSON.stringify({
          completedDays: this._completed,
          currentDay: this._currentDay,
          filter: this._filter,
          openSections: [...this._openSections]
        }));
      },

      completeDay(dayNum) {
        if (this._completed.includes(dayNum)) return false;
        this._completed.push(dayNum);
        this._completed.sort((a,b)=>a-b);
        this.syncCurrentDay();
        this.save();
        return true;
      },

      syncCurrentDay() {
        let next = 1;
        for (let d of this._completed) {
          if (d === next) next++;
          else break;
        }
        this._currentDay = next > 180 ? 180 : next;
      },

      reset() {
        this._completed = [];
        this._currentDay = 1;
        this._filter = 'all';
        this._openSections = new Set();
        this.save();
      },

      get completedDays() { return this._completed; },
      get currentDay() { return this._currentDay; },
      get filter() { return this._filter; },
      set filter(val) { this._filter = val; this.save(); },
      isSectionOpen(section) { return this._openSections.has(section); },
      toggleSection(section) {
        if (this._openSections.has(section)) this._openSections.delete(section);
        else this._openSections.add(section);
        this.save();
      },
      setSectionOpen(section, open) {
        if (open) this._openSections.add(section);
        else this._openSections.delete(section);
        this.save();
      },

      getProgress() {
        const total = 180;
        const completed = this._completed.length;
        const percent = Math.round((completed / total) * 100);
        const projectDays = [10,25,45,65,100,130,150,170,180];
        const projectsDone = projectDays.filter(d => this._completed.includes(d)).length;
        return { completed, percent, projectsDone, totalProjects: projectDays.length };
      }
    };

    // ====================== 3. طبقة واجهة المستخدم (UI) ======================
    const UI = {
      updateStats() {
        const { completed, percent, projectsDone, totalProjects } = StateManager.getProgress();
        document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card"><div class="stat-icon" style="background:rgba(108,92,231,0.2)">📅</div><div class="stat-info"><div class="value">${StateManager.currentDay}</div><div class="label">اليوم الحالي</div></div></div>
          <div class="stat-card"><div class="stat-icon" style="background:rgba(46,204,113,0.2)">✅</div><div class="stat-info"><div class="value">${completed}</div><div class="label">أيام مكتملة</div></div></div>
          <div class="stat-card"><div class="stat-icon" style="background:rgba(243,156,18,0.2)">📈</div><div class="stat-info"><div class="value">${percent}%</div><div class="label">التقدم</div></div></div>
          <div class="stat-card"><div class="stat-icon" style="background:rgba(255,107,107,0.2)">🔥</div><div class="stat-info"><div class="value">${projectsDone}/${totalProjects}</div><div class="label">مشاريع</div></div></div>
        `;
        document.getElementById('progressPercent').textContent = percent + '%';
        document.getElementById('progressFill').style.width = percent + '%';
      },

      renderSections() {
        const container = document.getElementById('sectionsContainer');
        const filter = StateManager.filter;
        const sections = {};
        roadmap.forEach(day => {
          if (!sections[day.section]) sections[day.section] = [];
          sections[day.section].push(day);
        });

        const sectionOrder = [
          'HTML','CSS','JavaScript Basics','Practice','Advanced JS','Mini Apps',
          'Tools + Git','React','React Practice','Backend','API Practice',
          'Database','DB Integration','Full Stack','Full Project','Deployment'
        ];

        container.innerHTML = '';
        sectionOrder.forEach(sectionName => {
          const days = sections[sectionName];
          if (!days) return;
          const start = days[0].day, end = days[days.length-1].day;
          const completedIn = days.filter(d => StateManager.completedDays.includes(d.day)).length;
          const isOpen = StateManager.isSectionOpen(sectionName);

          const sectionDiv = document.createElement('div');
          sectionDiv.className = `section ${isOpen ? 'open' : ''}`;
          sectionDiv.dataset.section = sectionName;

          sectionDiv.innerHTML = `
            <div class="section-header">
              <span class="section-title">📁 ${sectionName} <span style="font-size:0.7rem;color:var(--text-secondary)">${start}–${end}</span></span>
              <span style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:0.7rem;">${completedIn}/${days.length}</span>
                <span class="section-arrow">▼</span>
              </span>
            </div>
            <div class="days-grid"></div>
          `;

          const grid = sectionDiv.querySelector('.days-grid');
          days.forEach(day => {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            cell.textContent = day.day;
            cell.dataset.day = day.day;
            if (StateManager.completedDays.includes(day.day)) cell.classList.add('completed');
            if (day.day === StateManager.currentDay && !StateManager.completedDays.includes(day.day)) cell.classList.add('current');
            if (day.type === 'project') cell.classList.add('project');
            if (day.day > 1 && !StateManager.completedDays.includes(day.day-1) && day.day !== StateManager.currentDay) {
              cell.classList.add('locked');
            }
            if (filter === 'completed' && !StateManager.completedDays.includes(day.day)) cell.classList.add('hidden');
            if (filter === 'pending' && StateManager.completedDays.includes(day.day)) cell.classList.add('hidden');
            grid.appendChild(cell);
          });

          // أحداث النقر على الخلايا
          grid.querySelectorAll('.day-cell:not(.locked)').forEach(cell => {
            cell.addEventListener('click', () => showDayModal(parseInt(cell.dataset.day)));
          });
          grid.querySelectorAll('.day-cell.locked').forEach(cell => {
            cell.addEventListener('click', () => showDayModal(parseInt(cell.dataset.day), true));
          });

          sectionDiv.querySelector('.section-header').addEventListener('click', () => {
            sectionDiv.classList.toggle('open');
            StateManager.toggleSection(sectionName);
          });

          container.appendChild(sectionDiv);
        });
      },

      showModal(day, locked = false) {
        const overlay = document.getElementById('modalOverlay');
        const modal = document.getElementById('modal');
        const isProject = day.type === 'project';
        const isCompleted = StateManager.completedDays.includes(day.day);

        let resourcesHtml = '';
        if (day.resources && day.resources.length > 0) {
          resourcesHtml = `<div class="resources">📚 مصادر: ${day.resources.map(url => `<a href="${url}" target="_blank" rel="noopener">رابط</a>`).join(' | ')}</div>`;
        }

        modal.innerHTML = `
          <h3>📅 اليوم ${day.day}: ${day.title} ${isProject ? '🔥' : ''}</h3>
          <p style="color:var(--text-secondary); margin:8px 0;">${day.desc}</p>
          ${resourcesHtml}
          ${locked ? '<p style="color:orange;">🔒 يجب إكمال اليوم السابق أولاً</p>' : ''}
          <div style="margin-top:16px; display:flex; gap:8px; flex-wrap:wrap;">
            ${!isCompleted && !locked ? '<button class="btn primary" id="modalComplete">✅ إكمال اليوم</button>' : ''}
            <button class="btn" id="modalClose">إغلاق</button>
          </div>
        `;

        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';

        const closeModal = () => {
          overlay.style.display = 'none';
          document.body.style.overflow = '';
        };

        document.getElementById('modalClose').addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

        const completeBtn = document.getElementById('modalComplete');
        if (completeBtn) {
          completeBtn.addEventListener('click', () => {
            if (StateManager.completeDay(day.day)) {
              UI.updateStats();
              UI.renderSections();
              showToast('✅ تم إكمال اليوم ' + day.day);
            }
            closeModal();
          });
        }
      }
    };

    // ====================== 4. دوال مساعدة ======================
    function showDayModal(dayNum, locked = false) {
      const day = roadmap.find(d => d.day === dayNum);
      if (day) UI.showModal(day, locked);
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.textContent = msg;
      toast.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#2ecc71;color:#fff;padding:12px 20px;border-radius:8px;font-weight:bold;z-index:999;';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // ====================== 5. ربط الأحداث ======================
    document.getElementById('continueBtn').addEventListener('click', () => showDayModal(StateManager.currentDay));

    document.getElementById('jumpBtn').addEventListener('click', () => {
      const day = roadmap.find(d => d.day === StateManager.currentDay);
      if (!day) return;
      const sectionDiv = document.querySelector(`.section[data-section="${day.section}"]`);
      if (sectionDiv) {
        sectionDiv.classList.add('open');
        StateManager.setSectionOpen(day.section, true);
        sectionDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => {
          const cell = sectionDiv.querySelector(`.day-cell[data-day="${StateManager.currentDay}"]`);
          if (cell) cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
      }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      if (confirm('هل أنت متأكد من إعادة تعيين كل التقدم؟')) {
        StateManager.reset();
        UI.updateStats();
        UI.renderSections();
        showToast('🔄 تم إعادة التعيين');
      }
    });

    document.getElementById('filterBar').addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        StateManager.filter = e.target.dataset.filter;
        UI.renderSections();
      }
    });

    // ====================== 6. بدء التطبيق ======================
    StateManager.init();
    UI.updateStats();
    UI.renderSections();
    document.querySelector(`.filter-btn[data-filter="${StateManager.filter}"]`).classList.add('active');
  </script>
</body>
</html>
