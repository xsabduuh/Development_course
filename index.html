<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevPath 180 • Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #000;
      --card: #1a1a24;
      --border: #2a2a36;
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --accent2: #409cff;
      --green: #30d158;
      --red: #ff453a;
      --orange: #ff9f0a;
      --radius: 14px;
      --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --mono: 'SF Mono', 'JetBrains Mono', monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{height:100%;overflow:hidden}
    body{
      font-family:var(--font);background:var(--bg);color:var(--text);
      height:100%;display:flex;overflow:auto;-webkit-overflow-scrolling:touch;
      overscroll-behavior-y:auto;-webkit-font-smoothing:antialiased;
      user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    .app{flex:1;display:flex;flex-direction:column;min-height:100dvh}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* Login */
    .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:16px}
    .login-title{font-size:1.6rem;font-weight:700;text-align:center;color:var(--accent)}
    .input-field{background:#1c1c2e;border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:12px;font-size:1rem;outline:none}
    .error-msg{color:var(--red);font-size:0.85rem;text-align:center;min-height:20px}

    /* Dashboard */
    .dashboard-content{display:none;flex:1;padding:16px}
    .top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap;gap:8px}
    .logo{font-family:var(--mono);font-weight:700;font-size:1.1rem;color:var(--green);text-decoration:none;display:flex;align-items:center;gap:6px}
    .user-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .user-email{font-size:0.8rem;color:var(--secondary)}
    .notes-link{background:var(--card);border:1px solid var(--border);color:var(--accent);padding:6px 12px;border-radius:8px;text-decoration:none;font-size:0.75rem}
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;opacity:0;pointer-events:none;transition:opacity 0.35s;backdrop-filter:blur(4px)}
    .drawer-overlay.show{opacity:1;pointer-events:auto}
    .drawer{position:fixed;top:0;left:0;bottom:0;width:88vw;max-width:340px;background:#111118;z-index:60;transform:translateX(-100%);transition:transform 0.35s;display:flex;flex-direction:column;border-right:1px solid var(--border);padding:20px 0}
    .drawer.open{transform:translateX(0)}
    .drawer-header{padding:0 20px 16px;border-bottom:1px solid var(--border);font-family:var(--mono);color:var(--green);font-weight:700;display:flex;align-items:center;gap:8px}
    .drawer-list{flex:1;overflow-y:auto;padding:12px 0}
    .drawer-item{display:flex;align-items:center;gap:10px;padding:12px 20px;color:var(--secondary);cursor:pointer;font-size:0.9rem;border-left:3px solid transparent}
    .drawer-item:hover{background:rgba(10,132,255,0.08);color:var(--text);border-left-color:var(--accent)}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
    @media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:10px}
    .stat-icon{width:36px;height:36px;border-radius:8px;background:rgba(10,132,255,0.12);display:flex;align-items:center;justify-content:center}
    .stat-value{font-size:1.5rem;font-weight:700;font-family:var(--mono)}
    .stat-label{font-size:0.7rem;color:var(--secondary)}
    .progress-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px}
    .progress-header{display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:8px}
    .progress-bar{height:6px;background:#1c1c2e;border-radius:10px;overflow:hidden}
    .progress-fill{height:100%;background:var(--accent);border-radius:10px;width:0%;transition:width 0.4s}
    .btn{padding:10px 16px;border-radius:20px;border:none;font-weight:600;cursor:pointer;font-size:0.85rem;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-outline{background:var(--card);border:1px solid var(--border);color:var(--text)}
    .btn-sm{padding:6px 12px;font-size:0.75rem;border-radius:8px}
    .logout-btn{background:transparent;border:1px solid var(--red);color:var(--red)}
    .section-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px}
    .section-tab{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--secondary);cursor:pointer;font-size:0.8rem;font-weight:600;white-space:nowrap}
    .section-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .section-group{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
    .section-header{padding:12px 16px;display:flex;justify-content:space-between;cursor:pointer}
    .section-days{display:none;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:6px;padding:0 12px 12px}
    .section-group.open .section-days{display:grid}
    .day-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.75rem;border:1px solid var(--border);cursor:pointer;background:var(--bg);color:var(--secondary);transition:0.2s}
    .day-cell.done{background:rgba(48,209,88,0.1);border-color:var(--green);color:var(--green)}
    .day-cell.current{border-color:var(--accent);box-shadow:0 0 10px var(--accent);color:#fff}
    .day-cell.project{border-color:var(--orange);color:var(--orange)}
    .day-cell.locked{opacity:0.25;pointer-events:none}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:50}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;width:90%;max-width:450px}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:20px;font-weight:600;z-index:300;animation:fadeIn 0.3s}
    @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @media(min-width:769px){.drawer{position:relative;transform:none;width:260px}.drawer-overlay{display:none}.menu-btn{display:none}.app{flex-direction:row;max-width:1000px;margin:0 auto}.dashboard-content{display:none;flex:1;padding:16px 20px}}
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-title">DevPath 180</div>
      <input type="email" class="input-field" id="emailInput" placeholder="Email" autocomplete="email">
      <input type="password" class="input-field" id="passwordInput" placeholder="Password" autocomplete="current-password">
      <div class="error-msg" id="loginError"></div>
      <button class="btn btn-primary" id="loginBtn">Sign In</button>
      <button class="btn btn-outline" id="registerBtn">Create Account</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard-content" id="dashboardContent">
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-header">📂 Sections</div>
      <div class="drawer-list" id="drawerList"></div>
    </aside>
    <div style="flex:1;">
      <div class="top-bar">
        <a href="index.html" class="logo">DevPath 180</a>
        <div class="user-info">
          <span class="user-email" id="userEmail"></span>
          <a href="notes.html" class="notes-link">Notes</a>
          <button class="btn btn-sm logout-btn" id="logoutBtn">Logout</button>
          <button class="btn btn-sm menu-btn" id="menuBtn">☰</button>
        </div>
      </div>
      <div class="stats-grid" id="stats"></div>
      <div class="progress-box">
        <div class="progress-header"><span>Progress</span><span id="progressPercent">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="continueBtn">▶ Continue</button>
        <button class="btn btn-outline" id="expandBtn">📂 Expand All</button>
        <button class="btn btn-outline" id="resetBtn" style="color:var(--red);border-color:rgba(255,69,58,0.3);">↺ Reset</button>
      </div>
      <div class="section-tabs" id="sectionTabs"></div>
      <div id="sectionsContainer"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAszFGDs1J92_53jHvj5aABmeiKZdc-mf0",
  authDomain: "gen-lang-client-0501601606.firebaseapp.com",
  projectId: "gen-lang-client-0501601606",
  storageBucket: "gen-lang-client-0501601606.firebasestorage.app",
  messagingSenderId: "1079712784218",
  appId: "1:1079712784218:web:598465155aa70938a6dd63",
  measurementId: "G-CRHRGYX74V"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Constants
const TOTAL_DAYS = 180;
const SECTIONS = ['HTML','CSS','JavaScript Basics','Practice','Advanced JS','Mini Apps','Tools + Git','React','React Practice','Backend','API Practice','Database','DB Integration','Full Stack','Full Project','Deployment'];

// ROADMAP (all 180 days - condensed for space)
const ROADMAP = [
  {d:1,t:'مقدمة إلى تطوير الويب',t_en:'Intro to Web Development',s:'HTML',type:'learning',desc:'فهم كيفية عمل الويب: العملاء، الخوادم، HTTP، المتصفحات.',desc_en:'Understand how the web works: clients, servers, HTTP, browsers.'},
  // ... (all 180 days, same as previous versions)
];

// State
let completedDays = [], currentDay = 1, expandedAll = false;

// Auth
auth.onAuthStateChanged(async user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardContent').style.display = 'flex';
    document.getElementById('userEmail').textContent = user.email;
    await loadProgress();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboardContent').style.display = 'none';
  }
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  try {
    await auth.signInWithEmailAndPassword(emailInput.value, passwordInput.value);
    loginError.textContent = '';
  } catch(e) { loginError.textContent = e.message; }
});
document.getElementById('registerBtn').addEventListener('click', async () => {
  try {
    await auth.createUserWithEmailAndPassword(emailInput.value, passwordInput.value);
    loginError.textContent = '';
  } catch(e) { loginError.textContent = e.message; }
});
document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

// Firestore
async function loadProgress() {
  const doc = await db.collection('users').doc(auth.currentUser.uid).get();
  if (doc.exists && doc.data().progress) {
    completedDays = doc.data().progress.completedDays || [];
    currentDay = doc.data().progress.currentDay || 1;
  } else {
    completedDays = []; currentDay = 1;
  }
  renderAll();
}
async function saveProgress() {
  if (!auth.currentUser) return;
  await db.collection('users').doc(auth.currentUser.uid).set({
    progress: { completedDays, currentDay }
  }, { merge: true });
}

function complete(day) {
  if (completedDays.includes(day)) return false;
  completedDays.push(day); completedDays.sort((a,b)=>a-b);
  currentDay = Math.min(TOTAL_DAYS, currentDay === day ? currentDay + 1 : currentDay);
  saveProgress(); renderAll(); return true;
}
function uncomplete(day) {
  const idx = completedDays.indexOf(day);
  if (idx === -1) return false;
  completedDays.splice(idx, 1);
  currentDay = Math.max(1, currentDay - 1);
  saveProgress(); renderAll(); return true;
}

// Render functions
function renderAll() { renderStats(); renderSections(); renderDrawer(); }
function renderStats() { /* ... */ }
function renderSections() { /* ... */ }
function renderDrawer() { /* ... */ }

// Events
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('drawerOverlay').classList.toggle('show');
});
document.getElementById('drawerOverlay').addEventListener('click', () => {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('show');
});
document.getElementById('continueBtn').addEventListener('click', () => openDayModal(currentDay));
document.getElementById('expandBtn').addEventListener('click', () => {
  expandedAll = !expandedAll;
  document.getElementById('expandBtn').textContent = expandedAll ? '📂 Collapse All' : '📂 Expand All';
  renderSections();
});
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all progress?')) {
    completedDays = []; currentDay = 1;
    saveProgress(); renderAll();
  }
});

// Init
function init() { /* ... */ }
</script>
</body>
</html>
