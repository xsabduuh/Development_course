<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPath 180 • Learning Tracker</title>
    <style>
        /* ==========================================
           CSS VARIABLES (Mobile-first base)
           ========================================== */
        :root {
            --bg: #0a0a12;
            --surface: #12121e;
            --surface-hover: #1a1a2c;
            --border: #252538;
            --text: #e2e2f0;
            --text-secondary: #9090b0;
            --accent: #6c5ce7;
            --accent-glow: #8b7cf0;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --project-badge: #ff6b6b;
            --project-bg: rgba(255, 107, 107, 0.08);
            --project-border: rgba(255, 107, 107, 0.3);
            --radius: 10px;
            --radius-sm: 6px;
            --transition: 0.2s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --touch-target: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
        }

        /* ==========================================
           MOBILE-FIRST LAYOUT
           ========================================== */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navigation Bar */
        .top-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            min-height: var(--touch-target);
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-glow);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo .icon { font-size: 1.3rem; }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-link {
            padding: 8px 14px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1.5px solid transparent;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-link.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .nav-link:hover:not(.active) {
            color: var(--text);
            background: var(--surface-hover);
        }

        /* ==========================================
           MAIN CONTENT AREA
           ========================================== */
        .main-content {
            flex: 1;
            padding: 16px 14px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        /* ==========================================
           STATS CARDS (Mobile-first grid)
           ========================================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color var(--transition);
            min-height: 64px;
        }

        .stat-card:active { border-color: var(--accent); }

        .stat-icon {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .stat-icon.purple { background: rgba(108,92,231,0.2); }
        .stat-icon.green { background: rgba(46,204,113,0.2); }
        .stat-icon.orange { background: rgba(243,156,18,0.2); }
        .stat-icon.red { background: rgba(255,107,107,0.2); }

        .stat-value { font-size: 1.3rem; font-weight: 700; line-height: 1.1; }
        .stat-label { font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; }

        /* ==========================================
           PROGRESS BAR
           ========================================== */
        .progress-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 16px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .progress-bar-track {
            height: 10px;
            background: #1a1a2c;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #6c5ce7, #8b7cf0);
            transition: width 0.5s ease;
            position: relative;
        }

        /* ==========================================
           ACTION BUTTONS
           ========================================== */
        .actions-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
            min-height: var(--touch-target);
            white-space: nowrap;
            touch-action: manipulation;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-primary:active { background: var(--accent-glow); }
        .btn-outline:active { border-color: var(--accent); }
        .btn-danger { color: var(--danger); border-color: var(--danger); }
        .btn-danger:active { background: rgba(231,76,60,0.15); }

        /* ==========================================
           FILTER PILLS
           ========================================== */
        .filter-row {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all var(--transition);
            min-height: 40px;
        }

        .filter-pill.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ==========================================
           SECTIONS (Collapsible)
           ========================================== */
        .section-group {
            margin-bottom: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            min-height: var(--touch-target);
            user-select: none;
            gap: 8px;
            touch-action: manipulation;
        }

        .section-header:active { background: var(--surface-hover); }

        .section-title {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            font-size: 0.85rem;
        }

        .section-range {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .section-arrow {
            font-size: 0.65rem;
            transition: transform var(--transition);
            color: var(--text-secondary);
        }

        .section-group.open .section-arrow { transform: rotate(180deg); }

        .section-days {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
            gap: 5px;
            padding: 0 12px 12px;
            border-top: 1px solid var(--border);
        }

        .section-group.open .section-days { display: grid; padding-top: 10px; }

        /* ==========================================
           DAY CELLS
           ========================================== */
        .day-cell {
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text-secondary);
            transition: all var(--transition);
            position: relative;
            min-width: 36px;
            min-height: 36px;
            touch-action: manipulation;
        }

        .day-cell:active { transform: scale(0.95); }

        .day-cell.completed {
            background: rgba(46,204,113,0.15);
            border-color: var(--success);
            color: var(--success);
        }

        .day-cell.current {
            border-color: var(--accent-glow);
            box-shadow: 0 0 10px rgba(108,92,231,0.4);
            color: #fff;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 6px rgba(108,92,231,0.3); }
            50% { box-shadow: 0 0 20px rgba(108,92,231,0.6); }
        }

        .day-cell.locked { opacity: 0.3; pointer-events: none; }

        .day-cell.project-day {
            border-color: var(--project-border);
            background: var(--project-bg);
            color: var(--project-badge);
            font-weight: 700;
        }

        .day-cell.project-day::before {
            content: '🔥';
            position: absolute;
            top: -2px;
            left: 2px;
            font-size: 0.45rem;
        }

        .hidden-by-filter { display: none !important; }

        /* ==========================================
           MODAL (Mobile-friendly)
           ========================================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius) var(--radius) 0 0;
            padding: 20px 16px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal h3 { font-size: 1rem; margin-bottom: 8px; }

        .modal .project-badge {
            background: var(--project-badge);
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 700;
            margin-left: 6px;
            display: inline-block;
        }

        .modal-desc { font-size: 0.85rem; line-height: 1.6; margin: 10px 0; }
        .modal-resources { margin-top: 10px; font-size: 0.8rem; }
        .modal-resources a { color: var(--accent-glow); word-break: break-all; }
        .lock-reason { color: var(--warning); font-size: 0.8rem; margin-top: 8px; }
        .modal-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
        .modal-actions .btn { flex: 1; justify-content: center; min-width: 120px; }

        /* ==========================================
           TOAST NOTIFICATION
           ========================================== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            z-index: 300;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards;
            white-space: nowrap;
        }

        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(10px); } }

        /* ==========================================
           SIDEBAR (for larger screens)
           ========================================== */
        .sidebar {
            display: none;
        }

        /* ==========================================
           TABLET & DESKTOP (≥768px)
           ========================================== */
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }

            .sidebar {
                display: flex;
                flex-direction: column;
                width: 240px;
                min-height: 100vh;
                background: var(--surface);
                border-right: 1px solid var(--border);
                position: sticky;
                top: 0;
                max-height: 100vh;
                overflow-y: auto;
                padding-bottom: 16px;
                flex-shrink: 0;
            }

            .sidebar-header {
                padding: 16px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }

            .sidebar-nav { flex: 1; padding: 10px 0; overflow-y: auto; }
            .sidebar-nav a {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 16px;
                color: var(--text-secondary);
                text-decoration: none;
                font-size: 0.85rem;
                transition: all var(--transition);
                border-left: 3px solid transparent;
            }

            .sidebar-nav a:hover,
            .sidebar-nav a.active {
                color: var(--text);
                background: var(--surface-hover);
                border-left-color: var(--accent);
            }

            .top-nav { display: none; }
            .main-content { padding: 20px 24px; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
            .section-days { grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 6px; }
            .day-cell { min-width: 40px; min-height: 40px; }
            .modal {
                border-radius: var(--radius);
                margin: auto;
                align-self: center;
            }
        }

        @media (min-width: 1024px) {
            .main-content { max-width: 900px; }
        }

        /* Utility: hide on mobile, show on desktop */
        .desktop-only { display: none; }
        @media (min-width: 768px) { .desktop-only { display: initial; } }
    </style>
</head>

        ];

        const TOTAL_DAYS = 180;
        const PROJECT_DAYS = new Set([10, 25, 45, 65, 100, 130, 150, 170, 180]);
        const SECTION_ORDER = [
            'HTML', 'CSS', 'JavaScript Basics', 'Practice', 'Advanced JS', 'Mini Apps',
            'Tools + Git', 'React', 'React Practice', 'Backend', 'API Practice',
            'Database', 'DB Integration', 'Full Stack', 'Full Project', 'Deployment'
        ];

        // ============================================
        // 2. STATE MANAGEMENT LAYER
        // ============================================
        const StateManager = {
            _state: {
                completedDays: [],
                currentDay: 1,
                lastVisitedPage: 'dashboard'
            },

            init() {
                this.load();
                this.syncCurrentDay();
                return this;
            },

            load() {
                try {
                    const saved = localStorage.getItem('devpath180_state');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        this._state.completedDays = parsed.completedDays || [];
                        this._state.currentDay = parsed.currentDay || 1;
                        this._state.lastVisitedPage = parsed.lastVisitedPage || 'dashboard';
                    }
                } catch (e) {
                    console.warn('State load failed, using defaults.');
                    this.reset();
                }
            },

            save() {
                try {
                    localStorage.setItem('devpath180_state', JSON.stringify(this._state));
                } catch (e) {
                    console.error('State save failed:', e);
                }
            },

            reset() {
                this._state.completedDays = [];
                this._state.currentDay = 1;
                this.save();
            },

            syncCurrentDay() {
                const sorted = [...this._state.completedDays].sort((a, b) => a - b);
                let expected = 1;
                for (const day of sorted) {
                    if (day === expected) expected++;
                    else if (day > expected) break;
                }
                this._state.currentDay = Math.min(expected, TOTAL_DAYS);
                this.save();
            },

            get completedDays() { return this._state.completedDays; },
            get currentDay() { return this._state.currentDay; },
            get lastVisitedPage() { return this._state.lastVisitedPage; },

            set lastVisitedPage(page) {
                this._state.lastVisitedPage = page;
                this.save();
            },

            completeDay(day) {
                if (day < 1 || day > TOTAL_DAYS) return false;
                if (this._state.completedDays.includes(day)) return false;
                this._state.completedDays.push(day);
                this._state.completedDays.sort((a, b) => a - b);
                this.syncCurrentDay();
                this.save();
                return true;
            },

            isDayCompleted(day) {
                return this._state.completedDays.includes(day);
            },

            isDayLocked(day) {
                if (day === 1) return false;
                if (this.isDayCompleted(day)) return false;
                return !this.isDayCompleted(day - 1);
            }
        };

        // ============================================
        // 3. PROGRESS CALCULATOR
        // ============================================
        const ProgressCalculator = {
            getPercentage() {
                return Math.round((StateManager.completedDays.length / TOTAL_DAYS) * 100);
            },

            getCompletedCount() {
                return StateManager.completedDays.length;
            },

            getProjectCompletedCount() {
                return ROADMAP_DATA.filter(d => d.type === 'project' && StateManager.isDayCompleted(d.day)).length;
            },

            getCurrentDay() {
                return StateManager.currentDay;
            }
        };

        // ============================================
        // 4. UI RENDERER
        // ============================================
        const UIRenderer = {
            elements: {},

            cache() {
                this.elements = {
                    statsGrid: document.getElementById('statsGrid'),
                    progressPercent: document.getElementById('progressPercent'),
                    progressBar: document.getElementById('progressBar'),
                    sectionsContainer: document.getElementById('sectionsContainer'),
                    modalOverlay: document.getElementById('modalOverlay'),
                    modalTitle: document.getElementById('modalTitle'),
                    modalBody: document.getElementById('modalBody'),
                    modalCompleteBtn: document.getElementById('modalCompleteBtn'),
                    modalCloseBtn: document.getElementById('modalCloseBtn'),
                    toast: document.getElementById('toast'),
                    sidebarNav: document.getElementById('sidebarNav')
                };
            },

            renderStats() {
                const currentDay = ProgressCalculator.getCurrentDay();
                const completed = ProgressCalculator.getCompletedCount();
                const percent = ProgressCalculator.getPercentage();
                const projects = ProgressCalculator.getProjectCompletedCount();

                this.elements.statsGrid.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-icon purple">📅</div>
                        <div><div class="stat-value">${currentDay}</div><div class="stat-label">Today</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">✅</div>
                        <div><div class="stat-value">${completed}</div><div class="stat-label">Done</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">📈</div>
                        <div><div class="stat-value">${percent}%</div><div class="stat-label">Progress</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red">🔥</div>
                        <div><div class="stat-value">${projects}</div><div class="stat-label">Projects</div></div>
                    </div>
                `;
            },

            renderProgressBar() {
                const percent = ProgressCalculator.getPercentage();
                this.elements.progressPercent.textContent = percent + '%';
                this.elements.progressBar.style.width = percent + '%';
            },

            renderSections(filter = 'all') {
                const groups = {};
                ROADMAP_DATA.forEach(day => {
                    if (!groups[day.section]) groups[day.section] = [];
                    groups[day.section].push(day);
                });

                const orderedSections = SECTION_ORDER.filter(s => groups[s]);
                let html = '';

                orderedSections.forEach(sectionName => {
                    const days = groups[sectionName];
                    const startDay = days[0].day;
                    const endDay = days[days.length - 1].day;
                    const completedInSection = days.filter(d => StateManager.isDayCompleted(d.day)).length;
                    const totalInSection = days.length;

                    let isOpen = days.some(d => d.day === StateManager.currentDay);
                    if (filter !== 'all') {
                        const hasVisible = days.some(d => {
                            const done = StateManager.isDayCompleted(d.day);
                            return filter === 'completed' ? done : !done;
                        });
                        if (hasVisible) isOpen = true;
                    }

                    html += `<div class="section-group${isOpen ? ' open' : ''}" data-section="${sectionName}">`;
                    html += `<div class="section-header">`;
                    html += `<span class="section-title">📁 ${sectionName} <span class="section-range">(${startDay}–${endDay})</span></span>`;
                    html += `<span style="font-size:0.7rem;color:var(--text-secondary)">${completedInSection}/${totalInSection}</span>`;
                    html += `<span class="section-arrow">▼</span></div>`;
                    html += `<div class="section-days">`;

                    days.forEach(day => {
                        let cls = 'day-cell';
                        if (StateManager.isDayCompleted(day.day)) cls += ' completed';
                        if (day.day === StateManager.currentDay && !StateManager.isDayCompleted(day.day)) cls += ' current';
                        if (day.type === 'project') cls += ' project-day';
                        if (StateManager.isDayLocked(day.day)) cls += ' locked';

                        const done = StateManager.isDayCompleted(day.day);
                        if (filter === 'completed' && !done) cls += ' hidden-by-filter';
                        if (filter === 'pending' && done) cls += ' hidden-by-filter';

                        html += `<div class="${cls}" data-day="${day.day}" title="Day ${day.day}: ${day.title}">${day.day}</div>`;
                    });

                    html += `</div></div>`;
                });

                this.elements.sectionsContainer.innerHTML = html;
                this._attachSectionListeners();
                this._attachDayListeners();
            },

            _attachSectionListeners() {
                document.querySelectorAll('.section-header').forEach(header => {
                    header.addEventListener('click', () => {
                        header.parentElement.classList.toggle('open');
                    });
                });
            },

            _attachDayListeners() {
                document.querySelectorAll('.day-cell:not(.locked)').forEach(cell => {
                    cell.addEventListener('click', () => {
                        this.openModal(parseInt(cell.dataset.day));
                    });
                });
                document.querySelectorAll('.day-cell.locked').forEach(cell => {
                    cell.addEventListener('click', () => {
                        this.openModal(parseInt(cell.dataset.day), true);
                    });
                });
            },

            openModal(dayNum, locked = false) {
                const day = ROADMAP_DATA.find(d => d.day === dayNum);
                if (!day) return;

                this._currentModalDay = dayNum;
                const isProject = day.type === 'project';
                const isCompleted = StateManager.isDayCompleted(dayNum);

                this.elements.modalTitle.innerHTML = `
                    Day ${day.day}: ${day.title}
                    ${isProject ? '<span class="project-badge">🔥 Project</span>' : ''}
                `;

                let body = `
                    <div style="color:var(--text-secondary);font-size:0.8rem;margin-bottom:6px">
                        📂 ${day.section} | ${isProject ? 'Project' : 'Learning'}
                    </div>
                    <div class="modal-desc">${day.desc}</div>
                `;

                if (day.resources) {
                    body += `<div class="modal-resources">📚 Resources: ${day.resources.map(u => `<a href="${u}" target="_blank">${u}</a>`).join(', ')}</div>`;
                }

                if (isCompleted) {
                    body += '<p style="color:var(--success);margin-top:8px">✅ Already completed</p>';
                }

                if (locked) {
                    const prevDay = ROADMAP_DATA.find(d => d.day === dayNum - 1);
                    body += `<div class="lock-reason">🔒 Locked until you complete Day ${dayNum-1}${prevDay ? ': ' + prevDay.title : ''}</div>`;
                }

                this.elements.modalBody.innerHTML = body;

                if (isCompleted || locked) {
                    this.elements.modalCompleteBtn.textContent = locked ? '🔒 Locked' : '✅ Done';
                    this.elements.modalCompleteBtn.style.opacity = '0.5';
                    this.elements.modalCompleteBtn.style.pointerEvents = 'none';
                } else {
                    this.elements.modalCompleteBtn.textContent = '✅ Mark Complete';
                    this.elements.modalCompleteBtn.style.opacity = '1';
                    this.elements.modalCompleteBtn.style.pointerEvents = 'auto';
                    this.elements.modalCompleteBtn.onclick = () => this._completeDay(dayNum);
                }

                this.elements.modalOverlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            },

            _completeDay(dayNum) {
                if (StateManager.completeDay(dayNum)) {
                    this.closeModal();
                    this.refreshAll();
                    this.showToast('✅ Day ' + dayNum + ' completed!');
                }
            },

            closeModal() {
                this.elements.modalOverlay.style.display = 'none';
                document.body.style.overflow = '';
                this._currentModalDay = null;
            },

            showToast(msg) {
                const toast = this.elements.toast;
                toast.textContent = msg;
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            },

            refreshAll() {
                this.renderStats();
                this.renderProgressBar();
                const activeFilter = document.querySelector('.filter-pill.active');
                this.renderSections(activeFilter ? activeFilter.dataset.filter : 'all');
            },

            renderSidebar() {
                if (!this.elements.sidebarNav) return;
                let html = '';
                SECTION_ORDER.forEach(section => {
                    html += `<a href="#" data-section="${section}">📁 ${section}</a>`;
                });
                this.elements.sidebarNav.innerHTML = html;

                this.elements.sidebarNav.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        const sectionEl = document.querySelector(`.section-group[data-section="${link.dataset.section}"]`);
                        if (sectionEl) {
                            sectionEl.classList.add('open');
                            sectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    });
                });
            }
        };

        // ============================================
        // 5. APP CONTROLLER
        // ============================================
        const App = {
            init() {
                StateManager.init();
                UIRenderer.cache();
                UIRenderer.renderSidebar();
                this.bindEvents();
                this.refreshUI();
                this.restoreLastPage();
                console.log('🚀 DevPath 180 ready •', ProgressCalculator.getCompletedCount(), 'days completed');
            },

            refreshUI() {
                UIRenderer.refreshAll();
            },

            bindEvents() {
                // Continue button
                document.getElementById('btnContinue').addEventListener('click', () => {
                    UIRenderer.openModal(StateManager.currentDay);
                });

                // Jump to current day
                document.getElementById('btnJumpCurrent').addEventListener('click', () => {
                    const dayData = ROADMAP_DATA.find(d => d.day === StateManager.currentDay);
                    if (dayData) {
                        const sectionEl = document.querySelector(`.section-group[data-section="${dayData.section}"]`);
                        if (sectionEl) {
                            sectionEl.classList.add('open');
                            sectionEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            setTimeout(() => {
                                const cell = document.querySelector(`.day-cell[data-day="${StateManager.currentDay}"]`);
                                if (cell) cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }, 300);
                        }
                    }
                });

                // Reset
                document.getElementById('btnReset').addEventListener('click', () => {
                    if (confirm('Reset all progress? This cannot be undone.')) {
                        StateManager.reset();
                        this.refreshUI();
                        UIRenderer.showToast('🔄 Progress reset');
                    }
                });

                // Filter pills
                document.querySelectorAll('.filter-pill').forEach(pill => {
                    pill.addEventListener('click', () => {
                        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                        pill.classList.add('active');
                        UIRenderer.renderSections(pill.dataset.filter);
                    });
                });

                // Modal close
                document.getElementById('modalCloseBtn').addEventListener('click', () => UIRenderer.closeModal());
                document.getElementById('modalOverlay').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) UIRenderer.closeModal();
                });

                // Keyboard
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') UIRenderer.closeModal();
                    if (e.key === 'ArrowRight' && UIRenderer._currentModalDay) {
                        const next = UIRenderer._currentModalDay + 1;
                        if (next <= TOTAL_DAYS) UIRenderer.openModal(next, StateManager.isDayLocked(next));
                    }
                    if (e.key === 'ArrowLeft' && UIRenderer._currentModalDay) {
                        const prev = UIRenderer._currentModalDay - 1;
                        if (prev >= 1) UIRenderer.openModal(prev, StateManager.isDayLocked(prev));
                    }
                });

                // Save page before unload
                window.addEventListener('beforeunload', () => {
                    StateManager.lastVisitedPage = 'dashboard';
                });
            },

            restoreLastPage() {
                // On dashboard, nothing special needed—already rendering dashboard
            }
        };

        // ============================================
        // 6. BOOTSTRAP
        // ============================================
        document.addEventListener('DOMContentLoaded', () => App.init());

    })();
    </script>
</body>
</html>
