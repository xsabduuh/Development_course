<html lang="en" dir="ltr">
<head>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

  <style>
    :root {
      --bg: #000;
      --card: #1a1a24;
      --border: #2a2a36;
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --accent2: #409cff;
      --green: #30d158;
      --red: #ff453a;
      --orange: #ff9f0a;
      --radius: 14px;
      --radius-lg: 22px;
      --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      --shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      height: 100%;
      overflow-x: hidden;
      overflow-y: hidden;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: auto;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y;
    }
    .app-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; position: sticky; top: 0; background: var(--bg);
      z-index: 10; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-weight: 700; font-size: 1.2rem; color: var(--green); text-decoration: none; letter-spacing: -0.5px; }
    .logo-icon { width: 28px; height: 28px; }
    .top-actions { display: flex; align-items: center; gap: 8px; }
    .lang-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .notes-link { background: var(--card); border: 1px solid var(--border); color: var(--accent); padding: 8px 14px; border-radius: 10px; text-decoration: none; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .notes-link svg { width: 18px; height: 18px; }
    .notes-link:hover { background: rgba(10,132,255,0.1); }
    .menu-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 1.4rem; padding: 8px 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ── DRAWER ── */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.35s; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .drawer-overlay.show { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 88vw; max-width: 340px; background: #111118; z-index: 60; transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1); display: flex; flex-direction: column; border-right: 1px solid var(--border); padding: 20px 0; }
    .drawer.open { transform: translateX(0); }
    .drawer-header { padding: 0 20px 16px; border-bottom: 1px solid var(--border); font-family: var(--mono); color: var(--green); font-weight: 700; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
    .drawer-list { flex: 1; overflow-y: auto; padding: 12px 0; }
    .drawer-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: var(--secondary); cursor: pointer; font-size: 0.9rem; border-left: 3px solid transparent; transition: all 0.2s; }
    .drawer-item svg { width: 18px; height: 18px; opacity: 0.7; }
    .drawer-item:hover, .drawer-item.active { background: rgba(10,132,255,0.08); color: var(--text); border-left-color: var(--accent); }
    .drawer-item.logout-item { color: var(--red); border-top: 1px solid var(--border); margin-top: 12px; padding-top: 16px; }
    .drawer-item.logout-item:hover { background: rgba(255,69,58,0.08); }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
    @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 12px; }
    .stat-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(10,132,255,0.12); display: flex; align-items: center; justify-content: center; }
    .stat-icon svg { width: 20px; height: 20px; }
    .stat-value { font-size: 1.6rem; font-weight: 700; font-family: var(--mono); }
    .stat-label { font-size: 0.75rem; color: var(--secondary); }

    /* ── PROGRESS ── */
    .progress-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
    .progress-header { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; }
    .progress-bar { height: 6px; background: #1c1c2e; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 10px; width: 0%; transition: width 0.4s; }

    /* ── BUTTONS ── */
    .btn { padding: 10px 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .btn svg { width: 18px; height: 18px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:active { background: var(--accent2); }
    .btn-outline { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-outline:active { background: #222; }
    .btn-danger { background: transparent; border: 1px solid rgba(255,69,58,0.3); color: var(--red); }
    .btn-danger:active { background: rgba(255,69,58,0.1); }

    /* ── SECTION TABS ── */
    .section-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 8px; scrollbar-width: none; }
    .section-tabs::-webkit-scrollbar { display: none; }
    .section-tab { flex-shrink: 0; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--secondary); font-size: 0.8rem; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .section-tab svg { width: 16px; height: 16px; opacity: 0.8; }
    .section-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── SECTION GROUPS ── */
    .section-group { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .section-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .section-header:hover { background: rgba(255,255,255,0.02); }
    .section-days { display: none; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: 6px; padding: 0 14px 14px; }
    .section-group.open .section-days { display: grid; }

    /* ── DAY CELLS ── */
    .day-cell { aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: var(--mono); font-size: 0.8rem; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; background: var(--bg); color: var(--secondary); position: relative; }
    .day-cell:active:not(.locked) { transform: scale(0.95); }
    .day-cell.done { background: rgba(48,209,88,0.1); border-color: var(--green); color: var(--green); }
    .day-cell.current { border-color: var(--accent); box-shadow: 0 0 12px var(--accent); color: #fff; }
    .day-cell.project { border-color: var(--orange); color: var(--orange); }
    .day-cell.locked { opacity: 0.25; pointer-events: none; }
    .day-cell.just-completed { animation: completePulse 0.6s ease; }
    @keyframes completePulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); box-shadow: 0 0 20px var(--green); } 100% { transform: scale(1); } }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 50; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 90%; max-width: 480px; max-height: 85vh; overflow-y: auto; padding: 20px; }
    .modal h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .modal p { color: var(--secondary); font-size: 0.9rem; line-height: 1.6; }

    /* ── TOAST ── */
    .toast-panel { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
    .toast { background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 20px; font-weight: 500; font-size: 0.85rem; box-shadow: var(--shadow); text-align: center; animation: toastIn 0.4s ease; pointer-events: auto; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }

    @media (min-width: 769px) { .drawer { position: relative; transform: none; z-index: 1; width: 260px; } .drawer-overlay { display: none; } .menu-btn { display: none; } .app-container { display: flex; flex-direction: row; max-width: 1000px; padding: 0; } .main-content { flex: 1; padding: 0 20px 20px; overflow-y: auto; } }
    @media (max-width: 768px) { .app-container { max-width: 100%; } .drawer { width: 85vw; } }
  </style>
</head>

    done: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`,
    left: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    projects: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0016.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 002 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`
  };

  const ROADMAP = [
    // ... (المحتوى كاملاً كما كان، لم نحذف شيئاً منه) ...
    {d:1,t:'مقدمة إلى تطوير الويب',t_en:'Intro to Web Development',s:'HTML',type:'learning',desc:'فهم كيفية عمل الويب: العملاء، الخوادم، HTTP، المتصفحات. إعداد بيئة التطوير باستخدام VS Code والملحقات.',desc_en:'Understand how the web works: clients, servers, HTTP, browsers. Set up VS Code and extensions.'},
    // ... (جميع الأيام 180 كما كانت) ...
    {d:180,t:'إطلاق التطبيق!',t_en:'🎉 Live App Launch!',s:'Deployment',type:'project',desc:'إطلاق تطبيقك الإنتاجي! كتابة دراسة حالة.',desc_en:'Launch production app! Case study, portfolio update.'}
  ];

  let completedDays = [], currentDay = 1, expandedAll = false;

  const i18n = {
    en: {
      sections_title: 'Sections', progress_label: 'Progress', continue_btn: 'Continue',
      expand_btn: 'Expand All', collapse_btn: 'Collapse All', reset_btn: 'Reset',
      current_label: 'Current', done_label: 'Done', left_label: 'Remaining', projects_label: 'Projects',
      complete_btn: 'Mark Complete', uncomplete_btn: 'Unmark Complete', close_btn: 'Close',
      toast_done: 'Day completed!', toast_undone: 'Day unmarked', reset_confirm: 'Reset all progress?'
    },
    ar: {
      sections_title: 'الأقسام', progress_label: 'التقدم', continue_btn: 'استمر',
      expand_btn: 'توسيع الكل', collapse_btn: 'طي الكل', reset_btn: 'إعادة',
      current_label: 'الحالي', done_label: 'مكتمل', left_label: 'متبقي', projects_label: 'مشاريع',
      complete_btn: 'إكمال اليوم', uncomplete_btn: 'إلغاء الإكمال', close_btn: 'إغلاق',
      toast_done: 'تم إكمال اليوم!', toast_undone: 'تم إلغاء اليوم', reset_confirm: 'هل تريد إعادة كل التقدم؟'
    }
  };

  let lang = localStorage.getItem('devpath_lang') || 'en';
  const $ = id => document.getElementById(id);
  function t(key) { return i18n[lang][key] || key; }

  function applyLanguage() {
    document.documentElement.lang = lang;
    $('langLabel').textContent = lang === 'ar' ? 'العربية' : 'English';
    document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
    renderAll();
  }

  $('langToggle').addEventListener('click', () => {
    lang = lang === 'ar' ? 'en' : 'ar';
    localStorage.setItem('devpath_lang', lang);
    applyLanguage();
  });

  function getTitle(day) { return (lang === 'ar' ? day.t : day.t_en) || day.t; }
  function getDesc(day) { return (lang === 'ar' ? day.desc : day.desc_en) || day.desc; }

  // ⚡️ شرط التوثيق الجديد
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      document.getElementById('mainContent').style.display = 'flex';
      await loadProgress();
    } else {
      window.location.href = 'login.html';
    }
  });

  async function loadProgress() {
    if (!auth.currentUser) return;
    const doc = await db.collection('users').doc(auth.currentUser.uid).get();
    if (doc.exists && doc.data().progress) {
      completedDays = doc.data().progress.completedDays || [];
      currentDay = doc.data().progress.currentDay || 1;
    } else {
      completedDays = []; currentDay = 1;
    }
    renderAll();
  }

  async function saveProgress() {
    if (!auth.currentUser) return;
    await db.collection('users').doc(auth.currentUser.uid).set({
      progress: { completedDays, currentDay }
    }, { merge: true });
  }

  function complete(day) {
    if (completedDays.includes(day)) return false;
    completedDays.push(day); completedDays.sort((a,b)=>a-b);
    let next = 1;
    for (let d of completedDays) { if (d === next) next++; else break; }
    currentDay = Math.min(next, TOTAL_DAYS);
    saveProgress(); renderAll();
    return true;
  }

  function uncomplete(day) {
    const idx = completedDays.indexOf(day);
    if (idx === -1) return false;
    completedDays.splice(idx, 1);
    let next = 1;
    for (let d of completedDays) { if (d === next) next++; else break; }
    currentDay = Math.min(next, TOTAL_DAYS);
    saveProgress(); renderAll();
    return true;
  }

  function isDone(d) { return completedDays.includes(d); }
  function isLocked(d) { return d !== 1 && !isDone(d) && !isDone(d-1); }
  function projectsDone() { return ROADMAP.filter(d => d.type === 'project' && isDone(d.d)).length; }

  function renderAll() { renderStats(); renderSections(); renderSectionTabs(); renderDrawer(); }

  function renderStats() {
    $('stats').innerHTML = `
      <div class="stat-card"><div class="stat-icon">${STAT_ICONS.current}</div><div><div class="stat-value">${currentDay}</div><div class="stat-label">${t('current_label')}</div></div></div>
      <div class="stat-card"><div class="stat-icon">${STAT_ICONS.done}</div><div><div class="stat-value">${completedDays.length}</div><div class="stat-label">${t('done_label')}</div></div></div>
      <div class="stat-card"><div class="stat-icon">${STAT_ICONS.left}</div><div><div class="stat-value">${TOTAL_DAYS - completedDays.length}</div><div class="stat-label">${t('left_label')}</div></div></div>
      <div class="stat-card"><div class="stat-icon">${STAT_ICONS.projects}</div><div><div class="stat-value">${projectsDone()}/9</div><div class="stat-label">${t('projects_label')}</div></div></div>
    `;
    $('progressPercent').textContent = Math.round((completedDays.length / TOTAL_DAYS) * 100) + '%';
    $('progressFill').style.width = Math.round((completedDays.length / TOTAL_DAYS) * 100) + '%';
  }

  function renderSections() {
    const container = $('sectionsContainer');
    container.innerHTML = '';
    SECTIONS.forEach(sectionName => {
      const days = ROADMAP.filter(d => d.s === sectionName);
      if (!days.length) return;
      const doneCount = days.filter(d => isDone(d.d)).length;
      const isOpen = expandedAll || (doneCount > 0);
      const groupDiv = document.createElement('div');
      groupDiv.className = 'section-group' + (isOpen ? ' open' : '');
      groupDiv.setAttribute('data-section', sectionName);
      groupDiv.innerHTML = `
        <div class="section-header" data-section="${sectionName}">
          <span style="display:flex; align-items:center; gap:8px;">${SECTION_ICONS[sectionName]} ${sectionName}</span>
          <span style="font-size:0.75rem; color:var(--secondary)">${doneCount}/${days.length}</span>
        </div>
        <div class="section-days">
          ${days.map(d => {
            let cls = 'day-cell';
            if (isDone(d.d)) cls += ' done';
            if (d.d === currentDay && !isDone(d.d)) cls += ' current';
            if (d.type === 'project') cls += ' project';
            if (isLocked(d.d)) cls += ' locked';
            return `<div class="${cls}" data-day="${d.d}">${d.d}</div>`;
          }).join('')}
        </div>
      `;
      container.appendChild(groupDiv);
    });
    attachDayEvents();
    attachSectionToggles();
  }

  function attachDayEvents() {
    document.querySelectorAll('.day-cell:not(.locked)').forEach(cell => {
      cell.addEventListener('click', () => openDayModal(parseInt(cell.dataset.day)));
    });
  }

  function attachSectionToggles() {
    document.querySelectorAll('.section-header').forEach(header => {
      header.addEventListener('click', function(e) {
        e.stopPropagation();
        this.parentElement.classList.toggle('open');
      });
    });
  }

  function renderSectionTabs() {
    const tabs = $('sectionTabs');
    tabs.innerHTML = SECTIONS.map(s => `<button class="section-tab" data-section="${s}">${SECTION_ICONS[s]} ${s.substring(0,8)}</button>`).join('');
    tabs.querySelectorAll('.section-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const section = document.querySelector(`.section-group[data-section="${tab.dataset.section}"]`);
        if (section) {
          section.classList.add('open');
          section.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });
  }

  function renderDrawer() {
    const drawerList = $('drawerList');
    drawerList.innerHTML = SECTIONS.map(s => {
      const days = ROADMAP.filter(d => d.s === s);
      const done = days.filter(d => isDone(d.d)).length;
      return `<div class="drawer-item" data-section="${s}">${SECTION_ICONS[s]} ${s} <span style="margin-left:auto;font-size:0.7rem;">${done}/${days.length}</span></div>`;
    }).join('');
    drawerList.querySelectorAll('.drawer-item').forEach(item => {
      item.addEventListener('click', () => {
        const section = document.querySelector(`.section-group[data-section="${item.dataset.section}"]`);
        if (section) { section.classList.add('open'); section.scrollIntoView({ behavior: 'smooth' }); }
        $('drawer').classList.remove('open');
        $('drawerOverlay').classList.remove('show');
      });
    });
  }

  function openDayModal(dayNum) {
    const day = ROADMAP.find(d => d.d === dayNum);
    if (!day) return;
    const overlay = $('modalOverlay');
    const content = $('modalContent');
    const done = isDone(dayNum);
    content.innerHTML = `
      <h3>${lang === 'en' ? 'Day' : 'اليوم'} ${day.d}: ${getTitle(day)}</h3>
      <p>${getDesc(day)}</p>
      <div style="margin-top:16px; display:flex; gap:8px;">
        <button class="btn btn-primary" id="toggleCompleteBtn">${done ? t('uncomplete_btn') : t('complete_btn')}</button>
        <button class="btn btn-outline" id="closeModalBtn">${t('close_btn')}</button>
      </div>
    `;
    overlay.style.display = 'flex';
    document.getElementById('closeModalBtn').onclick = () => overlay.style.display = 'none';
    document.getElementById('toggleCompleteBtn').onclick = () => {
      if (done) { uncomplete(dayNum); toast(t('toast_undone')); }
      else { complete(dayNum); toast(t('toast_done')); }
      overlay.style.display = 'none';
      renderAll();
    };
  }

  function toast(msg) {
    const panel = $('toastPanel');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    panel.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  $('menuBtn').addEventListener('click', () => {
    $('drawer').classList.toggle('open');
    $('drawerOverlay').classList.toggle('show');
  });
  $('drawerOverlay').addEventListener('click', () => {
    $('drawer').classList.remove('open');
    $('drawerOverlay').classList.remove('show');
  });
  $('continueBtn').addEventListener('click', () => openDayModal(currentDay));
  $('expandBtn').addEventListener('click', () => {
    expandedAll = !expandedAll;
    $('expandBtnText').textContent = expandedAll ? t('collapse_btn') : t('expand_btn');
    renderSections();
  });
  $('resetBtn').addEventListener('click', () => {
    if (confirm(t('reset_confirm'))) {
      completedDays = []; currentDay = 1;
      saveProgress(); renderAll();
    }
  });

  document.getElementById('drawerLogout').addEventListener('click', () => {
    auth.signOut();
  });

  applyLanguage();
})();
</script>
</body>
</html>
