<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DevPath 180 – تعلم البرمجة بخطوات ثابتة</title>
  <style>
    /* ========== متغيرات وأساسيات ========== */
    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --border: #2a2a3a;
      --text: #e0e0e0;
      --text-secondary: #a0a0b8;
      --accent: #6c5ce7;
      --accent-glow: #8b7cf0;
      --success: #2ecc71;
      --danger: #e74c3c;
      --project: #ff6b6b;
      --radius: 12px;
      --transition: 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ========== شريط التنقل العلوي (Mobile first) ========== */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-glow);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-links { display: flex; gap: 8px; }
    .btn {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(108, 92, 231, 0.1); border-color: var(--accent); }
    .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-glow); }
    .btn.danger { color: var(--danger); border-color: var(--danger); }
    .btn.danger:hover { background: rgba(231, 76, 60, 0.1); }

    /* ========== المحتوى الرئيسي ========== */
    .container {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      padding: 16px;
      flex: 1;
    }

    /* ========== بطاقات الإحصائيات ========== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stat-icon {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .stat-info .value { font-size: 1.4rem; font-weight: 700; }
    .stat-info .label { font-size: 0.7rem; color: var(--text-secondary); }

    /* ========== شريط التقدم ========== */
    .progress-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 20px;
    }
    .progress-header {
      display: flex; justify-content: space-between;
      font-size: 0.85rem; margin-bottom: 6px;
    }
    .progress-bar {
      height: 10px; background: #1e1e2e;
      border-radius: 20px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 20px;
      background: linear-gradient(90deg, #6c5ce7, #8b7cf0);
      transition: width 0.4s ease;
    }

    /* ========== أزرار التصفية ========== */
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 16px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-secondary); cursor: pointer;
      font-size: 0.8rem; font-weight: 500;
      transition: all var(--transition);
    }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ========== الأقسام القابلة للطي ========== */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .section-header {
      padding: 14px 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      font-weight: 600; font-size: 0.9rem;
      user-select: none;
    }
    .section-header:hover { background: rgba(255,255,255,0.03); }
    .section-title { display: flex; align-items: center; gap: 6px; }
    .section-arrow { transition: transform 0.3s; }
    .section.open .section-arrow { transform: rotate(180deg); }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
      gap: 6px; padding: 0 12px;
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s;
    }
    .section.open .days-grid {
      max-height: 800px;
      padding: 8px 12px 14px;
      border-top: 1px solid var(--border);
    }

    /* ========== خلايا الأيام ========== */
    .day-cell {
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .day-cell:active { transform: scale(0.95); }
    .day-cell.completed {
      background: rgba(46,204,113,0.2);
      border-color: var(--success);
      color: var(--success);
    }
    .day-cell.completed::after {
      content: '✓'; font-size: 0.5rem; position: absolute; top: 2px; right: 3px;
    }
    .day-cell.current {
      border-color: var(--accent-glow);
      box-shadow: 0 0 12px rgba(108,92,231,0.5);
      color: white;
    }
    .day-cell.locked { opacity: 0.4; pointer-events: none; }
    .day-cell.project {
      border-color: var(--project);
      background: rgba(255,107,107,0.1);
      color: var(--project);
    }
    /* مخفي بواسطة الفلتر */
    .day-cell.hidden { display: none !important; }

    /* ========== المودال ========== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 16px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      max-width: 480px; width: 100%;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h3 { margin-bottom: 8px; }
    .modal .resources { margin-top: 12px; font-size: 0.8rem; }
    .modal .resources a { color: var(--accent-glow); }

    @media (min-width: 768px) {
      .container { padding: 20px 24px; }
      .btn { padding: 10px 20px; }
    }
  </style>
</head>
<body>
  <!-- شريط التنقل -->
  <nav class="navbar">
    <a href="index.html" class="logo">🛤️ DevPath 180</a>
    <div class="nav-links">
      <button class="btn primary" id="continueBtn">▶️ استمر</button>
      <button class="btn" id="jumpBtn">📍 اليوم الحالي</button>
      <button class="btn danger" id="resetBtn">🔄 إعادة</button>
    </div>
  </nav>

  <main class="container">
    <!-- الإحصائيات -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- شريط التقدم -->
    <div class="progress-box">
      <div class="progress-header">
        <span>التقدم العام</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- أزرار التصفية -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">الكل</button>
      <button class="filter-btn" data-filter="completed">✅ مكتمل</button>
      <button class="filter-btn" data-filter="pending">⏳ قيد الانتظار</button>
    </div>

    <!-- الأقسام ستُنشأ هنا -->
    <div id="sectionsContainer"></div>
  </main>

  <!-- المودال -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal"></div>
  </div>

  <script>
    // ====================== 1. نظام الحالة (StateManager) ======================
    const StateManager = {
      _completed: [],
      _currentDay: 1,
      _filter: 'all',
      _openSections: new Set(),

      // التحميل الأولي
      init() {
        const saved = JSON.parse(localStorage.getItem('devpath_state') || '{}');
        this._completed = saved.completedDays || [];
        this._currentDay = saved.currentDay || 1;
        this._filter = saved.filter || 'all';
        this._openSections = new Set(saved.openSections || []);
        // تصحيح اليوم الحالي إذا لزم
        this.syncCurrentDay();
        this.save();
      },

      // حفظ كامل الحالة
      save() {
        localStorage.setItem('devpath_state', JSON.stringify({
          completedDays: this._completed,
          currentDay: this._currentDay,
          filter: this._filter,
          openSections: [...this._openSections]
        }));
      },

      // إكمال يوم معين
      completeDay(dayNum) {
        if (this._completed.includes(dayNum)) return false; // ممنوع التكرار
        this._completed.push(dayNum);
        this._completed.sort((a,b)=>a-b);
        this.syncCurrentDay();
        this.save();
        return true;
      },

      // حساب اليوم الحالي الصحيح
      syncCurrentDay() {
        let next = 1;
        for (let d of this._completed) {
          if (d === next) next++;
          else break;
        }
        this._currentDay = next > 180 ? 180 : next;
      },

      // إعادة تعيين
      reset() {
        this._completed = [];
        this._currentDay = 1;
        this._filter = 'all';
        this._openSections = new Set();
        this.save();
      },

      // الوصول للبيانات
      get completedDays() { return this._completed; },
      get currentDay() { return this._currentDay; },
      get filter() { return this._filter; },
      set filter(val) { this._filter = val; this.save(); },
      isSectionOpen(section) { return this._openSections.has(section); },
      toggleSection(section) {
        if (this._openSections.has(section)) this._openSections.delete(section);
        else this._openSections.add(section);
        this.save();
      },

      // إحصائيات التقدم
      getProgress() {
        const total = 180;
        const completed = this._completed.length;
        const percent = Math.round((completed / total) * 100);
        const projectDays = [10,25,45,65,100,130,150,170,180];
        const projectsDone = projectDays.filter(d => this._completed.includes(d)).length;
        return { completed, percent, projectsDone, totalProjects: projectDays.length };
      }
    };

    // ====================== 2. طبقة واجهة المستخدم (UI) ======================
    const UI = {
      // تحديث الإحصائيات والشريط
      updateStats() {
        const { completed, percent, projectsDone, totalProjects } = StateManager.getProgress();
        document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card"><div class="stat-icon" style="background:rgba(108,92,231,0.2)">📅</div><div class="stat-info"><div class="value">${StateManager.currentDay}</div><div class="label">اليوم الحالي</div></div></div>
          <div class="stat-card"><div class="stat-icon" style="background:rgba(46,204,113,0.2)">✅</div><div class="stat-info"><div class="value">${completed}</div><div class="label">أيام مكتملة</div></div></div>
          <div class="stat-card"><div class="stat-icon" style="background:rgba(243,156,18,0.2)">📈</div><div class="stat-info"><div class="value">${percent}%</div><div class="label">التقدم</div></div></div>
          <div class="stat-card"><div class="stat-icon" style="background:rgba(255,107,107,0.2)">🔥</div><div class="stat-info"><div class="value">${projectsDone}/${totalProjects}</div><div class="label">مشاريع</div></div></div>
        `;
        document.getElementById('progressPercent').textContent = percent + '%';
        document.getElementById('progressFill').style.width = percent + '%';
      },

      // عرض الأقسام حسب الفلتر
      renderSections() {
        const container = document.getElementById('sectionsContainer');
        const filter = StateManager.filter;
        const sections = {};
        roadmap.forEach(day => {
          if (!sections[day.section]) sections[day.section] = [];
          sections[day.section].push(day);
        });

        const sectionOrder = [
          'HTML','CSS','JavaScript Basics','Practice','Advanced JS','Mini Apps',
          'Tools + Git','React','React Practice','Backend','API Practice',
          'Database','DB Integration','Full Stack','Full Project','Deployment'
        ];

        container.innerHTML = '';
        sectionOrder.forEach(sectionName => {
          const days = sections[sectionName];
          if (!days) return;
          const start = days[0].day, end = days[days.length-1].day;
          const completedIn = days.filter(d => StateManager.completedDays.includes(d.day)).length;
          const isOpen = StateManager.isSectionOpen(sectionName);

          const sectionDiv = document.createElement('div');
          sectionDiv.className = `section ${isOpen ? 'open' : ''}`;
          sectionDiv.dataset.section = sectionName;

          sectionDiv.innerHTML = `
            <div class="section-header">
              <span class="section-title">📁 ${sectionName} <span style="font-size:0.7rem;color:var(--text-secondary)">${start}–${end}</span></span>
              <span style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:0.7rem;">${completedIn}/${days.length}</span>
                <span class="section-arrow">▼</span>
              </span>
            </div>
            <div class="days-grid"></div>
          `;

          const grid = sectionDiv.querySelector('.days-grid');
          days.forEach(day => {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            cell.textContent = day.day;
            cell.dataset.day = day.day;
            if (StateManager.completedDays.includes(day.day)) cell.classList.add('completed');
            if (day.day === StateManager.currentDay && !StateManager.completedDays.includes(day.day)) cell.classList.add('current');
            if (day.type === 'project') cell.classList.add('project');
            // قفل اليوم إذا لم يكتمل السابق
            if (day.day > 1 && !StateManager.completedDays.includes(day.day-1) && day.day !== StateManager.currentDay) {
              cell.classList.add('locked');
            }
            // تطبيق الفلتر
            if (filter === 'completed' && !StateManager.completedDays.includes(day.day)) cell.classList.add('hidden');
            if (filter === 'pending' && StateManager.completedDays.includes(day.day)) cell.classList.add('hidden');
            grid.appendChild(cell);
          });

          // أحداث النقر على الخلايا
          grid.querySelectorAll('.day-cell:not(.locked)').forEach(cell => {
            cell.addEventListener('click', () => showDayModal(parseInt(cell.dataset.day)));
          });
          grid.querySelectorAll('.day-cell.locked').forEach(cell => {
            cell.addEventListener('click', () => showDayModal(parseInt(cell.dataset.day), true));
          });

          // حدث فتح/طي القسم
          sectionDiv.querySelector('.section-header').addEventListener('click', () => {
            sectionDiv.classList.toggle('open');
            StateManager.toggleSection(sectionName);
          });

          container.appendChild(sectionDiv);
        });
      },

      // عرض المودال
      showModal(day, locked = false) {
        const overlay = document.getElementById('modalOverlay');
        const modal = document.getElementById('modal');
        const isProject = day.type === 'project';
        const isCompleted = StateManager.completedDays.includes(day.day);

        let resourcesHtml = '';
        if (day.resources && day.resources.length > 0) {
          resourcesHtml = `<div class="resources">📚 مصادر: ${day.resources.map(url => `<a href="${url}" target="_blank">رابط</a>`).join(' | ')}</div>`;
        }

        modal.innerHTML = `
          <h3>📅 اليوم ${day.day}: ${day.title} ${isProject ? '🔥' : ''}</h3>
          <p style="color:var(--text-secondary); margin:8px 0;">${day.desc}</p>
          ${resourcesHtml}
          ${locked ? '<p style="color:orange;">🔒 يجب إكمال اليوم السابق أولاً</p>' : ''}
          <div style="margin-top:16px; display:flex; gap:8px; flex-wrap:wrap;">
            ${!isCompleted && !locked ? '<button class="btn primary" id="modalComplete">✅ إكمال اليوم</button>' : ''}
            <button class="btn" id="modalClose">إغلاق</button>
          </div>
        `;

        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';

        document.getElementById('modalClose').addEventListener('click', () => {
          overlay.style.display = 'none';
          document.body.style.overflow = '';
        });
        overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.style.display = 'none'; document.body.style.overflow = ''; } });

        const completeBtn = document.getElementById('modalComplete');
        if (completeBtn) {
          completeBtn.addEventListener('click', () => {
            if (StateManager.completeDay(day.day)) {
              UI.updateStats();
              UI.renderSections();
              showToast('✅ تم إكمال اليوم ' + day.day);
            }
            overlay.style.display = 'none';
            document.body.style.overflow = '';
          });
        }
      }
    };

    // ====================== 3. طبقة التطبيق (App) ======================
    function showDayModal(dayNum, locked = false) {
      const day = roadmap.find(d => d.day === dayNum);
      if (day) UI.showModal(day, locked);
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.textContent = msg;
      toast.style.position = 'fixed'; toast.style.bottom = '20px'; toast.style.right = '20px';
      toast.style.background = '#2ecc71'; toast.style.color = '#fff'; toast.style.padding = '12px 20px';
      toast.style.borderRadius = '8px'; toast.style.fontWeight = 'bold'; toast.style.zIndex = '999';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // إعداد بيانات roadmap كما هي في النسخة السابقة (أضيفت بعض الموارد الاختيارية)
    const roadmap = [
      // HTML 1-10
      { day:1, title:'مقدمة في تطوير الويب', section:'HTML', type:'learning', desc:'فهم كيفية عمل الويب...', resources:['https://developer.mozilla.org/ar/docs/Learn/Getting_started_with_the_web'] },
      { day:2, title:'هيكل مستند HTML', section:'HTML', type:'learning', desc:'تعلم البنية الأساسية...' },
      { day:3, title:'العناصر النصية والعناوين', section:'HTML', type:'learning', desc:'...' },
      { day:4, title:'الروابط والصور', section:'HTML', type:'learning', desc:'...' },
      { day:5, title:'القوائم والجداول', section:'HTML', type:'learning', desc:'...' },
      { day:6, title:'النماذج وعناصر الإدخال', section:'HTML', type:'learning', desc:'...' },
      { day:7, title:'HTML الدلالي', section:'HTML', type:'learning', desc:'...' },
      { day:8, title:'ميزات HTML5', section:'HTML', type:'learning', desc:'...' },
      { day:9, title:'أساسيات الوصول', section:'HTML', type:'learning', desc:'...' },
      { day:10, title:'🔥 مشروع: صفحة Portfolio', section:'HTML', type:'project', desc:'بناء صفحة شخصية...' },
      // CSS 11-25
      { day:11, title:'تركيب CSS والمحددات', section:'CSS', type:'learning', desc:'...' },
      { day:12, title:'الألوان والخلفيات', section:'CSS', type:'learning', desc:'...' },
      { day:13, title:'نموذج الصندوق', section:'CSS', type:'learning', desc:'...' },
      { day:14, title:'الخطوط والطباعة', section:'CSS', type:'learning', desc:'...' },
      { day:15, title:'العرض والموضع', section:'CSS', type:'learning', desc:'...' },
      { day:16, title:'Flexbox أساسيات', section:'CSS', type:'learning', desc:'...' },
      { day:17, title:'Flexbox متقدم', section:'CSS', type:'learning', desc:'...' },
      { day:18, title:'CSS Grid أساسيات', section:'CSS', type:'learning', desc:'...' },
      { day:19, title:'CSS Grid متقدم', section:'CSS', type:'learning', desc:'...' },
      { day:20, title:'التصميم المتجاوب', section:'CSS', type:'learning', desc:'...' },
      { day:21, title:'الانتقالات والحركات', section:'CSS', type:'learning', desc:'...' },
      { day:22, title:'متغيرات CSS', section:'CSS', type:'learning', desc:'...' },
      { day:23, title:'الفئات والعناصر الزائفة', section:'CSS', type:'learning', desc:'...' },
      { day:24, title:'أفضل الممارسات', section:'CSS', type:'learning', desc:'...' },
      { day:25, title:'🔥 مشروع: صفحة هبوط متجاوبة', section:'CSS', type:'project', desc:'...' },
      // (نكمل بقية الأيام بنفس النمط لضمان 180 يومًا) 
      // للاختصار سأستخدم حلقة لتوليد الأيام المتبقية مع عناوين وأقسام
    ];

    // توليد بقية الأيام (لضمان وجود 180 يوم كامل)
    const fullRoadmap = [
      ...roadmap,
      // JavaScript Basics 26-37
      ...Array.from({length:12}, (_,i) => ({ day:26+i, title:`أساسيات JS - ${i+1}`, section:'JavaScript Basics', type:'learning', desc:'...' })),
      // Practice 38-45
      ...Array.from({length:8}, (_,i) => ({ day:38+i, title:`تدريب ${i+1}`, section:'Practice', type:i===7?'project':'learning', desc:'...' })),
      // Advanced JS 46-55
      ...Array.from({length:10}, (_,i) => ({ day:46+i, title:`JS متقدم ${i+1}`, section:'Advanced JS', type:'learning', desc:'...' })),
      // Mini Apps 56-65
      ...Array.from({length:10}, (_,i) => ({ day:56+i, title:`تطبيق مصغر ${i+1}`, section:'Mini Apps', type:i===9?'project':'learning', desc:'...' })),
      // Tools + Git 66-70
      ...Array.from({length:5}, (_,i) => ({ day:66+i, title:`أدوات ${i+1}`, section:'Tools + Git', type:'learning', desc:'...' })),
      // React 71-83
      ...Array.from({length:13}, (_,i) => ({ day:71+i, title:`React ${i+1}`, section:'React', type:'learning', desc:'...' })),
      // React Practice 84-100
      ...Array.from({length:17}, (_,i) => ({ day:84+i, title:`تدريب React ${i+1}`, section:'React Practice', type:i===16?'project':'learning', desc:'...' })),
      // Backend 101-110
      ...Array.from({length:10}, (_,i) => ({ day:101+i, title:`Backend ${i+1}`, section:'Backend', type:'learning', desc:'...' })),
      // API Practice 111-130
      ...Array.from({length:20}, (_,i) => ({ day:111+i, title:`API ${i+1}`, section:'API Practice', type:i===19?'project':'learning', desc:'...' })),
      // Database 131-136
      ...Array.from({length:6}, (_,i) => ({ day:131+i, title:`قواعد بيانات ${i+1}`, section:'Database', type:'learning', desc:'...' })),
      // DB Integration 137-150
      ...Array.from({length:14}, (_,i) => ({ day:137+i, title:`تكامل قواعد البيانات ${i+1}`, section:'DB Integration', type:i===13?'project':'learning', desc:'...' })),
      // Full Stack 151-155
      ...Array.from({length:5}, (_,i) => ({ day:151+i, title:`Full Stack ${i+1}`, section:'Full Stack', type:'learning', desc:'...' })),
      // Full Project 156-170
      ...Array.from({length:15}, (_,i) => ({ day:156+i, title:`مشروع كامل ${i+1}`, section:'Full Project', type:i===14?'project':'learning', desc:'...' })),
      // Deployment 171-180
      ...Array.from({length:10}, (_,i) => ({ day:171+i, title:`نشر ${i+1}`, section:'Deployment', type:i===9?'project':'learning', desc:'...' })),
    ];

    // التأكد من أن الأيام 180 بالضبط
    const finalRoadmap = fullRoadmap.slice(0,180);

    // ====================== 4. ربط الأحداث الرئيسية ======================
    document.getElementById('continueBtn').addEventListener('click', () => showDayModal(StateManager.currentDay));
    document.getElementById('jumpBtn').addEventListener('click', () => {
      const sectionName = finalRoadmap.find(d => d.day === StateManager.currentDay).section;
      const sectionDiv = document.querySelector(`.section[data-section="${sectionName}"]`);
      if (sectionDiv) {
        sectionDiv.classList.add('open');
        StateManager._openSections.add(sectionName);
        StateManager.save();
        sectionDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => {
          const cell = sectionDiv.querySelector(`.day-cell[data-day="${StateManager.currentDay}"]`);
          if (cell) cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
      }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      if (confirm('هل أنت متأكد من إعادة تعيين كل التقدم؟')) {
        StateManager.reset();
        UI.updateStats();
        UI.renderSections();
        showToast('🔄 تم إعادة التعيين');
      }
    });

    // أزرار التصفية
    document.getElementById('filterBar').addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        StateManager.filter = e.target.dataset.filter;
        UI.renderSections();
      }
    });

    // تشغيل التطبيق
    StateManager.init();
    UI.updateStats();
    UI.renderSections();

    // استعادة الفلتر النشط في الأزرار
    document.querySelector(`.filter-btn[data-filter="${StateManager.filter}"]`).classList.add('active');
  </script>
</body>
</html>
