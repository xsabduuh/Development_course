  <title>DevPath 180 • Code Notes Pro</title>

  <style>
    :root {
      --bg: #0a0a14;
      --surface: #0f0f1f;
      --surface2: #16162a;
      --surface3: #1e1e3a;
      --border: #252545;
      --border2: #333360;
      --border3: #404080;
      --text: #e0e0f0;
      --text2: #9090b0;
      --text3: #606080;
      --text4: #404060;
      --accent: #5b5bf0;
      --accent2: #7b7bff;
      --accent3: #a0a0ff;
      --success: #2dd4bf;
      --danger: #f87171;
      --danger2: #ef4444;
      --warning: #fbbf24;
      --orange: #fb923c;
      --pink: #f472b6;
      --cyan: #22d3ee;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', 'Space Mono', 'Consolas', monospace;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      display: flex;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border3); }

    /* ========== SIDEBAR ========== */
    .sidebar {
      width: 320px; min-width: 320px;
      height: 100vh; height: 100dvh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: transform var(--transition-slow);
      z-index: 20;
      position: relative;
    }
    
    .sidebar::before {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; width: 1px;
      background: linear-gradient(180deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    
    .logo {
      font-family: var(--mono);
      font-weight: 700; font-size: 1rem;
      color: var(--success);
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo svg { width: 24px; height: 24px; }
    
    .btn-new {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      padding: 9px 16px;
      border-radius: var(--radius-xs);
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem;
      transition: all var(--transition);
      box-shadow: 0 4px 16px rgba(91,91,240,0.3);
      font-family: var(--font);
    }
    .btn-new:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(91,91,240,0.4); }
    .btn-new:active { transform: scale(0.97); }
    .btn-new svg { width: 18px; height: 18px; }

    /* Search bar */
    .search-bar {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
    }
    .search-input-wrapper {
      position: relative;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 36px 9px 12px;
      border-radius: var(--radius-xs);
      font-size: 0.8rem;
      outline: none;
      font-family: var(--font);
      transition: all var(--transition);
    }
    .search-input:focus {
      border-color: var(--accent);
      background: var(--surface3);
      box-shadow: 0 0 0 3px rgba(91,91,240,0.1);
    }
    .search-input::placeholder { color: var(--text3); }
    .search-icon {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      pointer-events: none;
    }

    .filter-bar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .filter-chip {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      transition: all var(--transition);
      white-space: nowrap;
      font-family: var(--font);
    }
    .filter-chip.active {
      background: rgba(91,91,240,0.15);
      border-color: var(--accent);
      color: var(--accent2);
      box-shadow: 0 0 12px rgba(91,91,240,0.15);
    }
    .filter-chip:hover:not(.active) {
      border-color: var(--border2);
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .note-item {
      padding: 14px 16px;
      margin: 4px 0;
      border-radius: var(--radius-xs);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all var(--transition);
      position: relative;
      background: transparent;
    }
    .note-item:hover { 
      background: rgba(255,255,255,0.02); 
      border-color: var(--border);
    }
    .note-item.active {
      background: rgba(91,91,240,0.08);
      border-color: rgba(91,91,240,0.3);
      box-shadow: 0 0 20px rgba(91,91,240,0.05);
    }
    .note-item-title {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .note-item-meta {
      display: flex; align-items: center; gap: 8px;
    }
    .note-item-lang {
      font-size: 0.65rem;
      color: var(--accent2);
      background: rgba(91,91,240,0.15);
      padding: 3px 10px;
      border-radius: 4px;
      font-weight: 600;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .note-item-date {
      font-size: 0.65rem;
      color: var(--text3);
      font-family: var(--mono);
    }
    .note-item-delete {
      position: absolute;
      right: 10px;
      top: 50%;
         ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border3); }

    .sidebar-footer {

    .sidebar-footer .stats {

    /* ========== MAIN EDITOR ========== */
    .main {
      flex: 1;
      height: 100vh; height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      min-width: 0;
      position: relative;
    }

    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      background: rgba(10,10,20,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
    }
    
    .title-input {
      flex: 1;
      min-width: 150px;
      background: transparent;
      border: none;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      font-family: var(--font);
      outline: none;
      letter-spacing: -0.5px;
    }
    .title-input::placeholder { color: var(--text3); }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    .lang-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 8px 14px;
      border-radius: var(--radius-xs);
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font);
      font-weight: 500;
    }
    .lang-select:focus {

    }

      font-family: var(--font);
    }
    .btn:active { transform: scale(0.96); }
    .btn-ghost {

      border: 1px solid var(--border);
      color: var(--text2);
    }
    .btn-ghost:hover { border-color: var(--border2); color: #fff; background: rgba(255,255,255,0.03); }

    }

      transition: all var(--transition);
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .note-item:hover .note-item-delete { opacity: 1; }
    .note-item-delete:hover { 
      color: var(--danger); 
      background: rgba(248,113,113,0.1);
    }

    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--text3);
      text-align: center;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-footer .stats {
      display: flex; gap: 12px;
    }
    .sidebar-footer .stats span {
      font-family: var(--mono);
      color: var(--text2);
    }

    /* ========== MAIN EDITOR ========== */
    .main {
      flex: 1;
      height: 100vh; height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      min-width: 0;
      position: relative;
    }

    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      background: rgba(10,10,20,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
    }
    
    .title-input {
      flex: 1;
      min-width: 150px;
      background: transparent;
      border: none;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      font-family: var(--font);
      outline: none;
      letter-spacing: -0.5px;
    }
    .title-input::placeholder { color: var(--text3); }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    .lang-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 8px 14px;
      border-radius: var(--radius-xs);
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font);
      font-weight: 500;
    }
    .lang-select:focus { 
      border-color: var(--accent); 
      box-shadow: 0 0 0 3px rgba(91,91,240,0.1);
    }

    .btn {
      padding: 8px 14px;
      border-radius: var(--radius-xs);
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition);
      white-space: nowrap;
      font-family: var(--font);
    }
    .btn:active { transform: scale(0.96); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
    }
    .btn-ghost:hover { border-color: var(--border2); color: #fff; background: rgba(255,255,255,0.03); }
    .btn-primary { 
      background: linear-gradient(135deg, var(--accent), var(--accent2)); 
      color: #fff; 
      box-shadow: 0 4px 16px rgba(91,91,240,0.3);
    }
    .btn-primary:hover { 
      box-shadow: 0 6px 24px rgba(91,91,240,0.4);
      transform: translateY(-1px);
    }
    .btn-danger {
      background: transparent;
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--danger);
    }
    .btn-danger:hover {
      background: rgba(248,113,113,0.1);
      border-color: var(--danger);
    }

    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ========== CODE EDITOR ========== */
    .code-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      overflow: hidden;
    }
    
    /* Line numbers */
    .line-numbers {
      width: 50px;
      min-width: 50px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 18px 0;
      text-align: right;
      color: var(--text3);
      font-family: var(--mono);
      font-size: 0.85rem;
      line-height: 1.7;
      overflow: hidden;
      user-select: none;
    }
    .line-numbers span {
      display: block;
      padding-right: 12px;
      transition: color var(--transition);
    }
    .line-numbers span.active {
      color: var(--accent2);
      font-weight: 600;
    }

    .code-textarea {
      flex: 1;
      background: transparent;
      border: none;
      padding: 18px 20px;
      color: transparent;
      caret-color: #fff;
      font-family: var(--mono);
      font-size: 0.9rem;
      line-height: 1.7;
      resize: none;
      outline: none;
      z-index: 2;
      position: relative;
      white-space: pre;
      overflow: auto;
      tab-size: 2;
      -moz-tab-size: 2;
    }
    .code-textarea::selection {
      background: rgba(91,91,240,0.3);
      color: transparent;
    }
    
    .code-preview {
      position: absolute;
      top: 0; left: 50px; right: 0; bottom: 0;
      padding: 18px 20px;
      font-family: var(--mono);
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .code-preview code { background: transparent !important; padding: 0 !important; }

    /* Floating buttons */
    .floating-btns {
      position: absolute;
      top: 14px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 5;
    }
    .copy-btn, .run-btn, .format-btn {
      padding: 7px 14px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: rgba(15,15,31,0.9);
      color: var(--text2);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: var(--font);
    }
    .copy-btn:hover, .run-btn:hover, .format-btn:hover { 
      border-color: var(--accent); 
      color: #fff; 
      background: var(--surface2);
    }
    .copy-btn.copied { 
      border-color: var(--success); 
      color: var(--success); 
      background: rgba(45,212,191,0.1);
      animation: pulse 0.3s ease;
    }
    .copy-btn svg, .run-btn svg, .format-btn svg { width: 14px; height: 14px; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      display: flex;
      flex: 1;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      flex-direction: column;
      text-align: center;
      padding: 40px;
    }
    .empty-state svg {
      color: var(--border2);
      margin-bottom: 20px;
      transition: color var(--transition);
    }
    .empty-state:hover svg { color: var(--border3); }
    .empty-state h3 {
      font-size: 1.1rem;
      color: var(--text2);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .empty-state p {
      font-size: 0.85rem;
      color: var(--text3);
      max-width: 300px;
      line-height: 1.6;
    }
    .empty-state .shortcut-hint {
      margin-top: 20px;
      padding: 8px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text2);
    }

    /* ========== EDITOR FOOTER ========== */
    .editor-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text3);
      background: var(--surface);
      font-family: var(--mono);
    }
    .editor-footer .stats {
      display: flex; gap: 16px;
    }
    .editor-footer .stat-item {
      display: flex; align-items: center; gap: 4px;
    }
    .editor-footer .stat-item .label { color: var(--text4); }
    .editor-footer .stat-item .value { color: var(--text2); }

    /* ========== TOAST ========== */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 12px 20px;
      border-radius: var(--radius-xs);
      font-weight: 600;
      font-size: 0.85rem;
      box-shadow: var(--shadow);
      animation: toastSlide 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
      font-family: var(--font);
      min-width: 200px;
    }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .toast.info { border-color: var(--accent); color: var(--accent2); }
    .toast.warning { border-color: var(--warning); color: var(--warning); }
    
    @keyframes toastSlide {
      from { opacity: 0; transform: translateX(30px) scale(0.95); }
      to { opacity: 1; transform: none; }
    }
    @keyframes toastOut {
      to { opacity: 0; transform: translateX(30px) scale(0.95); }
    }

    /* ========== RUN MODAL ========== */
    .run-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: fadeIn 0.2s ease;
    }
    .run-modal.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .run-frame {
      width: 90%;
      height: 85%;
      background: #fff;
      border-radius: var(--radius);
      border: none;
      box-shadow: var(--shadow-lg);
    }
    .close-run-btn {
      position: absolute;
      top: 24px;
      right: 32px;
      background: var(--danger);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius-xs);
      font-weight: 600;
      cursor: pointer;
      z-index: 5;
      font-family: var(--font);
      transition: all var(--transition);
      display: flex; align-items: center; gap: 6px;
    }
    .close-run-btn:hover { background: var(--danger2); transform: scale(1.02); }

    /* ========== DELETE CONFIRM ========== */
    .confirm-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .confirm-modal.show { display: flex; }
    .confirm-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      animation: scaleIn 0.25s ease;
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .confirm-box h3 {
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: var(--text);
    }
    .confirm-box p {
      font-size: 0.85rem;
      color: var(--text2);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .confirm-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .confirm-actions .btn {
      flex: 1;
      justify-content: center;
    }

    /* ========== MOBILE ========== */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
        width: 85vw;
        max-width: 340px;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 30;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .sidebar-overlay.show { display: block; }
      .menu-toggle {
        display: flex !important;
      }
      .editor-toolbar { 
        gap: 8px; 
        padding: 12px 16px;
        padding-top: max(12px, env(safe-area-inset-top));
      }
      .btn { padding: 8px 12px; font-size: 0.75rem; }
      .title-input { font-size: 1.1rem; }
      .code-textarea, .code-preview { padding: 14px 16px; font-size: 0.85rem; }
      .line-numbers { width: 40px; min-width: 40px; font-size: 0.8rem; }
      .code-preview { left: 40px; }
      .floating-btns { top: 10px; right: 12px; }
      .copy-btn, .run-btn, .format-btn { padding: 6px 10px; font-size: 0.7rem; }
      .editor-footer { padding: 8px 16px; font-size: 0.7rem; }
      .toast-container { bottom: 16px; right: 16px; left: 16px; }
      .toast { min-width: auto; }
    }
    
    .menu-toggle {
      display: none;
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 50;
      background: var(--surface);
      border: 1px solid var(--border);
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: var(--radius-xs);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.3rem;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
    }
    .menu-toggle:hover { background: var(--surface2); }

    /* ========== ANIMATIONS ========== */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: none; }
    }
    
    .note-item { animation: slideIn 0.2s ease; }
  </style>
</head>
<body>

<!-- Mobile menu toggle -->
<button class="menu-toggle" id="menuToggle" aria-label="Open menu">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ========== SIDEBAR ========== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="index.html" class="logo" title="Back to Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 17 10 11 4 5"></polyline>
        <line x1="8" y1="11" x2="20" y2="11"></line>
        <polyline points="14 17 20 11 14 5"></polyline>
      </svg>
      Code Notes
    </a>
    <button class="btn-new" id="newNoteBtn" title="New Note (Ctrl+N)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New
    </button>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <div class="search-input-wrapper">
      <input type="text" class="search-input" id="searchInput" placeholder="Search notes..." autocomplete="off">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-chip active" data-cat="all">All</button>
    <button class="filter-chip" data-cat="html">HTML</button>
    <button class="filter-chip" data-cat="css">CSS</button>
    <button class="filter-chip" data-cat="javascript">JS</button>
    <button class="filter-chip" data-cat="jsx">React</button>
    <button class="filter-chip" data-cat="python">Python</button>
    <button class="filter-chip" data-cat="sql">SQL</button>
    <button class="filter-chip" data-cat="bash">Bash</button>
  </div>

  <!-- Notes list -->
  <div class="notes-list" id="notesList"></div>

  <div class="sidebar-footer">
    <div class="stats">
      <span id="noteCount">0 notes</span>
      <span id="totalChars">0 chars</span>
    </div>
    <span style="font-family: var(--mono);">v2.0</span>
  </div>
</aside>

<!-- ========== MAIN EDITOR ========== -->
<main class="main" id="mainEditor">
  <div class="editor-toolbar">
    <input type="text" class="title-input" id="editorTitle" placeholder="Note title..." aria-label="Note title">
    
    <div class="toolbar-divider"></div>
    
    <select class="lang-select" id="editorLang" aria-label="Programming language">
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="javascript">JavaScript</option>
      <option value="jsx">React JSX</option>
      <option value="typescript">TypeScript</option>
      <option value="json">JSON</option>
      <option value="python">Python</option>
      <option value="sql">SQL</option>
      <option value="bash">Bash</option>
      <option value="cpp">C++</option>
      <option value="java">Java</option>
      <option value="php">PHP</option>
      <option value="markdown">Markdown</option>
      <option value="plaintext">Plain Text</option>
    </select>

    <div class="toolbar-divider"></div>

    <button class="btn btn-ghost" id="exportBtn" title="Export all notes">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    
    <label class="btn btn-ghost" style="cursor: pointer;" title="Import notes">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import
      <input type="file" id="importBtn" accept=".json" style="display: none;">
    </label>
  </div>

  <div class="editor-area" id="editorArea">
    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <h3>No note selected</h3>
      <p>Select a note from the sidebar or create a new one to start coding.</p>
      <div class="shortcut-hint">⌘N / Ctrl+N to create new</div>
    </div>

    <!-- Code editor -->
    <div class="code-wrapper" id="codeWrapper" style="display:none;">
      <div class="line-numbers" id="lineNumbers">1</div>
      <textarea class="code-textarea" id="codeTextarea" placeholder="// Write your code here..." spellcheck="false" wrap="off" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
      <pre class="code-preview" id="codePreview"><code class="hljs" id="codeHighlight"></code></pre>

      <!-- Floating buttons -->
      <div class="floating-btns">
        <button class="format-btn" id="formatBtn" title="Format code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H3M21 6H3M21 14H3M21 18H3"/></svg>
          Format
        </button>
        <button class="copy-btn" id="copyBtn" title="Copy all code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
        <button class="run-btn" id="runBtn" title="Run HTML/CSS/JS">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Run
        </button>
      </div>
    </div>
  </div>

  <div class="editor-footer">
    <div class="stats">
      <div class="stat-item">
        <span class="label">Lines:</span>
        <span class="value" id="lineCount">1</span>
      </div>
      <div class="stat-item">
        <span class="label">Chars:</span>
        <span class="value" id="charCounter">0</span>
      </div>
      <div class="stat-item">
        <span class="label">Words:</span>
        <span class="value" id="wordCount">0</span>
      </div>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-danger" id="deleteNoteBtn" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Delete
      </button>
      <button class="btn btn-primary" id="saveNoteBtn" title="Save (Ctrl+S)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
    </div>
  </div>
</main>

<!-- ========== RUN MODAL ========== -->
<div class="run-modal" id="runModal">
  <button class="close-run-btn" id="closeRunModal">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    Close
  </button>
  <iframe class="run-frame" id="runFrame" sandbox="allow-scripts allow-modals allow-popups"></iframe>
</div>

<!-- ========== DELETE CONFIRM ========== -->
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-box">
    <h3>🗑️ Delete Note?</h3>
    <p>This action cannot be undone. The note will be permanently removed.</p>

<!-- highlight.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
(function() {
  'use strict';

  // ════════════════════════════════════════
  // 1. STORAGE & STATE
  // ════════════════════════════════════════
  const STORAGE_KEY = 'dp_notes_db_v2';
  const BACKUP_KEY = 'dp_notes_backup';

  const getNotes = () => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  };

  const saveNotes = (notes) => {
    try { 
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      // Auto backup
      localStorage.setItem(BACKUP_KEY, JSON.stringify(notes));
    }
    catch(e) { 
      showToast('⚠️ Storage full! Export your notes', 'warning');
    }
  };

  // State
  let notes = getNotes();
  let currentNoteId = null;
  let activeFilter = 'all';
  let searchQuery = '';
  let autoSaveTimer = null;
  let isTyping = false;
  let deleteTargetId = null;

  // ════════════════════════════════════════
  // 2. DOM REFERENCES
  // ════════════════════════════════════════
  const $ = (id) => document.getElementById(id);

  // Sidebar
  const notesListEl    = $('notesList');
  const noteCountEl    = $('noteCount');
  const totalCharsEl   = $('totalChars');
  const newNoteBtn     = $('newNoteBtn');
  const filterBar      = $('filterBar');
  const searchInput    = $('searchInput');

  // Editor
  const editorTitle    = $('editorTitle');
  const codeTextarea   = $('codeTextarea');
  const codeHighlight  = $('codeHighlight');
  const codePreview    = $('codePreview');
  const codeWrapper    = $('codeWrapper');
  const editorLang     = $('editorLang');
  const emptyState     = $('emptyState');
  const deleteNoteBtn  = $('deleteNoteBtn');
  const saveNoteBtn    = $('saveNoteBtn');
  const charCounter    = $('charCounter');
  const lineCountEl    = $('lineCount');
  const wordCountEl    = $('wordCount');
  const lineNumbers    = $('lineNumbers');
  const copyBtn        = $('copyBtn');
  const runBtn         = $('runBtn');
  const formatBtn      = $('formatBtn');
  const exportBtn      = $('exportBtn');
  const importBtn      = $('importBtn');

  // Mobile
  const menuToggle     = $('menuToggle');
  const sidebarEl      = $('sidebar');
  const sidebarOverlay = $('sidebarOverlay');

  // Modals
  const runModal       = $('runModal');
  const runFrame       = $('runFrame');
  const closeRunBtn    = $('closeRunModal');
  const confirmModal   = $('confirmModal');
  const cancelDelete   = $('cancelDelete');
  const confirmDelete  = $('confirmDelete');

  // ════════════════════════════════════════
  // 3. SIDEBAR RENDERING
  // ════════════════════════════════════════
  function renderSidebar() {
    let filtered = notes;
    
    // Filter by category
    if (activeFilter !== 'all') {
      filtered = filtered.filter(n => n.lang === activeFilter);
    }
    
    // Filter by search
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(n => 
        (n.title || '').toLowerCase().includes(q) ||
        (n.content || '').toLowerCase().includes(q)
      );
    }
    
    // Sort by updatedAt desc
    filtered.sort((a, b) => b.updatedAt - a.updatedAt);

    notesListEl.innerHTML = filtered.map(note => `
      <div class="note-item ${note.id === currentNoteId ? 'active' : ''}" data-id="${note.id}">
        <div class="note-item-title">${escapeHtml(note.title || 'Untitled')}</div>
        <div class="note-item-meta">
          <span class="note-item-lang">${getLangLabel(note.lang)}</span>
          <span class="note-item-date">${formatDate(note.updatedAt)}</span>
        </div>
        <button class="note-item-delete" data-del="${note.id}" title="Delete">✕</button>
      </div>
    `).join('');

    // Click to open
    notesListEl.querySelectorAll('.note-item').forEach(item => {
      item.addEventListener('click', (e) => {
        if (e.target.closest('[data-del]')) return;
        const id = item.dataset.id;
        if (id) openNote(id);
      });
    });

    // Delete buttons
    notesListEl.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        showDeleteConfirm(btn.dataset.del);
      });
    });

    // Update stats
    noteCountEl.textContent = `${filtered.length} note${filtered.length !== 1 ? 's' : ''}`;
    const totalChars = notes.reduce((sum, n) => sum + (n.content?.length || 0), 0);
    totalCharsEl.textContent = `${formatNumber(totalChars)} chars`;
  }

  // ════════════════════════════════════════
  // 4. NOTE OPERATIONS
  // ════════════════════════════════════════
  function openNote(id) {
    if (currentNoteId && currentNoteId !== id) {
      saveCurrentNote(true);
    }

    const note = notes.find(n => n.id === id);
    if (!note) return;

    currentNoteId = id;
    editorTitle.value = note.title || '';
    codeTextarea.value = note.content || '';
    editorLang.value = note.lang || 'plaintext';
    
    emptyState.style.display = 'none';
    codeWrapper.style.display = 'flex';
    deleteNoteBtn.style.display = 'inline-flex';

    updateHighlighting();
    updateStats();
    updateLineNumbers();
    renderSidebar();
    
    // Close mobile sidebar
    sidebarEl.classList.remove('open');
    sidebarOverlay.classList.remove('show');
    
    // Focus
    setTimeout(() => codeTextarea.focus(), 100);
  }

  function createNewNote() {
    saveCurrentNote(true);
    
    const newNote = {
      id: generateId(),
      title: '',
      content: '',
      lang: 'html',
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    
    notes.unshift(newNote);
    saveNotes(notes);
    openNote(newNote.id);
    showToast('✨ New note created', 'success');
  }

  function showDeleteConfirm(id) {
    deleteTargetId = id;
    confirmModal.classList.add('show');
  }

  function hideDeleteConfirm() {
    deleteTargetId = null;
    confirmModal.classList.remove('show');
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    saveNotes(notes);
    
    if (currentNoteId === id) {
      currentNoteId = null;
      clearEditor();
    }
    
    renderSidebar();
    showToast('🗑️ Note deleted', 'success');
    hideDeleteConfirm();
  }

  function clearEditor() {
    editorTitle.value = '';
    codeTextarea.value = '';
    codeHighlight.textContent = '';
    currentNoteId = null;
    emptyState.style.display = 'flex';
    codeWrapper.style.display = 'none';
    deleteNoteBtn.style.display = 'none';
    updateStats();
    updateLineNumbers();
    renderSidebar();
  }

  // ════════════════════════════════════════
  // 5. SAVE & AUTO-SAVE
  // ════════════════════════════════════════
  function saveCurrentNote(silent = false) {
    if (!currentNoteId) return;
    const note = notes.find(n => n.id === currentNoteId);
    if (!note) return;

    const oldTitle = note.title;
    const oldContent = note.content;

    note.title = editorTitle.value.trim();
    note.content = codeTextarea.value;
    note.lang = editorLang.value;
    note.updatedAt = Date.now();

    // Only save if changed
    if (oldTitle !== note.title || oldContent !== note.content) {
      saveNotes(notes);
      if (!silent) showToast('💾 Saved', 'success');
      renderSidebar();
    }
  }

  function autoSave() {
    if (!currentNoteId) return;
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
      if (isTyping) {
        saveCurrentNote(true);
        isTyping = false;
      }
    }, 1500);
  }

  // ════════════════════════════════════════
  // 6. SYNTAX HIGHLIGHTING
  // ════════════════════════════════════════
  function updateHighlighting() {
    const code = codeTextarea.value;
    const lang = editorLang.value;

    let highlighted = '';
    if (lang === 'plaintext' || !lang) {
      highlighted = escapeHtml(code);
    } else {
      try {
        const result = hljs.highlight(code, { language: lang, ignoreIllegals: true });
        highlighted = result.value;
      } catch (e) {
        highlighted = escapeHtml(code);
      }
    }
    
    codeHighlight.innerHTML = highlighted;
    syncScroll();
  }

  function syncScroll() {
    codePreview.scrollTop = codeTextarea.scrollTop;
    codePreview.scrollLeft = codeTextarea.scrollLeft;
    lineNumbers.scrollTop = codeTextarea.scrollTop;
  }

  // ════════════════════════════════════════
  // 7. LINE NUMBERS
  // ════════════════════════════════════════
  function updateLineNumbers() {
    const lines = codeTextarea.value.split('\n').length;
    const currentLine = getCurrentLine();
    
    let html = '';
    for (let i = 1; i <= lines; i++) {
      html += `<span class="${i === currentLine ? 'active' : ''}">${i}</span>`;
    }
    lineNumbers.innerHTML = html;
  }

  function getCurrentLine() {
    const text = codeTextarea.value.substring(0, codeTextarea.selectionStart);
    return text.split('\n').length;
  }

  // ════════════════════════════════════════
  // 8. COPY CODE
  // ════════════════════════════════════════
  async function copyFullCode() {
    const code = codeTextarea.value;
    if (!code.trim()) {
      showToast('⚠️ Nothing to copy', 'warning');
      return;
    }
    
    try {
      await navigator.clipboard.writeText(code);
      copyBtn.classList.add('copied');
      copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
      }, 2000);
      
      showToast('📋 Code copied to clipboard', 'success');
    } catch (err) {
      showToast('⚠️ Copy failed', 'error');
    }
  }

  // ════════════════════════════════════════
  // 9. RUN CODE
  // ════════════════════════════════════════
  function runCode() {
    const code = codeTextarea.value;
    const lang = editorLang.value;

    if (!code.trim()) {
      showToast('⚠️ Nothing to run', 'warning');
      return;
    }

    let html = code;
    if (lang === 'css') {
      html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${code}</style></head><body></body></html>`;
    } else if (lang === 'javascript') {
      html = `<!DOCTYPE html><html><body><script>${code}<\/script></body></html>`;
    } else if (lang === 'html') {
      if (!code.includes('<!DOCTYPE')) {
        html = `<!DOCTYPE html><html>${code}</html>`;
      }
    } else {
      showToast('⚠️ Can only run HTML, CSS, or JS', 'warning');
      return;
    }

    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    runFrame.src = url;
    runModal.classList.add('show');
  }

  // ════════════════════════════════════════
  // 10. FORMAT CODE (Simple)
  // ════════════════════════════════════════
  function formatCode() {
    const lang = editorLang.value;
    let code = codeTextarea.value;
    
    if (!code.trim()) return;
    
    // Simple formatting
    if (lang === 'json') {
      try {
        code = JSON.stringify(JSON.parse(code), null, 2);
        codeTextarea.value = code;
        updateHighlighting();
        updateStats();
        updateLineNumbers();
        showToast('✨ Formatted', 'success');
      } catch(e) {
        showToast('⚠️ Invalid JSON', 'error');
      }
      return;
    }
    
    // Basic indentation cleanup
    const lines = code.split('\n');
    let indent = 0;
    const formatted = lines.map(line => {
      const trimmed = line.trim();
      if (trimmed.endsWith('{') || trimmed.endsWith('[') || trimmed.endsWith('(')) {
        const result = '  '.repeat(indent) + trimmed;
        indent++;
        return result;
      } else if (trimmed.startsWith('}') || trimmed.startsWith(']') || trimmed.startsWith(')')) {
        indent = Math.max(0, indent - 1);
        return '  '.repeat(indent) + trimmed;
      }
      return '  '.repeat(indent) + trimmed;
    }).join('\n');
    
    codeTextarea.value = formatted;
    updateHighlighting();
    updateStats();
    updateLineNumbers();
    showToast('✨ Formatted', 'success');
  }

  // ════════════════════════════════════════
  // 11. EXPORT / IMPORT
  // ════════════════════════════════════════
  function exportNotes() {
    const data = {
      version: '2.0',
      exportedAt: new Date().toISOString(),
      notes: notes
    };
    
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `code-notes-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📤 Exported successfully', 'success');
  }

  function importNotes(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.notes && Array.isArray(data.notes)) {
          notes = data.notes;
          saveNotes(notes);
          renderSidebar();
          showToast(`📥 Imported ${data.notes.length} notes`, 'success');
        } else {
          showToast('⚠️ Invalid file format', 'error');
        }
      } catch(err) {
        showToast('⚠️ Failed to import', 'error');
      }
    };
    reader.readAsText(file);
  }

  // ════════════════════════════════════════
  // 12. SMART TYPING (Tab, Brackets)
  // ════════════════════════════════════════
  function handleSmartInput(e) {
    const ta = codeTextarea;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const value = ta.value;
    
    // Tab key
    if (e.key === 'Tab') {
      e.preventDefault();
      ta.value = value.substring(0, start) + '  ' + value.substring(end);
      ta.selectionStart = ta.selectionEnd = start + 2;
      triggerUpdate();
      return;
    }
    
    // Auto-brackets
    const pairs = { '(': ')', '[': ']', '{': '}', '"': '"', "'": "'", '`': '`' };
    if (pairs[e.key] && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      ta.value = value.substring(0, start) + e.key + pairs[e.key] + value.substring(end);
      ta.selectionStart = ta.selectionEnd = start + 1;
      triggerUpdate();
      return;
    }
    
    // Auto-indent on Enter
    if (e.key === 'Enter') {
      e.preventDefault();
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      const currentLine = value.substring(lineStart, start);
      const indent = currentLine.match(/^\s*/)[0];
      
      // Check if line ends with opening bracket
      const trimmed = currentLine.trim();
      let extraIndent = '';
      if (trimmed.endsWith('{') || trimmed.endsWith('[') || trimmed.endsWith('(')) {
        extraIndent = '  ';
      }
      
      ta.value = value.substring(0, start) + '\n' + indent + extraIndent + value.substring(end);
      ta.selectionStart = ta.selectionEnd = start + 1 + indent.length + extraIndent.length;
      triggerUpdate();
      return;
    }
  }

  function triggerUpdate() {
    isTyping = true;
    updateHighlighting();
    updateStats();
    updateLineNumbers();
    autoSave();
  }

  // ════════════════════════════════════════
  // 13. STATS
  // ════════════════════════════════════════
  function updateStats() {
    const text = codeTextarea.value;
    const chars = text.length;
