<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevPath 180 • Notes Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #000;
      --card: #1a1a24;
      --border: #2a2a36;
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --accent2: #409cff;
      --green: #30d158;
      --red: #ff453a;
      --radius: 14px;
      --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      --shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .app { flex: 1; display: flex; flex-direction: column; min-height: 100dvh; }
    ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    .home-view { display: none; flex-direction: column; flex: 1; padding: 16px; }
    .home-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
    .home-title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex: 1;
    }
    .home-actions { display: flex; gap: 8px; }
    .home-new-btn, .home-project-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      font-size: 1.6rem; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s, transform 0.2s;
      box-shadow: 0 4px 12px rgba(10,132,255,0.3);
    }
    .home-new-btn:hover, .home-project-btn:hover { background: var(--accent2); transform: scale(1.05); }
    .home-project-btn { background: #444; box-shadow: none; font-size: 1.4rem; }
    .home-project-btn:hover { background: #555; }
    .home-tools { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .search-input {
      flex: 1; min-width: 150px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 10px;
      font-size: 0.9rem; outline: none;
    }
    .search-input::placeholder { color: var(--secondary); }
    .filter-chip {
      padding: 8px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--secondary); cursor: pointer; font-size: 0.8rem;
      font-weight: 600; white-space: nowrap;
    }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      flex: 1;
      align-content: start;
    }
    .note-card-home {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      cursor: pointer; transition: all 0.2s;
    }
    .note-card-home:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(10,132,255,0.15); }
    .note-card-home:active { background: #222; }
    .note-card-home .title { font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; }
    .note-card-home .lang {
      font-size: 0.65rem; text-transform: uppercase;
      color: rgba(10,132,255,0.5);
      background: rgba(10,132,255,0.08);
      padding: 2px 8px; border-radius: 4px;
    }
    .note-card-home .project-badge {
      font-size: 0.65rem; text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.1);
      padding: 2px 8px; border-radius: 4px;
      margin-left: 4px;
    }
    .note-card-home .delete-btn {
      margin-top: 8px; background: none; border: none;
      color: var(--secondary); cursor: pointer; font-size: 0.8rem;
    }
    .note-card-home .delete-btn:hover { color: var(--red); }
    .empty-notes, .loading-notes, .error-notes {
      grid-column: 1 / -1; text-align: center;
      padding: 60px 20px; color: var(--secondary);
    }
    .dashboard-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--accent); text-decoration: none; font-weight: 500;
      margin-top: 16px; align-self: flex-start;
    }

    .editor-view { display: none; flex-direction: column; flex: 1; }
    .editor-view.active { display: flex; }
    .navbar { padding: 8px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); min-height: 52px; }
    .back-btn { background: none; border: none; color: var(--accent); font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .nav-title-input { flex: 1; background: transparent; border: none; font-size: 1.1rem; font-weight: 600; color: var(--text); outline: none; min-width: 0; }
    .nav-title-input::placeholder { color: var(--secondary); }
    .tabs-bar {
      display: flex; align-items: center; gap: 4px;
      padding: 6px 12px; border-bottom: 1px solid var(--border);
      background: var(--bg); overflow-x: auto;
    }
    .tab {
      padding: 6px 14px; border-radius: 20px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--secondary); cursor: pointer; font-size: 0.8rem;
      font-weight: 500; white-space: nowrap; display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .tab-close { width: 16px; height: 16px; border-radius: 50%; background: transparent; color: inherit; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; cursor: pointer; }
    .add-file-btn {
      padding: 6px 12px; border-radius: 20px;
      background: transparent; border: 1px dashed var(--border);
      color: var(--secondary); cursor: pointer; font-size: 0.8rem;
      display: flex; align-items: center; gap: 4px;
    }
    .editor-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .code-stage { flex: 1; position: relative; overflow: hidden; }
    .code-layer {
      position: absolute; inset: 12px 12px 12px 50px;
      font-family: var(--mono); font-size: 0.88rem;
      line-height: 1.75; white-space: pre-wrap;
      overflow: auto; border: none; outline: none; background: transparent;
    }
    .code-textarea { color: transparent; caret-color: var(--accent); resize: none; z-index: 2; }
    .code-textarea::selection { background: rgba(10,132,255,0.3); }
    .code-preview { pointer-events: none; z-index: 1; }
    .code-preview code { background: transparent !important; padding: 0 !important; }
    .line-numbers {
      position: absolute; top: 12px; left: 4px; bottom: 12px;
      width: 40px; font-family: var(--mono); font-size: 0.78rem;
      color: var(--secondary); text-align: right;
      overflow: hidden; z-index: 3; pointer-events: none;
      line-height: 1.75; padding-right: 6px;
    }
    .line-numbers span { display: block; }
    .preview-pane { display: none; position: absolute; inset: 0; background: #fff; z-index: 10; }
    .preview-pane.visible { display: flex; }
    .preview-pane iframe { width: 100%; height: 100%; border: none; }
    .bottom-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-top: 1px solid var(--border);
      background: var(--bg); flex-wrap: wrap;
    }
    .lang-picker {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 7px 12px; border-radius: 20px;
      font-size: 0.8rem; outline: none; cursor: pointer;
    }
    .tool-btn {
      padding: 8px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: all 0.2s;
    }
    .tool-btn:active { transform: scale(0.95); }
    .tool-btn.copy { color: var(--green); border-color: rgba(48,209,88,0.3); }
    .tool-btn.copy.copied { background: rgba(48,209,88,0.2); border-color: var(--green); }
    .tool-btn.save { background: var(--accent); color: #fff; border-color: var(--accent); }
    .tool-btn.save:active { background: var(--accent2); }
    .tool-btn.delete { color: var(--red); border-color: rgba(255,69,58,0.3); }
    .tool-btn svg { width: 16px; height: 16px; }
    .tool-btn.undo, .tool-btn.redo { color: var(--secondary); }
    .tool-btn.undo:disabled, .tool-btn.redo:disabled { opacity: 0.4; pointer-events: none; }
    .tool-btn.preview { color: var(--accent); font-weight: 600; }
    .tool-btn.select-all { color: var(--secondary); }
    .status-bar {
      padding: 4px 16px; display: flex; justify-content: space-between;
      font-size: 0.7rem; color: var(--secondary); font-family: var(--mono);
    }
    .toast-panel {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 200; display: flex; flex-direction: column; gap: 6px; pointer-events: none;
    }
    .toast {
      background: var(--card); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 20px;
      font-weight: 500; font-size: 0.85rem;
      box-shadow: var(--shadow); text-align: center;
      animation: toastIn 0.4s ease; pointer-events: auto;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }

    @media (max-width: 480px) { .notes-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app" id="appRoot">

  <div class="home-view" id="homeView">
    <div class="home-header">
      <span class="home-title">Notes</span>
      <div class="home-actions">
        <button class="home-new-btn" id="homeNewBtn" title="New single-file note">+</button>
        <button class="home-project-btn" id="homeProjectBtn" title="New multi-file project">📁</button>
      </div>
    </div>
    <div class="home-tools">
      <input type="text" class="search-input" id="homeSearch" placeholder="Search notes..." autocomplete="off">
      <button class="filter-chip active" data-lang="all">All</button>
      <button class="filter-chip" data-lang="html">HTML</button>
      <button class="filter-chip" data-lang="css">CSS</button>
      <button class="filter-chip" data-lang="javascript">JS</button>
      <button class="filter-chip" data-lang="python">Python</button>
    </div>
    <div class="notes-grid" id="notesGrid"></div>
    <a href="./index.html" class="dashboard-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Dashboard
    </a>
  </div>

  <div class="editor-view" id="editorView">
    <div class="navbar">
      <button class="back-btn" id="editorBackBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <input type="text" class="nav-title-input" id="noteTitle" placeholder="Note title">
    </div>
    <div class="tabs-bar" id="tabsBar" style="display:none;">
      <span id="tabsContainer"></span>
      <button class="add-file-btn" id="addFileBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        File
      </button>
    </div>
    <div class="editor-container">
      <div class="code-stage" id="codeStage">
        <div class="line-numbers" id="lineNums">1</div>
        <textarea class="code-layer code-textarea" id="codeTextarea" placeholder="Write code…" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
        <pre class="code-layer code-preview"><code class="hljs" id="codeHighlight"></code></pre>
        <div class="preview-pane" id="previewPane">
          <iframe id="previewIframe" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
      </div>
    </div>
    <div class="bottom-toolbar">
      <select class="lang-picker" id="langPicker">
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="javascript">JavaScript</option>
        <option value="jsx">React JSX</option>
        <option value="typescript">TypeScript</option>
        <option value="python">Python</option>
        <option value="sql">SQL</option>
        <option value="json">JSON</option>
        <option value="bash">Bash</option>
        <option value="plaintext">Plain Text</option>
      </select>
      <button class="tool-btn copy" id="copyBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
      <button class="tool-btn select-all" id="selectAllBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 4v16"/><path d="M16 4v16"/></svg>
        Select All
      </button>
      <button class="tool-btn undo" id="undoBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15.05a9 9 0 102.83-9.11L1 10"/>
        </svg>
      </button>
      <button class="tool-btn redo" id="redoBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15.05a9 9 0 11-2.83-9.11L23 10"/>
        </svg>
      </button>
      <button class="tool-btn preview" id="previewBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Preview
      </button>
      <button class="tool-btn delete" id="deleteBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
      <button class="tool-btn save" id="saveBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
        Save
      </button>
    </div>
    <div class="status-bar">
      <span id="lineCount">Ln 1</span>
      <span id="charCount">0 chars</span>
    </div>
  </div>
</div>

<div class="toast-panel" id="toastPanel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function(){
  const firebaseConfig = {
    apiKey: "AIzaSyAszFGDs1J92_53jHvj5aABmeiKZdc-mf0",
    authDomain: "gen-lang-client-0501601606.firebaseapp.com",
    projectId: "gen-lang-client-0501601606",
    storageBucket: "gen-lang-client-0501601606.firebasestorage.app",
    messagingSenderId: "1079712784218",
    appId: "1:1079712784218:web:598465155aa70938a6dd63",
    measurementId: "G-CRHRGYX74V"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let notes = [];
  let currentId = null;
  let filterLang = 'all';
  let searchTerm = '';

  // Multi-file state
  let currentFiles = {};
  let activeFileName = 'index.html';
  let isMultiFile = false;

  let undoStack = [];
  let redoStack = [];
  let currentSnapshot = '';
  let isUndoRedo = false;

  let previewVisible = false;
  let updatePreviewTimer;

  const $ = id => document.getElementById(id);
  const homeView = $('homeView');
  const editorView = $('editorView');
  const previewPane = $('previewPane');
  const previewIframe = $('previewIframe');
  const codeTextarea = $('codeTextarea');
  const codeHighlight = $('codeHighlight');
  const lineNums = $('lineNums');
  const notesGrid = $('notesGrid');
  const tabsBar = $('tabsBar');
  const tabsContainer = $('tabsContainer');

  // ── AUTH ──
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      if (homeView.style.display !== 'flex') {
        homeView.style.display = 'flex';
        await loadNotesWithRetry();
      }
    } else {
      window.location.href = 'login.html';
    }
  });

  async function loadNotesWithRetry() {
    showGridLoading();
    try { await loadNotes(); } catch (e) { showGridError(e.message); }
  }

  async function loadNotes() {
    if (!auth.currentUser) return;
    const snap = await db.collection('users').doc(auth.currentUser.uid)
      .collection('notes').orderBy('updated','desc').get();
    notes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderHome();
  }

  function showGridLoading() { notesGrid.innerHTML = '<div class="loading-notes">Loading notes…</div>'; }
  function showGridError(msg) {
    notesGrid.innerHTML = `<div class="error-notes"><p>⚠️ Could not load notes</p><p style="font-size:0.8rem; margin:8px 0;">${msg||'Check connection'}</p><button class="tool-btn" onclick="retryLoadNotes()">Retry</button></div>`;
  }
  window.retryLoadNotes = () => loadNotesWithRetry();

  async function saveToCloud(note) {
    if (!auth.currentUser) return;
    try {
      const { id, ...data } = note;
      await db.collection('users').doc(auth.currentUser.uid)
        .collection('notes').doc(note.id).set(data, { merge: true });
    } catch (e) { toast('❌ Cloud save failed'); console.error(e); }
  }

  async function deleteFromCloud(id) {
    if (!auth.currentUser) return;
    try { await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(id).delete(); }
    catch (e) { toast('❌ Delete failed'); console.error(e); }
  }

  function renderHome() {
    let filtered = [...notes];
    if (filterLang !== 'all') filtered = filtered.filter(n => n.lang === filterLang);
    if (searchTerm.trim()) {
      const q = searchTerm.toLowerCase();
      filtered = filtered.filter(n => (n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q));
    }
    filtered.sort((a,b) => b.updated - a.updated);

    if (!filtered.length) {
      notesGrid.innerHTML = '<div class="empty-notes">No notes yet.<br>Tap + or 📁 to create one.</div>';
    } else {
      notesGrid.innerHTML = filtered.map(n => {
        const isProject = !!n.files;
        const langLabel = isProject ? '<span class="project-badge">📁 Project</span>' : `<span class="lang">${n.lang||'txt'}</span>`;
        return `
        <div class="note-card-home" data-id="${n.id}">
          <div class="title">${esc(n.title || 'Untitled')}</div>
          ${langLabel}
          <button class="delete-btn" data-del="${n.id}">Delete</button>
        </div>`;
      }).join('');
    }

    notesGrid.querySelectorAll('.note-card-home').forEach(card => {
      card.addEventListener('click', e => { if (!e.target.closest('[data-del]')) openNote(card.dataset.id); });
    });
    notesGrid.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id = btn.dataset.del;
        if (confirm('Delete this note?')) {
          notes = notes.filter(n => n.id !== id);
          deleteFromCloud(id);
          renderHome();
          toast('Deleted');
        }
      });
    });
  }

  function openNote(id) {
    if (previewVisible) togglePreview();
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentId = id;
    $('noteTitle').value = note.title || '';
    isMultiFile = !!note.files;
    if (isMultiFile) {
      currentFiles = { ...note.files };
      activeFileName = Object.keys(currentFiles)[0] || 'index.html';
      tabsBar.style.display = 'flex';
      renderTabs();
    } else {
      currentFiles = null;
      tabsBar.style.display = 'none';
      codeTextarea.value = note.content || '';
      $('langPicker').value = note.lang || 'plaintext';
    }
    homeView.style.display = 'none';
    editorView.classList.add('active');
    updateEditorContent();
    refreshHighlight();
    updateStats();
    resetUndoRedo();
    codeTextarea.focus();
  }

  async function openNewNote() {
    const fixedId = Date.now().toString(36) + Math.random().toString(36).substr(2,9);
    const note = { id: fixedId, title: '', content: '', lang: 'html', updated: Date.now() };
    notes.unshift(note);
    openNote(fixedId);
    try {
      if (!auth.currentUser) return;
      await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(fixedId).set({
        title: '', content: '', lang: 'html', updated: Date.now()
      }, { merge: true });
    } catch (e) { toast('⚠️ Cloud sync delayed'); console.error(e); }
    renderHome();
  }

  async function openNewProject() {
    const fixedId = Date.now().toString(36) + Math.random().toString(36).substr(2,9);
    const note = {
      id: fixedId, title: '',
      files: { 'index.html': '', 'style.css': '', 'script.js': '' },
      updated: Date.now(), lang: 'html'
    };
    notes.unshift(note);
    openNote(fixedId);
    try {
      if (!auth.currentUser) return;
      await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(fixedId).set({
        title: '', files: note.files, updated: Date.now(), lang: 'html'
      }, { merge: true });
    } catch (e) { toast('⚠️ Cloud sync delayed'); console.error(e); }
    renderHome();
  }

  function updateEditorContent() {
    if (isMultiFile && currentFiles && activeFileName) {
      codeTextarea.value = currentFiles[activeFileName] || '';
      const lang = getLangFromName(activeFileName);
      $('langPicker').value = lang;
    }
  }

  function getLangFromName(name) {
    const ext = name.split('.').pop().toLowerCase();
    const map = { html:'html', css:'css', js:'javascript', jsx:'jsx', ts:'typescript', py:'python', sql:'sql', json:'json', sh:'bash' };
    return map[ext] || 'plaintext';
  }

  function renderTabs() {
    if (!isMultiFile || !currentFiles) return;
    tabsContainer.innerHTML = Object.keys(currentFiles).map(name => `
      <div class="tab ${name === activeFileName ? 'active' : ''}" data-file="${name}">
        <span>${name}</span>
        <span class="tab-close" data-close="${name}">×</span>
      </div>
    `).join('');
    tabsContainer.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', e => {
        if (e.target.classList.contains('tab-close')) {
          const fname = e.target.dataset.close;
          if (confirm(`Delete ${fname}?`)) {
            delete currentFiles[fname];
            if (activeFileName === fname) activeFileName = Object.keys(currentFiles)[0] || 'index.html';
            renderTabs();
            updateEditorContent();
            refreshHighlight(); updateStats();
            pushToUndo();
            saveCurrentMulti();
          }
        } else {
          activeFileName = tab.dataset.file;
          renderTabs();
          updateEditorContent();
          refreshHighlight(); updateStats();
          resetUndoRedo();
          codeTextarea.focus();
        }
      });
    });
  }

  document.getElementById('addFileBtn').addEventListener('click', () => {
    let name = prompt('File name (e.g., main.js):');
    if (!name) return;
    if (!/\.\w+$/.test(name)) name += '.html';
    if (currentFiles[name]) return toast('File already exists');
    currentFiles[name] = '';
    activeFileName = name;
    renderTabs();
    updateEditorContent();
    refreshHighlight(); updateStats();
    resetUndoRedo();
    codeTextarea.focus();
    saveCurrentMulti();
  });

  function saveCurrentMulti() {
    if (!currentId) return;
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    note.title = $('noteTitle').value.trim();
    if (isMultiFile) {
      note.files = { ...currentFiles };
      delete note.content;
    } else {
      note.content = codeTextarea.value;
      note.lang = $('langPicker').value;
    }
    note.updated = Date.now();
    saveToCloud(note);
  }

  function closeEditor() {
    if (currentId) saveCurrentMulti();
    currentId = null; isMultiFile = false; currentFiles = null;
    editorView.classList.remove('active');
    homeView.style.display = 'flex';
    $('noteTitle').value = '';
    codeTextarea.value = '';
    codeHighlight.textContent = '';
    resetUndoRedo();
    if (previewVisible) togglePreview();
    tabsBar.style.display = 'none';
    renderHome();
  }

  function saveCurrent() {
    saveCurrentMulti();
    toast('✅ Saved');
    renderHome();
  }

  async function deleteCurrent() {
    if (!currentId) return;
    if (!confirm('Delete this note?')) return;
    await deleteFromCloud(currentId);
    notes = notes.filter(n => n.id !== currentId);
    closeEditor();
    toast('🗑 Deleted');
  }

  function togglePreview() {
    previewVisible = !previewVisible;
    if (previewVisible) {
      codeTextarea.style.display = 'none';
      codeHighlight.parentElement.style.display = 'none';
      lineNums.style.display = 'none';
      previewPane.classList.add('visible');
      updatePreview();
    } else {
      codeTextarea.style.display = '';
      codeHighlight.parentElement.style.display = '';
      lineNums.style.display = '';
      previewPane.classList.remove('visible');
    }
  }

  function updatePreview() {
    clearTimeout(updatePreviewTimer);
    updatePreviewTimer = setTimeout(() => {
      if (!previewVisible) return;
      let content = '';
      if (isMultiFile && currentFiles) {
        const html = currentFiles['index.html'] || currentFiles[Object.keys(currentFiles).find(f=>f.endsWith('.html'))] || '';
        const css = Object.keys(currentFiles).filter(f=>f.endsWith('.css')).map(f=>currentFiles[f]).join('\n');
        const js = Object.keys(currentFiles).filter(f=>f.endsWith('.js')).map(f=>currentFiles[f]).join('\n');
        if (html) {
          content = html
            .replace('</head>', `<style>${css}</style></head>`)
            .replace('</body>', `<script>${js}<\/script></body>`);
          if (!/<head/i.test(html)) content = `<style>${css}</style>${html}<script>${js}<\/script>`;
        }
      } else {
        content = codeTextarea.value;
      }
      previewIframe.srcdoc = content;
    }, 80);
  }

  function resetUndoRedo() { undoStack=[]; redoStack=[]; currentSnapshot=codeTextarea.value; updateUndoButtons(); }
  function updateUndoButtons() { $('undoBtn').disabled=undoStack.length===0; $('redoBtn').disabled=redoStack.length===0; }
  function pushToUndo() { const val=codeTextarea.value; if(val!==currentSnapshot&&!isUndoRedo){undoStack.push(currentSnapshot);currentSnapshot=val;redoStack=[];updateUndoButtons();} }
  function performUndo() {
    if(!undoStack.length)return; isUndoRedo=true;
    const prev=undoStack.pop(); redoStack.push(currentSnapshot);
    codeTextarea.value=prev; currentSnapshot=prev;
    refreshHighlight();updateStats();if(previewVisible)updatePreview();
    if(isMultiFile&&activeFileName)currentFiles[activeFileName]=prev;
    updateUndoButtons(); isUndoRedo=false;
  }
  function performRedo() {
    if(!redoStack.length)return; isUndoRedo=true;
    const nxt=redoStack.pop(); undoStack.push(currentSnapshot);
    codeTextarea.value=nxt; currentSnapshot=nxt;
    refreshHighlight();updateStats();if(previewVisible)updatePreview();
    if(isMultiFile&&activeFileName)currentFiles[activeFileName]=nxt;
    updateUndoButtons(); isUndoRedo=false;
  }

  function refreshHighlight() {
    const code = codeTextarea.value, lang = $('langPicker').value;
    let out; try { out = lang === 'plaintext' ? esc(code) : hljs.highlight(code, { language: lang, ignoreIllegals: true }).value; } catch(e) { out = esc(code); }
    codeHighlight.innerHTML = out; syncScroll(); drawLineNumbers();
  }
  function syncScroll() { const pre=codeHighlight.parentElement; pre.scrollTop=codeTextarea.scrollTop; pre.scrollLeft=codeTextarea.scrollLeft; }
  function drawLineNumbers() { const lines=codeTextarea.value.split('\n'); lineNums.innerHTML=lines.map((_,i)=>`<span>${i+1}</span>`).join(''); lineNums.scrollTop=codeTextarea.scrollTop; }
  async function copyCode() {
    const code = codeTextarea.value;
    if (!code.trim()) { toast('Nothing to copy'); return; }
    try {
      await navigator.clipboard.writeText(code);
      const btn = $('copyBtn');
      btn.classList.add('copied');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy';
      }, 2000);
      toast('Copied!');
    } catch(e) { toast('Copy failed'); }
  }
  function selectAllCode() { codeTextarea.focus(); codeTextarea.select(); toast('All code selected (Ctrl+C to copy)'); }
  function updateStats() { const code=codeTextarea.value; $('charCount').textContent=code.length+' chars'; $('lineCount').textContent='Ln '+code.split('\n').length; }
  function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function toast(msg) { const t=document.createElement('div'); t.className='toast'; t.textContent=msg; $('toastPanel').appendChild(t); setTimeout(()=>t.remove(),2500); }

  // Events
  $('homeNewBtn').addEventListener('click', openNewNote);
  $('homeProjectBtn').addEventListener('click', openNewProject);
  $('editorBackBtn').addEventListener('click', closeEditor);
  $('saveBtn').addEventListener('click', saveCurrent);
  $('deleteBtn').addEventListener('click', deleteCurrent);
  $('copyBtn').addEventListener('click', copyCode);
  $('selectAllBtn').addEventListener('click', selectAllCode);
  $('undoBtn').addEventListener('click', performUndo);
  $('redoBtn').addEventListener('click', performRedo);
  $('previewBtn').addEventListener('click', togglePreview);

  $('homeSearch').addEventListener('input', e => { searchTerm = e.target.value; renderHome(); });
  document.querySelectorAll('.filter-chip').forEach(chip => chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    filterLang = chip.dataset.lang;
    renderHome();
  }));

  $('noteTitle').addEventListener('input', () => { if (currentId) saveCurrentMulti(); });
  $('langPicker').addEventListener('change', () => {
    refreshHighlight();
    if (currentId && !isMultiFile) { let n = notes.find(n=>n.id===currentId); if(n) { n.lang=$('langPicker').value; n.updated=Date.now(); saveToCloud(n); } }
  });
  codeTextarea.addEventListener('input', () => {
    refreshHighlight(); updateStats(); pushToUndo();
    if (isMultiFile && activeFileName) { currentFiles[activeFileName] = codeTextarea.value; saveCurrentMulti(); }
    else if (!isMultiFile && currentId) { let n = notes.find(n=>n.id===currentId); if(n) { n.content=codeTextarea.value; n.updated=Date.now(); saveToCloud(n); } }
    if (previewVisible) updatePreview();
  });
  codeTextarea.addEventListener('scroll', () => { syncScroll(); drawLineNumbers(); });
  codeTextarea.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault(); const s=codeTextarea.selectionStart;
      codeTextarea.value=codeTextarea.value.substring(0,s)+'  '+codeTextarea.value.substring(codeTextarea.selectionEnd);
      codeTextarea.selectionStart=codeTextarea.selectionEnd=s+2;
      refreshHighlight(); updateStats(); pushToUndo();
    }
    if ((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();performUndo();}
    if ((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='Z'&&e.shiftKey))){e.preventDefault();performRedo();}
  });
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCurrent();}
    if ((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();openNewNote();}
  });

})();
</script>
</body>
</html>
