/* ── LOADING ── */
#loadingScreen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; flex-direction: column; gap: 16px;
}
.loader-logo { font-size: 2rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
.loader-dots { display: flex; gap: 6px; }
.loader-dots span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  animation: dotPulse 1.2s ease-in-out infinite;
}
.loader-dots span:nth-child(2) { animation-delay: 0.2s; }
.loader-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

/* ── LOGIN ── */
#loginScreen {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; padding: 24px;
  background: radial-gradient(ellipse at 50% 0%, rgba(79,110,247,0.12) 0%, transparent 70%);
}
.login-card {
  width: 100%; max-width: 380px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 20px; padding: 36px 28px;
  display: flex; flex-direction: column; gap: 14px;
  box-shadow: 0 0 60px rgba(79,110,247,0.08);
}
.login-brand {
  text-align: center; margin-bottom: 8px;
}
.login-brand .logo { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
.login-brand .sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; }
.field-wrap { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.input-field {
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text); padding: 12px 16px; border-radius: 10px;
  font-size: 0.95rem; font-family: var(--font); outline: none;
  transition: border-color 0.2s;
}
.input-field:focus { border-color: var(--accent); }
.error-msg { color: var(--red); font-size: 0.82rem; text-align: center; min-height: 18px; }
.btn-primary {
  background: var(--accent); color: #fff; border: none;
  padding: 13px; border-radius: 10px; font-size: 0.95rem;
  font-weight: 700; font-family: var(--font); cursor: pointer;
  transition: opacity 0.2s, transform 0.1s; width: 100%;
}
.btn-primary:active { opacity: 0.85; transform: scale(0.98); }
.btn-secondary {
  background: transparent; color: var(--muted); border: 1px solid var(--border2);
  padding: 13px; border-radius: 10px; font-size: 0.9rem;
  font-weight: 600; font-family: var(--font); cursor: pointer;
  transition: all 0.2s; width: 100%;
}
.btn-secondary:active { color: var(--text); border-color: var(--border2); }
.divider { display: flex; align-items: center; gap: 10px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.divider span { font-size: 0.75rem; color: var(--muted); }

/* ── HOME ── */
#homeView {
  display: none; flex-direction: column; flex: 1;
  padding: 0; overflow: hidden;
}
.home-header {
  padding: 16px 16px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.home-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
.home-title span { color: var(--accent); }
.new-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  font-size: 1.5rem; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.15s, background 0.2s;
  flex-shrink: 0;
}
.new-btn:active { transform: scale(0.9); background: var(--accent2); }
.home-search-wrap { padding: 12px 16px 0; }
.search-input {
  width: 100%; background: var(--card); border: 1px solid var(--border2);
  color: var(--text); padding: 10px 14px; border-radius: 10px;
  font-size: 0.88rem; font-family: var(--font); outline: none;
}
.search-input::placeholder { color: var(--muted); }
.filter-row {
  padding: 10px 16px 0; display: flex; gap: 6px; overflow-x: auto;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2);
  background: var(--card); color: var(--muted); font-size: 0.78rem;
  font-weight: 700; font-family: var(--font); cursor: pointer;
  white-space: nowrap; transition: all 0.18s; flex-shrink: 0;
}
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.notes-scroll { flex: 1; overflow-y: auto; padding: 12px 16px 16px; }
.notes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 10px;
}
.note-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  cursor: pointer; transition: border-color 0.18s, background 0.18s;
  display: flex; flex-direction: column; gap: 8px;
}
.note-card:active { background: #1a1a2e; border-color: var(--border2); }
.note-card .nc-title { font-size: 0.88rem; font-weight: 700; line-height: 1.3; word-break: break-word; }
.note-card .nc-lang {
  font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--accent); background: rgba(79,110,247,0.12);
  padding: 2px 8px; border-radius: 4px; align-self: flex-start;
  font-family: var(--mono);
}
.note-card .nc-del {
  background: none; border: none; color: var(--muted);
  font-size: 0.75rem; font-family: var(--font); cursor: pointer;
  text-align: left; padding: 0; margin-top: 2px;
}
.note-card .nc-del:active { color: var(--red); }
.empty-state {
  grid-column: 1/-1; text-align: center;
  padding: 60px 20px; color: var(--muted);
  font-size: 0.88rem; line-height: 1.8;
}
.empty-state .big { font-size: 2rem; margin-bottom: 8px; }
.dash-link {
  display: inline-flex; align-items: center; gap: 5px;
  color: var(--accent); text-decoration: none; font-size: 0.85rem;
  font-weight: 600; margin: 12px 16px 0;
}

/* ── EDITOR ── */
#editorView {
  display: none; flex-direction: column; flex: 1; overflow: hidden;
}
#editorView.active { display: flex; }
.editor-nav {
  padding: 10px 14px; display: flex; align-items: center;
  gap: 10px; border-bottom: 1px solid var(--border);
  min-height: 50px; flex-shrink: 0;
}
.back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 0.88rem; font-weight: 700; font-family: var(--font);
  cursor: pointer; display: flex; align-items: center; gap: 4px;
  padding: 6px 0; white-space: nowrap;
}
.note-title-input {
  flex: 1; background: transparent; border: none;
  font-size: 1rem; font-weight: 700; font-family: var(--font);
  color: var(--text); outline: none; min-width: 0;
}
.note-title-input::placeholder { color: var(--muted); }
.editor-body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.code-stage { flex: 1; position: relative; display: flex; overflow: hidden; }
.code-layer {
  position: absolute; inset: 10px 10px 10px 46px;
  font-family: var(--mono); font-size: 0.84rem;
  line-height: 1.8; white-space: pre-wrap;
  overflow: auto; border: none; outline: none; background: transparent;
}
.code-ta {
  color: transparent; caret-color: var(--accent);
  resize: none; z-index: 2;
}
.code-ta::selection { background: rgba(79,110,247,0.25); }
.code-pre { pointer-events: none; z-index: 1; }
.code-pre code { background: transparent !important; padding: 0 !important; font-family: var(--mono) !important; }
.line-nums {
  position: absolute; top: 10px; left: 0; bottom: 10px;
  width: 40px; font-family: var(--mono); font-size: 0.72rem;
  color: var(--muted); text-align: right; overflow: hidden;
  z-index: 3; pointer-events: none; line-height: 1.8; padding-right: 8px;
}
.line-nums span { display: block; }
.live-frame { flex: 1; display: none; border: none; background: #fff; }
.live-frame.on { display: block; }
.editor-toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-top: 1px solid var(--border);
  background: var(--bg); flex-wrap: wrap; flex-shrink: 0;
}
.lang-sel {
  background: var(--card); border: 1px solid var(--border2);
  color: var(--text); padding: 6px 10px; border-radius: 20px;
  font-size: 0.76rem; font-family: var(--font); outline: none; cursor: pointer;
}
.tbtn {
  padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border2);
  background: var(--card); color: var(--text); font-size: 0.76rem;
  font-weight: 600; font-family: var(--font); cursor: pointer;
  display: flex; align-items: center; gap: 4px; transition: all 0.15s;
  white-space: nowrap;
}
.tbtn:active { transform: scale(0.94); }
.tbtn:disabled { opacity: 0.35; pointer-events: none; }
.tbtn.green { color: var(--green); border-color: rgba(45,212,160,0.3); }
.tbtn.red { color: var(--red); border-color: rgba(247,95,110,0.3); }
.tbtn.blue { background: var(--accent); color: #fff; border-color: var(--accent); }
.tbtn.blue:active { background: var(--accent2); }
.status-row {
  padding: 3px 14px; display: flex; justify-content: space-between;
  font-size: 0.67rem; color: var(--muted); font-family: var(--mono);
  flex-shrink: 0;
}

/* ── TOAST ── */
.toast-wrap {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
  z-index: 500; display: flex; flex-direction: column; gap: 5px;
  pointer-events: none; width: max-content; max-width: 90vw;
}
.toast {
  background: var(--card); border: 1px solid var(--border2);
  padding: 9px 20px; border-radius: 20px; font-size: 0.82rem;
  font-weight: 600; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  animation: tIn 0.3s ease; text-align: center;
}
@keyframes tIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }

@media (max-width: 480px) {
  .notes-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 340px) {
  .notes-grid { grid-template-columns: 1fr; }
}

<script>
(function () {
  // ── FIREBASE INIT ──
  const cfg = {
    apiKey: "AIzaSyAszFGDs1J92_53jHvj5aABmeiKZdc-mf0",
    authDomain: "gen-lang-client-0501601606.firebaseapp.com",
    projectId: "gen-lang-client-0501601606",
    storageBucket: "gen-lang-client-0501601606.firebasestorage.app",
    messagingSenderId: "1079712784218",
    appId: "1:1079712784218:web:598465155aa70938a6dd63"
  };

  let app, auth, db;
  try {
    app = firebase.initializeApp(cfg);
    auth = firebase.auth();
    db = firebase.firestore();
  } catch (e) {
    showScreen('login');
    toast('Firebase error: ' + e.message);
    return;
  }

  // ── STATE ──
  let notes = [], currentId = null;
  let filterLang = 'all', searchTerm = '';
  let isPreview = false;
  let undoStack = [], redoStack = [], lastVal = '';

  // ── HELPERS ──
  const $ = id => document.getElementById(id);
  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    $('toastWrap').appendChild(t);
    setTimeout(() => t.remove(), 2400);
  }

  function showScreen(name) {
    $('loadingScreen').style.display = 'none';
    $('loginScreen').style.display = name === 'login' ? 'flex' : 'none';
    $('homeView').style.display = name === 'home' ? 'flex' : 'none';
    $('editorView').style.display = name === 'editor' ? 'flex' : 'none';
    if (name === 'editor') $('editorView').classList.add('active');
    else $('editorView').classList.remove('active');
  }

  // ── AUTH ──
  auth.onAuthStateChanged(async user => {
    if (user) {
      await loadNotes();
      showScreen('home');
    } else {
      showScreen('login');
    }
  });

  $('loginBtn').addEventListener('click', async () => {
    const email = $('emailInput').value.trim();
    const pass = $('passwordInput').value;
    $('loginError').textContent = '';
    if (!email || !pass) { $('loginError').textContent = 'Please fill all fields'; return; }
    $('loginBtn').textContent = 'Signing in…';
    $('loginBtn').disabled = true;
    try {
      await auth.signInWithEmailAndPassword(email, pass);
    } catch (e) {
      $('loginError').textContent = e.message;
      $('loginBtn').textContent = 'Sign In';
      $('loginBtn').disabled = false;
    }
  });

  $('registerBtn').addEventListener('click', async () => {
    const email = $('emailInput').value.trim();
    const pass = $('passwordInput').value;
    $('loginError').textContent = '';
    if (!email || !pass) { $('loginError').textContent = 'Please fill all fields'; return; }
    $('registerBtn').textContent = 'Creating…';
    $('registerBtn').disabled = true;
    try {
      await auth.createUserWithEmailAndPassword(email, pass);
    } catch (e) {
      $('loginError').textContent = e.message;
      $('registerBtn').textContent = 'Create Account';
      $('registerBtn').disabled = false;
    }
  });

  // Allow Enter key on login
  [$('emailInput'), $('passwordInput')].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') $('loginBtn').click(); });
  });

  // ── FIRESTORE ──
  function userRef() {
    return db.collection('users').doc(auth.currentUser.uid).collection('notes');
  }
  async function loadNotes() {
    try {
      const snap = await userRef().orderBy('updated', 'desc').get();
      notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e) {
      toast('Load error: ' + e.message);
      notes = [];
    }
  }
  async function cloudSave(n) {
    if (!auth.currentUser) return;
    try { await userRef().doc(n.id).set(n, { merge: true }); } catch (e) { /* silent */ }
  }
  async function cloudDelete(id) {
    if (!auth.currentUser) return;
    try { await userRef().doc(id).delete(); } catch (e) { /* silent */ }
  }

  // ── HOME ──
  function renderHome() {
    let list = [...notes];
    if (filterLang !== 'all') list = list.filter(n => n.lang === filterLang);
    if (searchTerm.trim()) {
      const q = searchTerm.toLowerCase();
      list = list.filter(n => (n.title || '').toLowerCase().includes(q) || (n.content || '').toLowerCase().includes(q));
    }
    list.sort((a, b) => b.updated - a.updated);

    const grid = $('notesGrid');
    if (!list.length) {
      grid.innerHTML = '<div class="empty-state"><div class="big">📭</div>No notes yet.<br>Tap <b>+</b> to create one.</div>';
      return;
    }
    grid.innerHTML = list.map(n => `
      <div class="note-card" data-id="${n.id}">
        <div class="nc-title">${esc(n.title || 'Untitled')}</div>
        <span class="nc-lang">${n.lang || 'txt'}</span>
        <button class="nc-del" data-del="${n.id}">Delete</button>
      </div>
    `).join('');

    grid.querySelectorAll('.note-card').forEach(c => {
      c.addEventListener('click', e => {
        if (!e.target.closest('[data-del]')) openEditor(c.dataset.id);
      });
    });
    grid.querySelectorAll('[data-del]').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('Delete this note?')) {
          notes = notes.filter(n => n.id !== b.dataset.del);
          cloudDelete(b.dataset.del);
          renderHome();
          toast('Deleted');
        }
      });
    });
  }

  // ── NEW NOTE ──
  $('homeNewBtn').addEventListener('click', async () => {
    if (!auth.currentUser) { toast('Not signed in'); return; }
    const noteData = { title: '', content: '', lang: 'html', updated: Date.now() };
    try {
      const ref = await userRef().add(noteData);
      const note = { id: ref.id, ...noteData };
      notes.unshift(note);
      openEditor(note.id);
    } catch (e) {
      toast('Error: ' + e.message);
    }
  });

  // ── EDITOR ──
  function openEditor(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentId = id;
    $('noteTitle').value = note.title || '';
    $('codeTA').value = note.content || '';
    $('langPicker').value = note.lang || 'plaintext';
    showScreen('editor');
    switchToCode();
    refreshHL();
    updateStats();
    drawLines();
    resetHistory(note.content || '');
    setTimeout(() => $('codeTA').focus(), 100);
  }

  function closeEditor() {
    if (currentId) {
      const n = notes.find(x => x.id === currentId);
      if (n) {
        n.title = $('noteTitle').value.trim();
        n.content = $('codeTA').value;
        n.lang = $('langPicker').value;
        n.updated = Date.now();
        cloudSave(n);
      }
    }
    currentId = null;
    $('noteTitle').value = '';
    $('codeTA').value = '';
    $('codeHL').textContent = '';
    switchToCode();
    showScreen('home');
    renderHome();
  }

  function saveNote() {
    if (!currentId) return;
    const n = notes.find(x => x.id === currentId);
    if (!n) return;
    n.title = $('noteTitle').value.trim();
    n.content = $('codeTA').value;
    n.lang = $('langPicker').value;
    n.updated = Date.now();
    cloudSave(n);
    toast('Saved ✓');
    closeEditor();
  }

  async function deleteNote() {
    if (!currentId || !confirm('Delete this note?')) return;
    await cloudDelete(currentId);
    notes = notes.filter(n => n.id !== currentId);
    currentId = null;
    showScreen('home');
    renderHome();
    toast('Deleted');
  }

  // ── UNDO/REDO ──
  function resetHistory(v = '') { undoStack = []; redoStack = []; lastVal = v; updateUndoBtns(); }
  function pushUndo() {
    const v = $('codeTA').value;
    if (v === lastVal) return;
    undoStack.push(lastVal);
    if (undoStack.length > 100) undoStack.shift();
    redoStack = [];
    lastVal = v;
    updateUndoBtns();
  }
  function applyVal(v) {
    $('codeTA').value = v; lastVal = v;
    refreshHL(); updateStats(); drawLines(); updateUndoBtns();
  }
  function undo() { if (!undoStack.length) return; redoStack.push($('codeTA').value); applyVal(undoStack.pop()); }
  function redo() { if (!redoStack.length) return; undoStack.push($('codeTA').value); applyVal(redoStack.pop()); }
  function updateUndoBtns() { $('undoBtn').disabled = !undoStack.length; $('redoBtn').disabled = !redoStack.length; }

  // ── HIGHLIGHT ──
  function refreshHL() {
    const code = $('codeTA').value, lang = $('langPicker').value;
    let out;
    try { out = lang === 'plaintext' ? esc(code) : hljs.highlight(code, { language: lang, ignoreIllegals: true }).value; }
    catch (e) { out = esc(code); }
    $('codeHL').innerHTML = out;
    syncScroll();
  }
  function syncScroll() {
    const pre = $('codeHL').parentElement, ta = $('codeTA');
    if (pre && ta) { pre.scrollTop = ta.scrollTop; pre.scrollLeft = ta.scrollLeft; }
  }
  function drawLines() {
    const lines = $('codeTA').value.split('\n');
    $('lineNums').innerHTML = lines.map((_, i) => `<span>${i + 1}</span>`).join('');
    $('lineNums').scrollTop = $('codeTA').scrollTop;
  }
  function updateStats() {
    const v = $('codeTA').value;
    $('charCount').textContent = v.length + ' chars';
    $('lineCount').textContent = 'Ln ' + v.split('\n').length;
  }

  // ── PREVIEW ──
  function switchToPreview() {
    isPreview = true;
    $('codeStage').style.display = 'none';
    $('liveFrame').classList.add('on');
    const code = $('codeTA').value, lang = $('langPicker').value;
    let html = code;
    if (lang === 'css') html = `<!DOCTYPE html><html><head><style>${code}</style></head><body></body></html>`;

```
else if (lang === 'javascript') html = `<!DOCTYPE html><html><body><script>${code}<\/script></body></html>`;
else if (lang === 'html' && !code.includes('<!DOCTYPE')) html = `<!DOCTYPE html><html>${code}</html>`;
$('liveFrame').srcdoc = html;
```

}
function switchToCode() {
isPreview = false;
$(‘codeStage’).style.display = ‘flex’;
$(‘liveFrame’).classList.remove(‘on’);
}

// ── TOOLBAR EVENTS ──
$(‘editorBackBtn’).addEventListener(‘click’, closeEditor);
$(‘saveBtn’).addEventListener(‘click’, saveNote);
$(‘deleteBtn’).addEventListener(‘click’, deleteNote);
$(‘undoBtn’).addEventListener(‘click’, undo);
$(‘redoBtn’).addEventListener(‘click’, redo);
$(‘selAllBtn’).addEventListener(‘click’, () => { $(‘codeTA’).focus(); $(‘codeTA’).select(); });
$(‘previewBtn’).addEventListener(‘click’, () => isPreview ? switchToCode() : switchToPreview());
$(‘copyBtn’).addEventListener(‘click’, async () => {
try { await navigator.clipboard.writeText($(‘codeTA’).value); toast(‘Copied!’); }
catch (e) { toast(‘Copy failed’); }
});

$(‘codeTA’).addEventListener(‘input’, () => {
refreshHL(); updateStats(); drawLines();
if (currentId) {
const n = notes.find(x => x.id === currentId);
if (n) { n.content = $(‘codeTA’).value; n.updated = Date.now(); cloudSave(n); }
}
clearTimeout(window._ud); window._ud = setTimeout(pushUndo, 600);
});
$(‘codeTA’).addEventListener(‘scroll’, () => { syncScroll(); drawLines(); });

$(‘codeTA’).addEventListener(‘keydown’, function (e) {
if (e.key === ‘Tab’) {
e.preventDefault(); pushUndo();
const s = this.selectionStart;
this.setRangeText(’  ‘, s, this.selectionEnd, ‘end’);
this.selectionStart = this.selectionEnd = s + 2;
refreshHL(); updateStats(); lastVal = this.value;
return;
}
const pairs = { ‘(’: ‘)’, ‘[’: ‘]’, ‘{’: ‘}’, ‘”’: ‘”’, “’”: “’”, ‘`': '`’ };
if (pairs[e.key] && !e.ctrlKey && !e.metaKey && !e.altKey) {
e.preventDefault(); pushUndo();
const s = this.selectionStart, end = this.selectionEnd;
this.setRangeText(e.key + pairs[e.key], s, end, ‘end’);
this.selectionStart = this.selectionEnd = s + 1;
refreshHL(); updateStats(); lastVal = this.value;
}
});

$(‘noteTitle’).addEventListener(‘input’, () => {
if (!currentId) return;
const n = notes.find(x => x.id === currentId);
if (n) { n.title = $(‘noteTitle’).value; n.updated = Date.now(); cloudSave(n); }
});

$(‘langPicker’).addEventListener(‘change’, () => {
refreshHL();
if (currentId) {
const n = notes.find(x => x.id === currentId);
if (n) { n.lang = $(‘langPicker’).value; n.updated = Date.now(); cloudSave(n); }
}
});

$(‘homeSearch’).addEventListener(‘input’, e => { searchTerm = e.target.value; renderHome(); });

document.querySelectorAll(’.chip’).forEach(chip => {
chip.addEventListener(‘click’, () => {
document.querySelectorAll(’.chip’).forEach(c => c.classList.remove(‘active’));
chip.classList.add(‘active’);
filterLang = chip.dataset.lang;
renderHome();
});
});

document.addEventListener(‘keydown’, e => {
if ((e.ctrlKey || e.metaKey) && e.key === ‘s’) { e.preventDefault(); if (currentId) saveNote(); }
if ((e.ctrlKey || e.metaKey) && e.key === ‘z’ && !e.shiftKey) { e.preventDefault(); undo(); }
if ((e.ctrlKey || e.metaKey) && (e.key === ‘y’ || (e.key === ‘z’ && e.shiftKey))) { e.preventDefault(); redo(); }
});

})();
</script>

</body>
</html>
