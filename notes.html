<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DevPath 180 • Notes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <style>
    :root {
      --bg: #000;
      --card: #1a1a24;
      --border: #2a2a36;
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --accent2: #409cff;
      --green: #30d158;
      --red: #ff453a;
      --radius: 14px;
      --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: auto;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .app { flex: 1; display: flex; flex-direction: column; min-height: 100dvh; }
    ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* ── HOME ── */
    .home-view { display: flex; flex-direction: column; flex: 1; padding: 16px; }
    .home-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .home-title-wrapper { display: flex; align-items: center; gap: 10px; }
    .home-title-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .home-title-icon svg { width: 100%; height: 100%; stroke: var(--accent); }
    .home-title-text { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .home-new-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
    .home-new-btn:hover { background: var(--accent2); }
    .home-tools { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .search-input { flex:1; min-width:150px; background:var(--card); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:10px; font-size:0.9rem; outline:none; }
    .search-input::placeholder{color:var(--secondary)}
    .filter-chip{ padding:8px 14px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--secondary); cursor:pointer; font-size:0.8rem; font-weight:600; white-space:nowrap; }
    .filter-chip.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
    .notes-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
    .note-card-home{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; cursor:pointer; transition:all 0.2s; }
    .note-card-home:active{ background:#222; }
    .note-card-home .title{ font-weight:600; font-size:0.9rem; margin-bottom:6px; }
    .note-card-home .lang{ font-size:0.65rem; text-transform:uppercase; color:var(--accent); background:rgba(10,132,255,0.15); padding:2px 8px; border-radius:4px; }
    .note-card-home .delete-btn{ margin-top:8px; background:none; border:none; color:var(--secondary); cursor:pointer; font-size:0.8rem; }
    .note-card-home .delete-btn:hover{ color:var(--red); }
    .empty-notes{ grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--secondary); }
    .dashboard-link{ display:inline-flex; align-items:center; gap:6px; color:var(--accent); text-decoration:none; font-weight:500; margin-top:16px; align-self:flex-start; }

    /* ── EDITOR ── */
    .editor-view{ display:none; flex-direction:column; flex:1; }
    .editor-view.active{ display:flex; }
    .navbar{ padding:12px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); min-height:52px; }
    .back-btn{ background:none; border:none; color:var(--accent); font-size:1rem; cursor:pointer; display:flex; align-items:center; gap:4px; }
    .nav-title-input{ flex:1; background:transparent; border:none; font-size:1.1rem; font-weight:600; color:var(--text); outline:none; min-width:0; }
    .nav-title-input::placeholder{ color:var(--secondary); }
    .editor-container{ flex:1; display:flex; flex-direction:column; min-height:0; position:relative; }
    
    .code-stage{ flex:1; position:relative; display:flex; overflow:hidden; }
    .code-layer{ position:absolute; inset:12px 12px 12px 50px; font-family:var(--mono); font-size:0.88rem; line-height:1.75; white-space:pre-wrap; overflow:auto; border:none; outline:none; background:transparent; }
    .code-textarea{ color:transparent; caret-color:var(--accent); resize:none; z-index:2; }
    .code-textarea::selection{ background:rgba(10,132,255,0.3); }
    .code-preview{ pointer-events:none; z-index:1; }
    .code-preview code{ background:transparent!important; padding:0!important; }
    .line-numbers{ position:absolute; top:12px; left:4px; bottom:12px; width:40px; font-family:var(--mono); font-size:0.78rem; color:var(--secondary); text-align:right; overflow:hidden; z-index:3; pointer-events:none; line-height:1.75; padding-right:6px; }
    .line-numbers span{ display:block; }

    /* ── LIVE PREVIEW ── */
    .live-preview {
      flex: 1;
      display: none;
      border: none;
      background: #fff;
      width: 100%;
      height: 100%;
    }
    .live-preview.active {
      display: block;
    }

    .bottom-toolbar{ display:flex; align-items:center; gap:8px; padding:10px 14px; border-top:1px solid var(--border); background:var(--bg); flex-wrap:wrap; }
    .lang-picker{ background:var(--card); border:1px solid var(--border); color:var(--text); padding:7px 12px; border-radius:20px; font-size:0.8rem; outline:none; cursor:pointer; }
    .tool-btn{ padding:8px 14px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:0.8rem; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:5px; transition:all 0.2s; }
    .tool-btn:active{ transform:scale(0.95); }
    .tool-btn.copy{ color:var(--green); border-color:rgba(48,209,88,0.3); }
    .tool-btn.copy.copied{ background:rgba(48,209,88,0.2); border-color:var(--green); }
    .tool-btn.save{ background:var(--accent); color:#fff; border-color:var(--accent); }
    .tool-btn.save:active{ background:var(--accent2); }
    .tool-btn.delete{ color:var(--red); border-color:rgba(255,69,58,0.4); }
    .tool-btn.preview{ color:var(--accent); border-color:rgba(10,132,255,0.4); }
    .tool-btn.preview.active{ background:var(--accent); color:#fff; }
    .tool-btn svg{ width:16px; height:16px; }
    .status-bar{ padding:4px 16px; display:flex; justify-content:space-between; font-size:0.7rem; color:var(--secondary); font-family:var(--mono); }

    .toast-panel{ position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
    .toast{ background:var(--card); border:1px solid var(--border); padding:10px 20px; border-radius:20px; font-weight:500; font-size:0.85rem; box-shadow:0 2px 20px rgba(0,0,0,0.5); text-align:center; animation:toastIn 0.4s ease; pointer-events:auto; }
    @keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}

    @media(max-width:480px){ .notes-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="app" id="appRoot">
  <!-- ════ HOME VIEW ════ -->
  <div class="home-view" id="homeView">
    <div class="home-header">
      <div class="home-title-wrapper">
        <span class="home-title-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </span>
        <span class="home-title-text">Notes</span>
      </div>
      <button class="home-new-btn" id="homeNewBtn">+</button>
    </div>
    <div class="home-tools">
      <input type="text" class="search-input" id="homeSearch" placeholder="Search notes..." autocomplete="off">
      <button class="filter-chip active" data-lang="all">All</button>
      <button class="filter-chip" data-lang="html">HTML</button>
      <button class="filter-chip" data-lang="css">CSS</button>
      <button class="filter-chip" data-lang="javascript">JS</button>
      <button class="filter-chip" data-lang="python">Python</button>
    </div>
    <div class="notes-grid" id="notesGrid"></div>
    <a href="index.html" class="dashboard-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Dashboard
    </a>
  </div>

  <!-- ════ EDITOR VIEW ════ -->
  <div class="editor-view" id="editorView">
    <div class="navbar">
      <button class="back-btn" id="editorBackBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <input type="text" class="nav-title-input" id="noteTitle" placeholder="Note title">
    </div>
    <div class="editor-container">
      <!-- Code Stage -->
      <div class="code-stage" id="codeStage">
        <div class="line-numbers" id="lineNums">1</div>
        <textarea class="code-layer code-textarea" id="codeTextarea" placeholder="Write code…" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
        <pre class="code-layer code-preview"><code class="hljs" id="codeHighlight"></code></pre>
      </div>
      <!-- Live Preview iframe using srcdoc for instant updates -->
      <iframe class="live-preview" id="livePreview" sandbox="allow-scripts allow-same-origin" title="Live Preview"></iframe>
    </div>
    <div class="bottom-toolbar">
      <select class="lang-picker" id="langPicker">
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="javascript">JavaScript</option>
        <option value="jsx">React JSX</option>
        <option value="typescript">TypeScript</option>
        <option value="python">Python</option>
        <option value="sql">SQL</option>
        <option value="json">JSON</option>
        <option value="bash">Bash</option>
        <option value="plaintext">Plain Text</option>
      </select>
      <button class="tool-btn preview" id="previewBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M12 2s8 4 8 10-8 10-8 10-8-4-8-10 8-10 8-10z"/></svg>
        Preview
      </button>
      <button class="tool-btn copy" id="copyBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
      <button class="tool-btn delete" id="deleteBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
      <button class="tool-btn save" id="saveBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
        Save
      </button>
    </div>
    <div class="status-bar">
      <span id="lineCount">Ln 1</span>
      <span id="charCount">0 chars</span>
    </div>
  </div>
</div>

<div class="toast-panel" id="toastPanel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function(){
  const STORE = 'dpn_v12';
  let notes = JSON.parse(localStorage.getItem(STORE)||'[]');
  let currentId = null;
  let filterLang = 'all';
  let searchTerm = '';
  let isPreview = false;

  const $ = id => document.getElementById(id);
  const homeView = $('homeView');
  const editorView = $('editorView');
  const livePreview = $('livePreview');
  const codeStage = $('codeStage');
  const previewBtn = $('previewBtn');

  function persist() { localStorage.setItem(STORE, JSON.stringify(notes)); }

  // ══════ HOME ══════
  function renderHome() {
    let filtered = [...notes];
    if (filterLang !== 'all') filtered = filtered.filter(n => n.lang === filterLang);
    if (searchTerm.trim()) {
      const q = searchTerm.toLowerCase();
      filtered = filtered.filter(n => (n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q));
    }
    filtered.sort((a,b) => b.updated - a.updated);

    const grid = $('notesGrid');
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-notes">No notes yet.<br>Tap + to create one.</div>';
    } else {
      grid.innerHTML = filtered.map(n => `
        <div class="note-card-home" data-id="${n.id}">
          <div class="title">${esc(n.title || 'Untitled')}</div>
          <span class="lang">${n.lang||'txt'}</span>
          <button class="delete-btn" data-del="${n.id}">Delete</button>
        </div>
      `).join('');
    }

    grid.querySelectorAll('.note-card-home').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-del]')) return;
        openEditor(card.dataset.id);
      });
    });
    grid.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.del;
        if (confirm('Delete this note?')) {
          notes = notes.filter(n => n.id !== id);
          persist();
          renderHome();
          toast('Deleted');
        }
      });
    });
  }

  // ══════ EDITOR ══════
  function openEditor(id) {
    currentId = id;
    const note = notes.find(n => n.id === id);
    if (!note) return;
    $('noteTitle').value = note.title || '';
    $('codeTextarea').value = note.content || '';
    $('langPicker').value = note.lang || 'plaintext';
    homeView.style.display = 'none';
    editorView.classList.add('active');
    switchToCode();
    refreshHighlight();
    updateStats();
  }

  function openNewNote() {
    const note = {
      id: Date.now().toString(36) + Math.random().toString(36).substr(2,7),
      title: '', content: '', lang: 'html', updated: Date.now()
    };
    notes.unshift(note);
    persist();
    openEditor(note.id);
  }

  function closeEditor() {
    currentId = null;
    editorView.classList.remove('active');
    homeView.style.display = '';
    $('noteTitle').value = '';
    $('codeTextarea').value = '';
    $('codeHighlight').textContent = '';
    switchToCode();
    renderHome();
  }

  function saveCurrent() {
    if (!currentId) return;
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    note.title = $('noteTitle').value.trim();
    note.content = $('codeTextarea').value;
    note.lang = $('langPicker').value;
    note.updated = Date.now();
    persist();
    toast('Saved');
    renderHome();
  }

  function deleteCurrent() {
    if (!currentId) return;
    if (!confirm('Delete this note?')) return;
    notes = notes.filter(n => n.id !== currentId);
    persist();
    closeEditor();
    toast('Deleted');
  }

  // ══════ PREVIEW ══════
  function switchToPreview() {
    isPreview = true;
    codeStage.style.display = 'none';
    livePreview.classList.add('active');
    previewBtn.classList.add('active');
    previewBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> Code';
    updatePreview();
  }

  function switchToCode() {
    isPreview = false;
    codeStage.style.display = 'flex';
    livePreview.classList.remove('active');
    livePreview.srcdoc = ''; // clear preview content
    previewBtn.classList.remove('active');
    previewBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M12 2s8 4 8 10-8 10-8 10-8-4-8-10 8-10 8-10z"/></svg> Preview';
  }

  function updatePreview() {
    if (!isPreview) return;
    const code = $('codeTextarea').value;
    const lang = $('langPicker').value;
    
    let html = code;
    if (lang === 'css') {
      html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>${code}</style></head><body></body></html>`;
    } else if (lang === 'javascript') {
      html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body><script>${code}<\/script></body></html>`;
    } else if (lang === 'html') {
      if (!code.includes('<!DOCTYPE')) {
        html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body>${code}</body></html>`;
      }
    }
    livePreview.srcdoc = html;
  }

  // ══════ SYNTAX ══════
  function refreshHighlight() {
    const code = $('codeTextarea').value;
    const lang = $('langPicker').value;
    let out;
    try {
      out = lang === 'plaintext' ? esc(code) : hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
    } catch(e) { out = esc(code); }
    $('codeHighlight').innerHTML = out;
    syncScroll();
    drawLineNumbers();
  }

  function syncScroll() {
    const pre = $('codeHighlight').parentElement;
    pre.scrollTop = $('codeTextarea').scrollTop;
    pre.scrollLeft = $('codeTextarea').scrollLeft;
  }

  function drawLineNumbers() {
    const lines = $('codeTextarea').value.split('\n');
    $('lineNums').innerHTML = lines.map((_, i) => `<span>${i+1}</span>`).join('');
    $('lineNums').scrollTop = $('codeTextarea').scrollTop;
  }

  async function copyCode() {
    const code = $('codeTextarea').value;
    if (!code.trim()) { toast('Nothing to copy'); return; }
    try {
      await navigator.clipboard.writeText(code);
      const btn = $('copyBtn');
      btn.classList.add('copied');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy';
      }, 2000);
      toast('Copied!');
    } catch(e) { toast('Copy failed'); }
  }

  function updateStats() {
    const code = $('codeTextarea').value;
    $('charCount').textContent = code.length + ' chars';
    $('lineCount').textContent = 'Ln ' + code.split('\n').length;
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function toast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    $('toastPanel').appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  // ══════ EVENTS ══════
  $('homeNewBtn').addEventListener('click', openNewNote);
  $('editorBackBtn').addEventListener('click', closeEditor);
  $('saveBtn').addEventListener('click', saveCurrent);
  $('deleteBtn').addEventListener('click', deleteCurrent);
  $('copyBtn').addEventListener('click', copyCode);

  previewBtn.addEventListener('click', () => {
    isPreview ? switchToCode() : switchToPreview();
  });

  $('codeTextarea').addEventListener('input', () => {
    refreshHighlight();
    updateStats();
    if (currentId) {
      const note = notes.find(n => n.id === currentId);
      if (note) { note.content = $('codeTextarea').value; note.updated = Date.now(); persist(); }
    }
    if (isPreview) updatePreview();
  });

  $('homeSearch').addEventListener('input', (e) => { searchTerm = e.target.value; renderHome(); });

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      filterLang = chip.dataset.lang;
      renderHome();
    });
  });

  $('noteTitle').addEventListener('input', () => {
    if (currentId) {
      const note = notes.find(n => n.id === currentId);
      if (note) { note.title = $('noteTitle').value.trim(); note.updated = Date.now(); persist(); }
    }
  });

  $('langPicker').addEventListener('change', () => {
    refreshHighlight();
    if (currentId) {
      const note = notes.find(n => n.id === currentId);
      if (note) { note.lang = $('langPicker').value; note.updated = Date.now(); persist(); }
    }
    if (isPreview) updatePreview();
  });

  $('codeTextarea').addEventListener('scroll', () => { syncScroll(); drawLineNumbers(); });

  $('codeTextarea').addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const ta = $('codeTextarea');
      const s = ta.selectionStart;
      ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = s + 2;
      refreshHighlight();
      updateStats();
    }
  });

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveCurrent(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openNewNote(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'p') { e.preventDefault(); isPreview ? switchToCode() : switchToPreview(); }
  });

  renderHome();
})();
</script>
</body>
</html>
