<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevPath 180 • Notes Studio</title>
    <!-- highlight.js للتمييز التركيبي -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        :root {
            --bg: #070710;
            --surface: #0d0d1f;
            --surface2: #111128;
            --border: #1e1e40;
            --border2: #2a2a55;
            --text: #e8e8ff;
            --text2: #7878aa;
            --text3: #4a4a7a;
            --accent: #4f46e5;
            --accent2: #818cf8;
            --success: #06ffa5;
            --danger: #ef4444;
            --orange: #f97316;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
            --font: 'DM Sans', 'Segoe UI', sans-serif;
            --mono: 'Space Mono', 'Consolas', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        /* الشريط الجانبي */
        .sidebar {
            width: 320px; min-width: 320px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            z-index: 20;
            transition: transform 0.3s;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .logo {
            font-family: var(--mono);
            font-weight: 700; font-size: 1.1rem;
            color: var(--success);
            display: flex; align-items: center; gap: 8px;
            text-decoration: none;
        }
        .logo svg { width: 24px; height: 24px; }
        .new-btn {
            margin-left: auto;
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            display: flex; align-items: center; gap: 6px;
            font-size: 0.85rem;
        }
        .new-btn:hover { background: var(--accent2); }
        .new-btn svg { width: 18px; height: 18px; }

        .filters {
            padding: 12px 16px;
            display: flex; gap: 6px; flex-wrap: wrap;
        }
        .filter-chip {
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            cursor: pointer; font-size: 0.75rem;
            font-weight: 600; transition: all 0.2s;
        }
        .filter-chip.active { background: rgba(79,70,229,0.2); border-color: var(--accent); color: var(--accent2); }

        .notes-list {
            flex: 1; overflow-y: auto; padding: 0 8px;
        }
        .note-item {
            padding: 12px 14px; margin: 2px 0;
            border-radius: var(--radius-sm); cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s; position: relative;
        }
        .note-item:hover { background: rgba(255,255,255,0.03); }
        .note-item.active { background: rgba(79,70,229,0.1); border-color: rgba(79,70,229,0.3); }
        .note-item-title { font-weight: 600; font-size: 0.9rem; }
        .note-item-lang {
            font-size: 0.7rem; color: var(--accent2);
            background: rgba(79,70,229,0.2);
            padding: 2px 8px; border-radius: 4px;
        }
        .note-item-delete {
            position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; color: var(--text3);
            cursor: pointer; font-size: 1rem; opacity: 0;
            transition: opacity 0.2s;
        }
        .note-item:hover .note-item-delete { opacity: 1; color: var(--danger); }

        /* المحرر */
        .main {
            flex: 1; height: 100vh;
            display: flex; flex-direction: column;
            background: var(--bg);
        }
        .editor-toolbar {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 24px; border-bottom: 1px solid var(--border);
        }
        .title-input {
            flex: 1; background: transparent; border: none;
            font-size: 1.3rem; font-weight: 700;
            color: white; font-family: var(--font); outline: none;
        }
        .title-input::placeholder { color: var(--text3); }
        .lang-picker {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2); padding: 6px 12px;
            border-radius: 8px; font-size: 0.8rem; outline: none; cursor: pointer;
        }
        .btn {
            padding: 8px 16px; border-radius: 8px; border: none;
            font-weight: 600; cursor: pointer; font-size: 0.8rem;
            display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.2s;
        }
        .btn-icon { background: transparent; border: 1px solid var(--border); color: var(--text2); }
        .btn-icon:hover { border-color: var(--border2); color: white; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent2); }

        .editor-area {
            flex: 1; padding: 0; position: relative;
        }
        .code-container {
            position: relative; height: 100%;
        }
        .code-textarea {
            width: 100%; height: 100%;
            background: transparent; border: none;
            padding: 20px 24px;
            color: transparent; caret-color: white;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.95rem; line-height: 1.7;
            resize: none; outline: none;
            position: absolute; top:0; left:0; z-index: 2;
            white-space: pre-wrap;
        }
        .code-preview {
            position: absolute; top:0; left:0; right:0; bottom:0;
            padding: 20px 24px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.95rem; line-height: 1.7;
            white-space: pre-wrap;
            pointer-events: none; z-index: 1;
            overflow: hidden;
            background: transparent;
        }
        .code-preview code { background: transparent; }

        .editor-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 24px; border-top: 1px solid var(--border);
        }
        .char-count { font-size: 0.75rem; color: var(--text3); }

        /* أزرار عائمة */
        .floating-actions {
            position: absolute; top: 12px; right: 16px;
            display: flex; gap: 6px; z-index: 10;
        }
        .copy-btn, .run-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            cursor: pointer;
            font-size: 0.75rem;
            display: flex; align-items: center; gap: 4px;
        }
        .copy-btn:hover, .run-btn:hover { border-color: var(--accent); color: white; }
        .copy-btn.copied { border-color: var(--success); color: var(--success); }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--surface); border: 1px solid var(--success);
            color: var(--success); padding: 12px 20px;
            border-radius: var(--radius-sm); font-weight: 600;
            z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:none;opacity:1} }

        /* Run modal */
        .run-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .run-frame {
            width: 90%; height: 85%; background: white; border-radius: var(--radius);
            border: none;
        }
        .close-run {
            position: absolute; top: 20px; right: 30px;
            background: var(--danger); color: white; border: none;
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
        }

        @media(max-width:680px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.6); z-index: 35; }
            .sidebar-overlay.show { display: block; }
            .menu-toggle { display: flex!important; }
        }
        .menu-toggle {
            display: none; position: fixed; top: 14px; left: 14px;
            z-index: 50; background: var(--surface); border: 1px solid var(--border);
            color: white; width: 40px; height: 40px; border-radius: 8px;
            align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- الشريط الجانبي -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="index.html" class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="8" y1="11" x2="20" y2="11"/><polyline points="14 17 20 11 14 5"/></svg>
            DevPath Notes
        </a>
        <button class="new-btn" id="newNoteBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New
        </button>
    </div>
    <div class="filters" id="filters">
        <button class="filter-chip active" data-cat="all">All</button>
        <button class="filter-chip" data-cat="html">HTML</button>
        <button class="filter-chip" data-cat="css">CSS</button>
        <button class="filter-chip" data-cat="js">JavaScript</button>
        <button class="filter-chip" data-cat="react">React</button>
        <button class="filter-chip" data-cat="backend">Backend</button>
    </div>
    <div class="notes-list" id="notesList"></div>
    <div style="padding:16px; border-top:1px solid var(--border); font-size:0.65rem; color:var(--text3); text-align:center;">
        <span id="noteCount">0 notes</span>
    </div>
</aside>

<!-- المحرر -->
<main class="main">
    <div class="editor-toolbar">
        <input type="text" class="title-input" id="editorTitle" placeholder="Untitled Note">
        <select class="lang-picker" id="editorLang">
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="javascript">JavaScript</option>
            <option value="jsx">React JSX</option>
            <option value="typescript">TypeScript</option>
            <option value="json">JSON</option>
            <option value="python">Python</option>
            <option value="sql">SQL</option>
            <option value="bash">Bash</option>
            <option value="plaintext">Plain Text</option>
        </select>
    </div>
    <div class="editor-area" id="editorArea">
        <div class="code-container" id="codeContainer" style="display:none;">
            <textarea class="code-textarea" id="codeTextarea" placeholder="// Write your code here..." spellcheck="false"></textarea>
            <pre class="code-preview" id="codePreview"><code class="hljs" id="codeHighlight"></code></pre>
            <div class="floating-actions">
                <button class="copy-btn" id="copyBtn" title="Copy full code">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    Copy
                </button>
                <button class="run-btn" id="runBtn" title="Run HTML/CSS/JS">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Run
                </button>
            </div>
        </div>
        <div class="empty-state" id="emptyState" style="display:flex; flex:1; align-items:center; justify-content:center; color:var(--text3);">
            <div style="text-align:center;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <p style="margin-top:12px;">Select a note or create a new one</p>
            </div>
        </div>
    </div>
    <div class="editor-footer">
        <span class="char-count" id="charCounter">0 characters</span>
        <div style="display:flex; gap:8px;">
            <button class="btn btn-icon" id="deleteNoteBtn" style="display:none; color:var(--danger); border-color:rgba(239,68,68,0.3);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                Delete
            </button>
            <button class="btn btn-primary" id="saveNoteBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save
            </button>
        </div>
    </div>
</main>

<!-- Run modal -->
<div class="run-modal" id="runModal">
    <button class="close-run" id="closeRunModal">Close</button>
    <iframe class="run-frame" id="runFrame"></iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function() {
    const STORAGE_KEY = 'dp_notes_v4';

    // ---------- DATA ----------
    function loadNotes() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch(e) { return []; }
    }
    function saveNotes(notes) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    // ---------- STATE ----------
    let notes = loadNotes();
    let currentNoteId = null;
    let activeFilter = 'all';
    let autoSaveTimeout;

    // ---------- DOM ----------
    const $ = id => document.getElementById(id);
    const notesList = $('notesList');
    const editorTitle = $('editorTitle');
    const codeTextarea = $('codeTextarea');
    const codeHighlight = $('codeHighlight');
    const codePreview = $('codePreview');
    const codeContainer = $('codeContainer');
    const editorLang = $('editorLang');
    const emptyState = $('emptyState');
    const deleteNoteBtn = $('deleteNoteBtn');
    const charCounter = $('charCounter');
    const noteCountSpan = $('noteCount');
    const copyBtn = $('copyBtn');
    const runBtn = $('runBtn');
    const runModal = $('runModal');
    const runFrame = $('runFrame');

    // ---------- HELPERS ----------
    function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
    function escHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    // ---------- RENDER SIDEBAR ----------
    function renderSidebar() {
        let filtered = notes;
        if (activeFilter !== 'all') filtered = notes.filter(n => n.lang === activeFilter);
        filtered.sort((a,b) => b.updatedAt - a.updatedAt);

        notesList.innerHTML = filtered.map(n => `
            <div class="note-item ${n.id === currentNoteId ? 'active' : ''}" data-id="${n.id}">
                <div class="note-item-title">${escHtml(n.title || 'Untitled')}</div>
                <span class="note-item-lang">${n.lang || 'text'}</span>
                <button class="note-item-delete" data-del="${n.id}">✕</button>
            </div>
        `).join('');

        notesList.querySelectorAll('.note-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (e.target.closest('[data-del]')) return;
                openNote(item.dataset.id);
            });
        });
        notesList.querySelectorAll('[data-del]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteNote(btn.dataset.del);
            });
        });
        noteCountSpan.textContent = `${filtered.length} note${filtered.length !== 1 ? 's' : ''}`;
    }

    // ---------- OPEN / NEW / DELETE ----------
    function openNote(id) {
        const note = notes.find(n => n.id === id);
        if (!note) return;
        // حفظ الحالي تلقائياً
        saveCurrent(true);
        currentNoteId = id;
        editorTitle.value = note.title || '';
        codeTextarea.value = note.content || '';
        editorLang.value = note.lang || 'plaintext';
        emptyState.style.display = 'none';
        codeContainer.style.display = 'block';
        deleteNoteBtn.style.display = 'flex';
        updateHighlight();
        updateCharCount();
        renderSidebar();
        codeTextarea.focus();
    }

    function newNote() {
        saveCurrent(true);
        const note = {
            id: genId(),
            title: '',
            content: '',
            lang: 'html',
            createdAt: Date.now(),
            updatedAt: Date.now()
        };
        notes.unshift(note);
        saveNotes(notes);
        openNote(note.id);
    }

    function deleteNote(id) {
        if (!confirm('Delete this note permanently?')) return;
        notes = notes.filter(n => n.id !== id);
        saveNotes(notes);
        if (currentNoteId === id) {
            currentNoteId = null;
            clearEditor();
        }
        renderSidebar();
        showToast('Note deleted');
    }

    function clearEditor() {
        editorTitle.value = '';
        codeTextarea.value = '';
        codeHighlight.textContent = '';
        currentNoteId = null;
        emptyState.style.display = 'flex';
        codeContainer.style.display = 'none';
        deleteNoteBtn.style.display = 'none';
        updateCharCount();
    }

    // ---------- SAVE ----------
    function saveCurrent(silent) {
        if (!currentNoteId) return;
        const note = notes.find(n => n.id === currentNoteId);
        if (!note) return;
        note.title = editorTitle.value;
        note.content = codeTextarea.value;
        note.lang = editorLang.value;
        note.updatedAt = Date.now();
        saveNotes(notes);
        if (!silent) showToast('Saved');
        renderSidebar();
    }

    function autoSave() {
        clearTimeout(autoSaveTimeout);
        autoSaveTimeout = setTimeout(() => saveCurrent(true), 2000);
    }

    // ---------- SYNTAX HIGHLIGHTING ----------
    function updateHighlight() {
        const code = codeTextarea.value;
        const lang = editorLang.value;
        try {
            if (lang === 'plaintext') {
                codeHighlight.textContent = code;
            } else {
                const result = hljs.highlight(code, { language: lang, ignoreIllegals: true });
                codeHighlight.innerHTML = result.value;
            }
        } catch(e) {
            codeHighlight.textContent = code;
        }
        // مزامنة الـ scroll
        codePreview.scrollTop = codeTextarea.scrollTop;
        codePreview.scrollLeft = codeTextarea.scrollLeft;
    }

    // ---------- COPY CODE ----------
    async function copyCode() {
        try {
            await navigator.clipboard.writeText(codeTextarea.value);
            copyBtn.classList.add('copied');
            copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
            setTimeout(() => {
                copyBtn.classList.remove('copied');
                copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy';
            }, 2000);
        } catch(e) {
            showToast('Copy failed');
        }
    }

    // ---------- RUN CODE ----------
    function runCode() {
        const code = codeTextarea.value;
        const lang = editorLang.value;
        let html = code;
        if (lang === 'css') html = `<html><head><style>${code}</style></head><body></body></html>`;
        else if (lang === 'javascript' || lang === 'js') html = `<html><body><script>${code}<\/script></body></html>`;
        const blob = new Blob([html], { type: 'text/html' });
        runFrame.src = URL.createObjectURL(blob);
        runModal.style.display = 'flex';
    }

    // ---------- CHAR COUNT ----------
    function updateCharCount() {
        charCounter.textContent = `${codeTextarea.value.length} characters`;
    }

    // ---------- TOAST ----------
    function showToast(msg) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // ---------- EVENTS ----------
    $('newNoteBtn').addEventListener('click', newNote);
    $('saveNoteBtn').addEventListener('click', () => saveCurrent());
    $('deleteNoteBtn').addEventListener('click', () => { if (currentNoteId) deleteNote(currentNoteId); });
    $('copyBtn').addEventListener('click', copyCode);
    $('runBtn').addEventListener('click', runCode);
    $('closeRunModal').addEventListener('click', () => { runModal.style.display = 'none'; runFrame.src = ''; });

    editorTitle.addEventListener('input', autoSave);
    codeTextarea.addEventListener('input', () => {
        updateHighlight();
        updateCharCount();
        autoSave();
    });
    codeTextarea.addEventListener('scroll', () => {
        codePreview.scrollTop = codeTextarea.scrollTop;
        codePreview.scrollLeft = codeTextarea.scrollLeft;
    });
    editorLang.addEventListener('change', () => { updateHighlight(); autoSave(); });

    // الفلاتر
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            activeFilter = chip.dataset.cat;
            renderSidebar();
        });
    });

    // الشريط الجانبي للموبايل
    $('menuToggle').addEventListener('click', () => {
        $('sidebar').classList.toggle('open');
        $('sidebarOverlay').classList.toggle('show');
    });
    $('sidebarOverlay').addEventListener('click', () => {
        $('sidebar').classList.remove('open');
        $('sidebarOverlay').classList.remove('show');
    });

    // اختصارات
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveCurrent();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
            e.preventDefault();
            newNote();
        }
    });

    // ---------- INIT ----------
    renderSidebar();
    if (notes.length > 0) openNote(notes[0].id);
})();
</script>
</body>
</html>
