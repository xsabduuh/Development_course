<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevPath 180 • Notes Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #000;
      --card: #1a1a24;
      --border: #2a2a36;
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --accent2: #409cff;
      --green: #30d158;
      --red: #ff453a;
      --radius: 14px;
      --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      --shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: auto;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .app { flex: 1; display: flex; flex-direction: column; min-height: 100dvh; }
    ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* ── LOGIN SCREEN ── */
    .login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; padding: 40px 20px;
    }
    .login-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .login-title { font-size: 1.6rem; font-weight: 700; text-align: center; color: var(--accent); }
    .input-field {
      background: #1c1c2e; border: 1px solid var(--border); color: var(--text);
      padding: 12px 16px; border-radius: 12px; font-size: 1rem; outline: none;
    }
    .error-msg { color: var(--red); font-size: 0.85rem; text-align: center; min-height: 20px; }

    /* ── HOME (قائمة الملاحظات) ── */
    .home-view { display: flex; flex-direction: column; flex: 1; padding: 16px; }
    .home-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .home-title { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.5px; }
    .home-new-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      font-size: 1.6rem; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
    }
    .home-new-btn:hover { background: var(--accent2); }
    .home-tools { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .search-input {
      flex: 1; min-width: 150px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 10px;
      font-size: 0.9rem; outline: none;
    }
    .search-input::placeholder { color: var(--secondary); }
    .filter-chip {
      padding: 8px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--secondary); cursor: pointer; font-size: 0.8rem;
      font-weight: 600; white-space: nowrap;
    }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .note-card-home {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      cursor: pointer; transition: all 0.2s;
    }
    .note-card-home:active { background: #222; }
    .note-card-home .title { font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; }
    .note-card-home .lang {
      font-size: 0.65rem; text-transform: uppercase;
      color: var(--accent); background: rgba(10,132,255,0.15);
      padding: 2px 8px; border-radius: 4px;
    }
    .note-card-home .delete-btn {
      margin-top: 8px; background: none; border: none;
      color: var(--secondary); cursor: pointer; font-size: 0.8rem;
    }
    .note-card-home .delete-btn:hover { color: var(--red); }
    .empty-notes {
      grid-column: 1 / -1; text-align: center;
      padding: 60px 20px; color: var(--secondary);
    }
    .dashboard-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--accent); text-decoration: none; font-weight: 500;
      margin-top: 16px; align-self: flex-start;
    }

    /* ── EDITOR (مشهد المحرر) ── */
    .editor-view { display: none; flex-direction: column; flex: 1; }
    .editor-view.active { display: flex; }
    .navbar {
      padding: 12px 16px; display: flex; align-items: center;
      gap: 10px; border-bottom: 1px solid var(--border);
      min-height: 52px;
    }
    .back-btn {
      background: none; border: none; color: var(--accent);
      font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 4px;
    }
    .nav-title-input {
      flex: 1; background: transparent; border: none;
      font-size: 1.1rem; font-weight: 600; color: var(--text);
      outline: none; min-width: 0;
    }
    .nav-title-input::placeholder { color: var(--secondary); }
    .editor-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .code-stage {
      flex: 1; position: relative; display: flex; overflow: hidden;
    }
    .code-layer {
      position: absolute; inset: 12px 12px 12px 50px;
      font-family: var(--mono); font-size: 0.88rem;
      line-height: 1.75; white-space: pre-wrap;
      overflow: auto; border: none; outline: none; background: transparent;
    }
    .code-textarea {
      color: transparent; caret-color: var(--accent);
      resize: none; z-index: 2;
    }
    .code-textarea::selection { background: rgba(10,132,255,0.3); }
    .code-preview { pointer-events: none; z-index: 1; }
    .code-preview code { background: transparent !important; padding: 0 !important; }
    .line-numbers {
      position: absolute; top: 12px; left: 4px; bottom: 12px;
      width: 40px; font-family: var(--mono); font-size: 0.78rem;
      color: var(--secondary); text-align: right;
      overflow: hidden; z-index: 3; pointer-events: none;
      line-height: 1.75; padding-right: 6px;
    }
    .line-numbers span { display: block; }
    .bottom-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-top: 1px solid var(--border);
      background: var(--bg); flex-wrap: wrap;
    }
    .lang-picker {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 7px 12px; border-radius: 20px;
      font-size: 0.8rem; outline: none; cursor: pointer;
    }
    .tool-btn {
      padding: 8px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: all 0.2s;
    }
    .tool-btn:active { transform: scale(0.95); }
    .tool-btn.copy { color: var(--green); border-color: rgba(48,209,88,0.3); }
    .tool-btn.copy.copied { background: rgba(48,209,88,0.2); border-color: var(--green); }
    .tool-btn.save { background: var(--accent); color: #fff; border-color: var(--accent); }
    .tool-btn.save:active { background: var(--accent2); }
    .tool-btn.delete { color: var(--red); border-color: rgba(255,69,58,0.3); }
    .tool-btn svg { width: 16px; height: 16px; }

    /* أزرار Undo/Redo – إضافة بسيطة للتمييز */
    .tool-btn.undo,
    .tool-btn.redo {
      color: var(--secondary);
    }
    .tool-btn.undo:disabled,
    .tool-btn.redo:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .status-bar {
      padding: 4px 16px; display: flex; justify-content: space-between;
      font-size: 0.7rem; color: var(--secondary); font-family: var(--mono);
    }

    /* Toast */
    .toast-panel {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 200; display: flex; flex-direction: column; gap: 6px;
      pointer-events: none;
    }
    .toast {
      background: var(--card); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 20px;
      font-weight: 500; font-size: 0.85rem;
      box-shadow: var(--shadow); text-align: center;
      animation: toastIn 0.4s ease; pointer-events: auto;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }

    @media (max-width: 480px) {
      .notes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app" id="appRoot">

  <!-- ════ LOGIN SCREEN ════ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-title">DevPath Notes</div>
      <input type="email" class="input-field" id="emailInput" placeholder="Email" autocomplete="email">
      <input type="password" class="input-field" id="passwordInput" placeholder="Password" autocomplete="current-password">
      <div class="error-msg" id="loginError"></div>
      <button class="tool-btn save" id="loginBtn" style="width:100%; justify-content:center; padding:12px;">Sign In</button>
      <button class="tool-btn" id="registerBtn" style="width:100%; justify-content:center; padding:12px; background:transparent; border:1px solid var(--border);">Create Account</button>
    </div>
  </div>

  <!-- ════ HOME VIEW ════ -->
  <div class="home-view" id="homeView" style="display:none;">
    <div class="home-header">
      <span class="home-title">📝 Notes</span>
      <button class="home-new-btn" id="homeNewBtn">+</button>
    </div>
    <div class="home-tools">
      <input type="text" class="search-input" id="homeSearch" placeholder="Search notes..." autocomplete="off">
      <button class="filter-chip active" data-lang="all">All</button>
      <button class="filter-chip" data-lang="html">HTML</button>
      <button class="filter-chip" data-lang="css">CSS</button>
      <button class="filter-chip" data-lang="javascript">JS</button>
      <button class="filter-chip" data-lang="python">Python</button>
    </div>
    <div class="notes-grid" id="notesGrid"></div>
    <a href="index.html" class="dashboard-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Dashboard
    </a>
  </div>

  <!-- ════ EDITOR VIEW ════ -->
  <div class="editor-view" id="editorView">
    <div class="navbar">
      <button class="back-btn" id="editorBackBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <input type="text" class="nav-title-input" id="noteTitle" placeholder="Note title">
    </div>
    <div class="editor-container">
      <div class="code-stage" id="codeStage">
        <div class="line-numbers" id="lineNums">1</div>
        <textarea class="code-layer code-textarea" id="codeTextarea" placeholder="Write code…" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
        <pre class="code-layer code-preview"><code class="hljs" id="codeHighlight"></code></pre>
      </div>
    </div>
    <div class="bottom-toolbar">
      <select class="lang-picker" id="langPicker">
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="javascript">JavaScript</option>
        <option value="jsx">React JSX</option>
        <option value="typescript">TypeScript</option>
        <option value="python">Python</option>
        <option value="sql">SQL</option>
        <option value="json">JSON</option>
        <option value="bash">Bash</option>
        <option value="plaintext">Plain Text</option>
      </select>
      <button class="tool-btn copy" id="copyBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
      <!-- 🆕 زري Undo و Redo -->
      <button class="tool-btn undo" id="undoBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15.05a9 9 0 102.83-9.11L1 10"/>
        </svg>
      </button>
      <button class="tool-btn redo" id="redoBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15.05a9 9 0 11-2.83-9.11L23 10"/>
        </svg>
      </button>
      <!-- نهاية الإضافة -->
      <button class="tool-btn delete" id="deleteBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
      <button class="tool-btn save" id="saveBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
        Save
      </button>
    </div>
    <div class="status-bar">
      <span id="lineCount">Ln 1</span>
      <span id="charCount">0 chars</span>
    </div>
  </div>
</div>

<div class="toast-panel" id="toastPanel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function(){
  // ═══════════════ FIREBASE CONFIG ═══════════════
  const firebaseConfig = {
    apiKey: "AIzaSyAszFGDs1J92_53jHvj5aABmeiKZdc-mf0",
    authDomain: "gen-lang-client-0501601606.firebaseapp.com",
    projectId: "gen-lang-client-0501601606",
    storageBucket: "gen-lang-client-0501601606.firebasestorage.app",
    messagingSenderId: "1079712784218",
    appId: "1:1079712784218:web:598465155aa70938a6dd63",
    measurementId: "G-CRHRGYX74V"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ═══════════════ STATE ═══════════════
  let notes = [];
  let currentId = null;
  let filterLang = 'all';
  let searchTerm = '';

  // 🆕 Stack للتراجع والإعادة
  let undoStack = [];
  let redoStack = [];
  let currentSnapshot = '';        // آخر حالة معروفة للنص
  let isUndoRedo = false;         // لتجنب تسجيل التغييرات أثناء تنفيذ undo/redo

  const $ = id => document.getElementById(id);
  const homeView = $('homeView');
  const editorView = $('editorView');

  // ═══════════════ AUTH ═══════════════
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      $('loginScreen').style.display = 'none';
      homeView.style.display = 'flex';
      await loadNotes();
    } else {
      $('loginScreen').style.display = 'flex';
      homeView.style.display = 'none';
      editorView.classList.remove('active');
    }
  });

  $('loginBtn').addEventListener('click', async () => {
    try {
      await auth.signInWithEmailAndPassword($('emailInput').value, $('passwordInput').value);
      $('loginError').textContent = '';
    } catch(e) { $('loginError').textContent = e.message; }
  });

  $('registerBtn').addEventListener('click', async () => {
    try {
      await auth.createUserWithEmailAndPassword($('emailInput').value, $('passwordInput').value);
      $('loginError').textContent = '';
    } catch(e) { $('loginError').textContent = e.message; }
  });

  // ═══════════════ FIRESTORE ═══════════════
  async function loadNotes() {
    if (!auth.currentUser) return;
    const snap = await db.collection('users').doc(auth.currentUser.uid).collection('notes').orderBy('updated','desc').get();
    notes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderHome();
  }

  async function saveToCloud(note) {
    if (!auth.currentUser) return;
    await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(note.id).set(note, { merge: true });
  }

  async function deleteFromCloud(id) {
    if (!auth.currentUser) return;
    await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(id).delete();
  }

  // ═══════════════ HOME ═══════════════
  function renderHome() {
    let filtered = [...notes];
    if (filterLang !== 'all') filtered = filtered.filter(n => n.lang === filterLang);
    if (searchTerm.trim()) {
      const q = searchTerm.toLowerCase();
      filtered = filtered.filter(n => (n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q));
    }
    filtered.sort((a,b) => b.updated - a.updated);

    const grid = $('notesGrid');
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-notes">No notes yet.<br>Tap + to create one.</div>';
    } else {
      grid.innerHTML = filtered.map(n => `
        <div class="note-card-home" data-id="${n.id}">
          <div class="title">${esc(n.title || 'Untitled')}</div>
          <span class="lang">${n.lang||'txt'}</span>
          <button class="delete-btn" data-del="${n.id}">Delete</button>
        </div>
      `).join('');
    }

    grid.querySelectorAll('.note-card-home').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-del]')) return;
        openEditor(card.dataset.id);
      });
    });
    grid.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.del;
        if (confirm('Delete this note?')) {
          notes = notes.filter(n => n.id !== id);
          deleteFromCloud(id);
          renderHome();
          toast('Deleted');
        }
      });
    });
  }

  // ═══════════════ EDITOR ═══════════════
  function openEditor(id) {
    currentId = id;
    const note = notes.find(n => n.id === id);
    if (!note) return;
    $('noteTitle').value = note.title || '';
    $('codeTextarea').value = note.content || '';
    $('langPicker').value = note.lang || 'plaintext';
    homeView.style.display = 'none';
    editorView.classList.add('active');
    refreshHighlight();
    updateStats();
    // 🆕 تهيئة undo/redo عند فتح ملاحظة
    resetUndoRedo();
    $('codeTextarea').focus();
  }

  async function openNewNote() {
    const tempId = Date.now().toString(36) + Math.random().toString(36).substr(2, 7);
    const note = {
      id: tempId,
      title: '',
      content: '',
      lang: 'html',
      updated: Date.now()
    };
    notes.unshift(note);
    openEditor(tempId);

    try {
      if (!auth.currentUser) return;
      const docRef = await db.collection('users').doc(auth.currentUser.uid).collection('notes').add(note);
      const realId = docRef.id;
      const localNote = notes.find(n => n.id === tempId);
      if (localNote) localNote.id = realId;
      if (currentId === tempId) currentId = realId;
      await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(realId).set(localNote || note, { merge: true });
    } catch (error) {
      console.error('Firestore save failed:', error);
      toast('Could not sync to cloud. Note saved locally.');
    }
    renderHome();
  }

  function closeEditor() {
    if (currentId) {
      const note = notes.find(n => n.id === currentId);
      if (note) {
        note.title = $('noteTitle').value.trim();
        note.content = $('codeTextarea').value;
        note.lang = $('langPicker').value;
        note.updated = Date.now();
        saveToCloud(note);
      }
    }
    currentId = null;
    editorView.classList.remove('active');
    homeView.style.display = 'flex';
    $('noteTitle').value = '';
    $('codeTextarea').value = '';
    $('codeHighlight').textContent = '';
    // 🆕 تنظيف الـ stacks
    resetUndoRedo();
    renderHome();
  }

  function saveCurrent() {
    if (!currentId) return;
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    note.title = $('noteTitle').value.trim();
    note.content = $('codeTextarea').value;
    note.lang = $('langPicker').value;
    note.updated = Date.now();
    saveToCloud(note);
    toast('Saved');
    renderHome();
  }

  async function deleteCurrent() {
    if (!currentId) return;
    if (!confirm('Delete this note?')) return;
    await deleteFromCloud(currentId);
    notes = notes.filter(n => n.id !== currentId);
    closeEditor();
    toast('Deleted');
  }

  // ═══════════════ UNDO / REDO ═══════════════
  function resetUndoRedo() {
    undoStack = [];
    redoStack = [];
    currentSnapshot = $('codeTextarea').value;
    updateUndoButtons();
  }

  function updateUndoButtons() {
    $('undoBtn').disabled = undoStack.length === 0;
    $('redoBtn').disabled = redoStack.length === 0;
  }

  function pushToUndo() {
    const newVal = $('codeTextarea').value;
    if (newVal !== currentSnapshot && !isUndoRedo) {
      undoStack.push(currentSnapshot);
      currentSnapshot = newVal;
      redoStack = [];         // أي تغيير جديد يلغي إمكانية الإعادة
      updateUndoButtons();
    }
  }

  function performUndo() {
    if (undoStack.length === 0) return;
    isUndoRedo = true;
    const prev = undoStack.pop();
    redoStack.push(currentSnapshot);
    $('codeTextarea').value = prev;
    currentSnapshot = prev;
    refreshHighlight();
    updateStats();
    updateUndoButtons();
    isUndoRedo = false;
  }

  function performRedo() {
    if (redoStack.length === 0) return;
    isUndoRedo = true;
    const next = redoStack.pop();
    undoStack.push(currentSnapshot);
    $('codeTextarea').value = next;
    currentSnapshot = next;
    refreshHighlight();
    updateStats();
    updateUndoButtons();
    isUndoRedo = false;
  }

  // ═══════════════ SYNTAX ═══════════════
  function refreshHighlight() {
    const code = $('codeTextarea').value;
    const lang = $('langPicker').value;
    let out;
    try {
      out = lang === 'plaintext' ? esc(code) : hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
    } catch(e) { out = esc(code); }
    $('codeHighlight').innerHTML = out;
    syncScroll();
    drawLineNumbers();
  }

  function syncScroll() {
    const pre = $('codeHighlight').parentElement;
    pre.scrollTop = $('codeTextarea').scrollTop;
    pre.scrollLeft = $('codeTextarea').scrollLeft;
  }

  function drawLineNumbers() {
    const lines = $('codeTextarea').value.split('\n');
    $('lineNums').innerHTML = lines.map((_, i) => `<span>${i+1}</span>`).join('');
    $('lineNums').scrollTop = $('codeTextarea').scrollTop;
  }

  async function copyCode() {
    const code = $('codeTextarea').value;
    if (!code.trim()) { toast('Nothing to copy'); return; }
    try {
      await navigator.clipboard.writeText(code);
      const btn = $('copyBtn');
      btn.classList.add('copied');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy';
      }, 2000);
      toast('Copied!');
    } catch(e) { toast('Copy failed'); }
  }

  function updateStats() {
    const code = $('codeTextarea').value;
    $('charCount').textContent = code.length + ' chars';
    $('lineCount').textContent = 'Ln ' + code.split('\n').length;
  }

  // ═══════════════ HELPERS ═══════════════
  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function toast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    $('toastPanel').appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  // ═══════════════ EVENTS ═══════════════
  $('homeNewBtn').addEventListener('click', openNewNote);
  $('editorBackBtn').addEventListener('click', closeEditor);
  $('saveBtn').addEventListener('click', saveCurrent);
  $('deleteBtn').addEventListener('click', deleteCurrent);
  $('copyBtn').addEventListener('click', copyCode);
  $('undoBtn').addEventListener('click', performUndo);
  $('redoBtn').addEventListener('click', performRedo);

  $('homeSearch').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderHome();
  });

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      filterLang = chip.dataset.lang;
      renderHome();
    });
  });

  $('noteTitle').addEventListener('input', () => {
    if (currentId) {
      const note = notes.find(n => n.id === currentId);
      if (note) { note.title = $('noteTitle').value.trim(); note.updated = Date.now(); saveToCloud(note); }
    }
  });

  $('langPicker').addEventListener('change', () => {
    refreshHighlight();
    if (currentId) {
      const note = notes.find(n => n.id === currentId);
      if (note) { note.lang = $('langPicker').value; note.updated = Date.now(); saveToCloud(note); }
    }
  });

  // 🆕 تسجيل التغييرات للتراجع
  $('codeTextarea').addEventListener('input', () => {
    refreshHighlight();
    updateStats();
    pushToUndo();                     // يُسجل الحالة قبل التغيير
    if (currentId) {
      const note = notes.find(n => n.id === currentId);
      if (note) { note.content = $('codeTextarea').value; note.updated = Date.now(); saveToCloud(note); }
    }
  });

  $('codeTextarea').addEventListener('scroll', () => {
    syncScroll();
    drawLineNumbers();
  });

  // Tab support
  $('codeTextarea').addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const ta = $('codeTextarea');
      const s = ta.selectionStart;
      ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = s + 2;
      refreshHighlight();
      updateStats();
      // تسجيل حالة للتراجع بعد إدراج المسافة
      pushToUndo();
    }
    // 🆕 اختصارات لوحة المفاتيح للتراجع والإعادة
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault();
      performUndo();
    }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'Z' && e.shiftKey))) {
      e.preventDefault();
      performRedo();
    }
  });

  // Shortcuts
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveCurrent(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openNewNote(); }
  });

  // ═══════════════ INIT ═══════════════
  if (notes.length > 0) renderHome();
})();
</script>
</body>
</html>
