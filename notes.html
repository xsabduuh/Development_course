  <!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevPath 180 • Notes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #000;
      --card: #1a1a24;
      --border: #2a2a36;
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --accent2: #409cff;
      --green: #30d158;
      --red: #ff453a;
      --orange: #ff9f0a;
      --radius: 14px;
      --radius-lg: 22px;
      --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      --shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; overflow-x: hidden; overflow-y: hidden; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: auto;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y;
    }
    .app-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; padding: 40px 20px;
    }
    .login-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .login-title { font-size: 1.6rem; font-weight: 700; text-align: center; color: var(--accent); }
    .input-field {
      background: #1c1c2e; border: 1px solid var(--border); color: var(--text);
      padding: 12px 16px; border-radius: 12px; font-size: 1rem; outline: none;
    }
    .error-msg { color: var(--red); font-size: 0.85rem; text-align: center; min-height: 20px; }

    /* ── HOME VIEW ── */
    .home-view { display: flex; flex-direction: column; flex: 1; padding: 16px; }
    .home-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .home-title-wrapper { display: flex; align-items: center; gap: 10px; }
    .home-title-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .home-title-icon svg { width: 100%; height: 100%; stroke: var(--accent); }
    .home-title-text { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .home-new-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .home-tools { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .search-input { flex:1; min-width:150px; background:var(--card); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:10px; font-size:0.9rem; outline:none; }
    .filter-chip{ padding:8px 14px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--secondary); cursor:pointer; font-size:0.8rem; font-weight:600; white-space:nowrap; }
    .filter-chip.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
    .notes-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
    .note-card-home{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; cursor:pointer; }
    .note-card-home .title{ font-weight:600; font-size:0.9rem; }
    .note-card-home .lang{ font-size:0.65rem; text-transform:uppercase; color:var(--accent); background:rgba(10,132,255,0.15); padding:2px 8px; border-radius:4px; }
    .note-card-home .delete-btn{ margin-top:8px; background:none; border:none; color:var(--secondary); cursor:pointer; font-size:0.8rem; }
    .dashboard-link{ display:inline-flex; align-items:center; gap:6px; color:var(--accent); text-decoration:none; font-weight:500; margin-top:16px; }

    /* ── DRAWER ── */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.35s; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .drawer-overlay.show { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 88vw; max-width: 340px; background: #111118; z-index: 60; transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1); display: flex; flex-direction: column; border-right: 1px solid var(--border); padding: 20px 0; }
    .drawer.open { transform: translateX(0); }
    .drawer-header { padding: 0 20px 16px; border-bottom: 1px solid var(--border); font-family: var(--mono); color: var(--green); font-weight: 700; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
    .drawer-list { flex: 1; overflow-y: auto; padding: 12px 0; }
    .drawer-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: var(--secondary); cursor: pointer; font-size: 0.9rem; border-left: 3px solid transparent; transition: all 0.2s; }
    .drawer-item svg { width: 18px; height: 18px; opacity: 0.7; }
    .drawer-item:hover { background: rgba(10,132,255,0.08); color: var(--text); }
    .drawer-item.logout-item { color: var(--red); border-top: 1px solid var(--border); margin-top: 12px; padding-top: 16px; }
    .drawer-item.logout-item:hover { background: rgba(255,69,58,0.08); }
    .drawer-item.user-item { color: var(--secondary); border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 8px; font-size: 0.8rem; }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex; align-items: center; padding: 12px 0;
      border-bottom: 1px solid var(--border); gap: 8px; flex-wrap: wrap;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-weight: 700; font-size: 1.1rem; color: var(--green); text-decoration: none; }
    .top-actions { display: flex; align-items: center; gap: 8px; }
    .menu-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 1.4rem; padding: 8px 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* ── EDITOR VIEW ── */
    .editor-view { display: none; flex-direction: column; flex: 1; }
    .editor-view.active { display: flex; }
    .navbar { padding: 12px 0; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .back-btn { background: none; border: none; color: var(--accent); font-size: 1rem; cursor: pointer; }
    .nav-title-input { flex: 1; background: transparent; border: none; font-size: 1.1rem; font-weight: 600; color: var(--text); outline: none; }
    .code-stage { flex: 1; position: relative; display: flex; overflow: hidden; }
    .code-layer { position: absolute; inset: 12px 12px 12px 50px; font-family: var(--mono); font-size: 0.88rem; line-height: 1.75; white-space: pre-wrap; overflow: auto; border: none; outline: none; background: transparent; }
    .code-textarea { color: transparent; caret-color: var(--accent); resize: none; z-index: 2; -webkit-text-fill-color: transparent; }
    .code-textarea::selection { background: rgba(10,132,255,0.3); }
    .code-preview { pointer-events: none; z-index: 1; }
    .line-numbers { position: absolute; top: 12px; left: 4px; bottom: 12px; width: 40px; font-family: var(--mono); font-size: 0.78rem; color: var(--secondary); text-align: right; overflow: hidden; z-index: 3; pointer-events: none; line-height: 1.75; padding-right: 6px; }
    .live-preview { flex: 1; display: none; border: none; background: #fff; width: 100%; height: 100%; }
    .live-preview.active { display: block; }

    .bottom-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .lang-picker { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 20px; font-size: 0.8rem; outline: none; cursor: pointer; }
    .tool-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.8rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; white-space: nowrap; }
    .tool-btn:disabled { opacity: 0.4; pointer-events: none; }
    .tool-btn.save { background: var(--accent); color: #fff; border-color: var(--accent); }

    .btn { padding: 10px 16px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: var(--card); border: 1px solid var(--border); color: var(--text); }

    .toast-panel { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
    .toast { background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 20px; font-weight: 500; font-size: 0.85rem; box-shadow: var(--shadow); text-align: center; animation: toastIn 0.4s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }

    @media (min-width: 769px) { .drawer { position: relative; transform: none; z-index: 1; width: 260px; } .drawer-overlay { display: none; } .menu-btn { display: none; } .app-container { display: flex; flex-direction: row; max-width: 1000px; padding: 0; } .main-content { flex: 1; padding: 0 20px 20px; overflow-y: auto; } }
    @media (max-width: 768px) { .app-container { max-width: 100%; } .drawer { width: 85vw; } }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-title">DevPath Notes</div>
      <input type="email" class="input-field" id="emailInput" placeholder="Email" autocomplete="email">
      <input type="password" class="input-field" id="passwordInput" placeholder="Password" autocomplete="current-password">
      <div class="error-msg" id="loginError"></div>
      <button class="btn btn-primary" id="loginBtn">Sign In</button>
      <button class="btn btn-outline" id="registerBtn">Create Account</button>
    </div>
  </div>

  <!-- MAIN CONTENT (hidden until login) -->
  <div id="mainContent" style="display:none; flex:1; flex-direction:column;">
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-header">📂 Notes Menu</div>
      <div class="drawer-item user-item" id="drawerUserEmail"></div>
      <div class="drawer-list" id="drawerFilterList"></div>
      <div class="drawer-item" id="drawerNewNote">+ New Note</div>
      <a href="index.html" class="drawer-item" style="text-decoration:none;">← Dashboard</a>
      <div class="drawer-item logout-item" id="drawerLogout">تسجيل الخروج</div>
    </aside>

    <main class="main-content" id="mainContentInner">
      <!-- HOME VIEW -->
      <div class="home-view" id="homeView">
        <div class="home-header">
          <div class="home-title-wrapper">
            <span class="home-title-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
            </span>
            <span class="home-title-text">Notes</span>
          </div>
          <div class="top-actions">
            <button class="home-new-btn" id="homeNewBtn">+</button>
            <button class="menu-btn" id="menuBtn">☰</button>
          </div>
        </div>
        <div class="home-tools">
          <input type="text" class="search-input" id="homeSearch" placeholder="Search notes..." autocomplete="off">
          <button class="filter-chip active" data-lang="all">All</button>
          <button class="filter-chip" data-lang="html">HTML</button>
          <button class="filter-chip" data-lang="css">CSS</button>
          <button class="filter-chip" data-lang="javascript">JS</button>
          <button class="filter-chip" data-lang="python">Python</button>
        </div>
        <div class="notes-grid" id="notesGrid"></div>
      </div>

      <!-- EDITOR VIEW (سيناريو فتح سريع دون انتظار السحابة) -->
      <div class="editor-view" id="editorView">
        <div class="navbar">
          <button class="back-btn" id="editorBackBtn">← Back</button>
          <input type="text" class="nav-title-input" id="noteTitle" placeholder="Note title">
        </div>
        <div style="flex:1; display:flex; flex-direction:column; position:relative;">
          <div class="code-stage" id="codeStage">
            <div class="line-numbers" id="lineNums">1</div>
            <textarea class="code-layer code-textarea" id="codeTextarea" placeholder="Write code…" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
            <pre class="code-layer code-preview"><code class="hljs" id="codeHighlight"></code></pre>
          </div>
          <iframe class="live-preview" id="livePreview" sandbox="allow-scripts allow-same-origin" title="Live Preview"></iframe>
        </div>
        <div class="bottom-toolbar">
          <select class="lang-picker" id="langPicker">
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="javascript">JavaScript</option>
            <option value="jsx">React JSX</option>
            <option value="typescript">TypeScript</option>
            <option value="python">Python</option>
            <option value="sql">SQL</option>
            <option value="json">JSON</option>
            <option value="bash">Bash</option>
            <option value="plaintext">Plain Text</option>
          </select>
          <button class="tool-btn" id="undoBtn" disabled>↩ Undo</button>
          <button class="tool-btn" id="redoBtn" disabled>↪ Redo</button>
          <button class="tool-btn" id="selectAllBtn">Select All</button>
          <button class="tool-btn" id="previewBtn">👁 Preview</button>
          <button class="tool-btn" id="copyBtn">📋 Copy</button>
          <button class="tool-btn" id="deleteBtn" style="display:none;">🗑 Delete</button>
          <button class="tool-btn save" id="saveBtn">💾 Save</button>
        </div>
        <div style="padding:4px 0; display:flex; justify-content:space-between; font-size:0.7rem; color:var(--secondary); font-family:var(--mono);">
          <span id="lineCount">Ln 1</span>
          <span id="charCount">0 chars</span>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast-panel" id="toastPanel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function(){
  // ═══ FIREBASE CONFIG ═══
  const firebaseConfig = {
    apiKey: "AIzaSyAszFGDs1J92_53jHvj5aABmeiKZdc-mf0",
    authDomain: "gen-lang-client-0501601606.firebaseapp.com",
    projectId: "gen-lang-client-0501601606",
    storageBucket: "gen-lang-client-0501601606.firebasestorage.app",
    messagingSenderId: "1079712784218",
    appId: "1:1079712784218:web:598465155aa70938a6dd63",
    measurementId: "G-CRHRGYX74V"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let notes = [];
  let currentId = null;
  let filterLang = 'all';
  let searchTerm = '';
  let isPreview = false;

  const $ = id => document.getElementById(id);

  // ─── Undo/Redo ───
  let undoStack = [], redoStack = [], lastSavedState = '', undoDebounce = null;

  // ─── Auth ───
  auth.onAuthStateChanged(async user => {
    if (user) {
      $('loginScreen').style.display = 'none';
      $('mainContent').style.display = 'flex';
      $('drawerUserEmail').textContent = user.email;
      await loadNotes();
    } else {
      $('loginScreen').style.display = 'flex';
      $('mainContent').style.display = 'none';
      $('editorView').classList.remove('active');
      $('homeView').style.display = 'flex';
    }
  });

  $('loginBtn').addEventListener('click', async () => {
    try { await auth.signInWithEmailAndPassword($('emailInput').value, $('passwordInput').value); $('loginError').textContent = ''; }
    catch(e) { $('loginError').textContent = e.message; }
  });
  $('registerBtn').addEventListener('click', async () => {
    try { await auth.createUserWithEmailAndPassword($('emailInput').value, $('passwordInput').value); $('loginError').textContent = ''; }
    catch(e) { $('loginError').textContent = e.message; }
  });
  $('drawerLogout').addEventListener('click', () => auth.signOut());

  // ─── Firestore ───
  async function loadNotes() {
    if (!auth.currentUser) return;
    const snapshot = await db.collection('users').doc(auth.currentUser.uid).collection('notes').orderBy('updated','desc').get();
    notes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderHome();
  }
  async function saveNoteToCloud(note) {
    if (!auth.currentUser) return;
    await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(note.id).set(note, { merge: true });
  }
  async function deleteNoteFromCloud(id) {
    if (!auth.currentUser) return;
    await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(id).delete();
  }

  // ─── Render Home ───
  function renderHome() {
    let filtered = [...notes];
    if (filterLang !== 'all') filtered = filtered.filter(n => n.lang === filterLang);
    if (searchTerm.trim()) {
      const q = searchTerm.toLowerCase();
      filtered = filtered.filter(n => (n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q));
    }
    filtered.sort((a,b)=> b.updated - a.updated);
    const grid = $('notesGrid');
    grid.innerHTML = filtered.length === 0
      ? '<div style="padding:60px 20px;text-align:center;color:var(--secondary);">No notes yet.<br>Tap + to create one.</div>'
      : filtered.map(n => `
        <div class="note-card-home" data-id="${n.id}">
          <div class="title">${esc(n.title||'Untitled')}</div>
          <span class="lang">${n.lang||'txt'}</span>
          <button class="delete-btn" data-del="${n.id}">Delete</button>
        </div>
      `).join('');

    grid.querySelectorAll('.note-card-home').forEach(card => {
      card.addEventListener('click', (e) => { if(!e.target.closest('[data-del]')) openEditor(card.dataset.id); });
    });
    grid.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); if(confirm('Delete?')) { notes = notes.filter(n=>n.id!==btn.dataset.del); deleteNoteFromCloud(btn.dataset.del); renderHome(); } });
    });
  }

  // ─── Editor ───
  function openEditor(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentId = id;
    $('noteTitle').value = note.title || '';
    $('codeTextarea').value = note.content || '';
    $('langPicker').value = note.lang || 'plaintext';
    showEditor();
    refreshHighlight(); updateStats(); drawLineNumbers();
    resetHistory(note.content || '');
    $('codeTextarea').focus();
  }

  // فتح محرر فارغ فوراً دون انتظار السحابة
  function openNewNote() {
    currentId = null; // لا معرف بعد
    $('noteTitle').value = '';
    $('codeTextarea').value = '';
    $('langPicker').value = 'html';
    showEditor();
    refreshHighlight(); updateStats(); drawLineNumbers();
    resetHistory('');
    $('codeTextarea').focus();
    // إنشاء المستند في الخلفية
    createNoteInBackground();
  }

  async function createNoteInBackground() {
    const note = { id: Date.now().toString(36)+Math.random().toString(36).substr(2,7), title:'', content:'', lang:'html', updated: Date.now() };
    const docRef = await db.collection('users').doc(auth.currentUser.uid).collection('notes').add(note);
    note.id = docRef.id;
    notes.unshift(note);
    currentId = note.id;
    renderHome();
  }

  function showEditor() {
    $('homeView').style.display = 'none';
    $('editorView').classList.add('active');
    $('deleteBtn').style.display = currentId ? 'flex' : 'none';
    switchToCode();
  }

  function closeEditor() {
    // حفظ سريع قبل الإغلاق
    if (currentId && $('codeTextarea').value.trim() !== '') {
      const note = notes.find(n => n.id === currentId);
      if (note) {
        note.title = $('noteTitle').value.trim();
        note.content = $('codeTextarea').value;
        note.lang = $('langPicker').value;
        note.updated = Date.now();
        saveNoteToCloud(note);
      }
    }
    currentId = null;
    $('editorView').classList.remove('active');
    $('homeView').style.display = 'flex';
    $('noteTitle').value = ''; $('codeTextarea').value = ''; $('codeHighlight').textContent = '';
    switchToCode(); resetHistory(); renderHome();
  }

  function saveAndClose() {
    if (!currentId) {
      // إذا لم يحفظ بعد، ننتظر حتى تكتمل عملية الإنشاء
      toast('Saving...');
      setTimeout(async () => {
        if (currentId) {
          const note = notes.find(n => n.id === currentId);
          if (note) {
            note.title = $('noteTitle').value.trim();
            note.content = $('codeTextarea').value;
            note.lang = $('langPicker').value;
            note.updated = Date.now();
            await saveNoteToCloud(note);
          }
        }
        closeEditor();
      }, 300);
      return;
    }
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    note.title = $('noteTitle').value.trim(); note.content = $('codeTextarea').value; note.lang = $('langPicker').value; note.updated = Date.now();
    saveNoteToCloud(note);
    toast('Saved'); closeEditor();
  }

  async function deleteCurrent() {
    if (!currentId || !confirm('Delete?')) return;
    await deleteNoteFromCloud(currentId);
    notes = notes.filter(n => n.id !== currentId);
    closeEditor();
  }

  // ─── Preview ───
  function switchToPreview() {
    isPreview = true; $('codeStage').style.display = 'none'; $('livePreview').classList.add('active');
    updatePreview();
  }
  function switchToCode() {
    isPreview = false; $('codeStage').style.display = 'flex'; $('livePreview').classList.remove('active');
  }
  function updatePreview() {
    if (!isPreview) return;
    const code = $('codeTextarea').value; const lang = $('langPicker').value;
    let html = code;
    if (lang === 'css') html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${code}</style></head><body></body></html>`;
    else if (lang === 'javascript') html = `<!DOCTYPE html><html><body><script>${code}<\/script></body></html>`;
    else if (lang === 'html' && !code.includes('<!DOCTYPE')) html = `<!DOCTYPE html><html>${code}</html>`;
    $('livePreview').srcdoc = html;
  }

  // ─── Highlight ───
  function refreshHighlight() {
    const code = $('codeTextarea').value; const lang = $('langPicker').value;
    let out;
    try { out = lang === 'plaintext' ? esc(code) : hljs.highlight(code, { language: lang, ignoreIllegals: true }).value; }
    catch(e) { out = esc(code); }
    $('codeHighlight').innerHTML = out;
    syncScroll();
  }
  function syncScroll() {
    const pre = $('codeHighlight').parentElement;
    if (!pre) return;
    pre.scrollTop = $('codeTextarea').scrollTop; pre.scrollLeft = $('codeTextarea').scrollLeft;
  }
  function drawLineNumbers() {
    const lines = $('codeTextarea').value.split('\n');
    $('lineNums').innerHTML = lines.map((_,i) => `<span>${i+1}</span>`).join('');
    $('lineNums').scrollTop = $('codeTextarea').scrollTop;
  }
  async function copyCode() {
    try { await navigator.clipboard.writeText($('codeTextarea').value); toast('Copied!'); } catch(e) { toast('Copy failed'); }
  }
  function selectAll() { $('codeTextarea').select(); }

  // ─── Undo/Redo ───
  function pushUndoState() {
    const ta = $('codeTextarea'); if (!ta || ta.value === lastSavedState) return;
    undoStack.push(lastSavedState); if (undoStack.length > 100) undoStack.shift();
    redoStack = []; lastSavedState = ta.value; updateUndoRedoButtons();
  }
  function applyState(state) {
    $('codeTextarea').value = state; lastSavedState = state;
    refreshHighlight(); updateStats(); drawLineNumbers(); syncScroll(); updateUndoRedoButtons();
  }
  function performUndo() {
    if (!undoStack.length) return;
    redoStack.push($('codeTextarea').value); applyState(undoStack.pop());
    if (currentId) { const n = notes.find(x=>x.id===currentId); if(n) { n.content = $('codeTextarea').value; saveNoteToCloud(n); } }
    $('codeTextarea').blur();
  }
  function performRedo() {
    if (!redoStack.length) return;
    undoStack.push($('codeTextarea').value); applyState(redoStack.pop());
    if (currentId) { const n = notes.find(x=>x.id===currentId); if(n) { n.content = $('codeTextarea').value; saveNoteToCloud(n); } }
    $('codeTextarea').blur();
  }
  function updateUndoRedoButtons() {
    $('undoBtn').disabled = !undoStack.length;
    $('redoBtn').disabled = !redoStack.length;
  }
  function resetHistory(initial = '') { undoStack = []; redoStack = []; lastSavedState = initial; updateUndoRedoButtons(); }

  // ─── Helpers ───
  function updateStats() {
    const code = $('codeTextarea').value;
    $('charCount').textContent = code.length + ' chars';
    $('lineCount').textContent = 'Ln ' + code.split('\n').length;
  }
  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function toast(msg) { const t = document.createElement('div'); t.className='toast'; t.textContent=msg; $('toastPanel').appendChild(t); setTimeout(()=>t.remove(),2200); }

  // ─── Events ───
  $('homeNewBtn').addEventListener('click', openNewNote);
  $('drawerNewNote').addEventListener('click', openNewNote);
  $('editorBackBtn').addEventListener('click', closeEditor);
  $('saveBtn').addEventListener('click', saveAndClose);
  $('deleteBtn').addEventListener('click', deleteCurrent);
  $('copyBtn').addEventListener('click', copyCode);
  $('selectAllBtn').addEventListener('click', selectAll);
  $('undoBtn').addEventListener('click', performUndo);
  $('redoBtn').addEventListener('click', performRedo);
  $('previewBtn').addEventListener('click', ()=> isPreview ? switchToCode() : switchToPreview());

  // Menu toggle
  $('menuBtn').addEventListener('click', () => {
    $('drawer').classList.toggle('open');
    $('drawerOverlay').classList.toggle('show');
  });
  $('drawerOverlay').addEventListener('click', () => {
    $('drawer').classList.remove('open');
    $('drawerOverlay').classList.remove('show');
  });

  // Code input
  $('codeTextarea').addEventListener('input', () => {
    refreshHighlight(); updateStats(); drawLineNumbers();
    if (currentId) { const n = notes.find(x=>x.id===currentId); if(n) { n.content = $('codeTextarea').value; n.updated = Date.now(); saveNoteToCloud(n); } }
    if (isPreview) updatePreview();
    clearTimeout(undoDebounce); undoDebounce = setTimeout(pushUndoState, 500);
  });
  $('codeTextarea').addEventListener('scroll', ()=>{ syncScroll(); drawLineNumbers(); });

  // Filters
  $('homeSearch').addEventListener('input', (e)=>{ searchTerm = e.target.value; renderHome(); });
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', ()=>{ document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active')); chip.classList.add('active'); filterLang = chip.dataset.lang; renderHome(); });
  });

  // Title & lang
  $('noteTitle').addEventListener('input', ()=>{ if(currentId){ const n=notes.find(x=>x.id===currentId); if(n){ n.title=$('noteTitle').value; n.updated=Date.now(); saveNoteToCloud(n); } } });
  $('langPicker').addEventListener('change', ()=>{ refreshHighlight(); if(currentId){ const n=notes.find(x=>x.id===currentId); if(n){ n.lang=$('langPicker').value; n.updated=Date.now(); saveNoteToCloud(n); } } if(isPreview) updatePreview(); });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); saveAndClose(); }
    if((e.ctrlKey||e.metaKey)&&e.key==='n'){ e.preventDefault(); openNewNote(); }
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); performUndo(); }
    if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){ e.preventDefault(); performRedo(); }
  });

  // Tab support
  $('codeTextarea').addEventListener('keydown', function(e) {
    if (e.key === 'Tab') { e.preventDefault(); pushUndoState(); const ta=this; const s=ta.selectionStart; ta.setRangeText('  ', s, ta.selectionEnd, 'end'); ta.selectionStart=ta.selectionEnd=s+2; refreshHighlight(); updateStats(); lastSavedState=ta.value; return; }
    const pairs = { '(':')', '[':']', '{':'}', '"':'"', "'":"'", '`':'`' };
    if (pairs[e.key] && !e.ctrlKey && !e.metaKey && !e.altKey) { e.preventDefault(); pushUndoState(); const s=this.selectionStart, end=this.selectionEnd; this.setRangeText(e.key+pairs[e.key], s, end, 'end'); this.selectionStart=this.selectionEnd=s+1; refreshHighlight(); updateStats(); lastSavedState=this.value; }
  });

  renderHome();
})();
</script>
</body>
</html>
