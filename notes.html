<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPath 180 - نظام الملاحظات</title>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface-hover: #22222f;
            --border: #2a2a3a;
            --text: #e0e0e0;
            --text-secondary: #a0a0b8;
            --accent: #6c5ce7;
            --accent-glow: #8b7cf0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --radius: 10px;
            --radius-sm: 6px;
            --transition: 0.25s ease;
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-lg);
            margin-top: 20px;
        }

        /* شريط التنقل العلوي */
        .nav-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-glow);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            background: transparent;
            color: var(--text);
            transition: all var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent-glow);
            background: rgba(108, 92, 231, 0.06);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent-glow);
        }

        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(231, 76, 60, 0.1);
        }

        /* علامات التبويب */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-block: 20px 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all var(--transition);
        }

        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .tab-btn:hover:not(.active) {
            background: var(--surface-hover);
            color: var(--text);
        }

        /* منطقة المحرر */
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tab-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--accent-glow);
        }

        .word-count {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        textarea {
            width: 100%;
            height: 400px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 14px;
            font-size: 1rem;
            line-height: 1.7;
            resize: vertical;
            font-family: 'Consolas', 'Courier New', monospace;
            transition: border var(--transition);
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.15);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .search-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.85rem;
            width: 200px;
            transition: border var(--transition);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: var(--surface);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85rem;
            z-index: 300;
            animation: slideInLeft 0.3s ease, fadeOut 0.3s ease 1.8s forwards;
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideInLeft {
            from { transform: translateX(-120px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(10px); }
        }

        .highlight {
            background-color: rgba(255, 107, 107, 0.3);
            border-radius: 2px;
        }

        @media (max-width: 600px) {
            .container { padding: 16px; }
            textarea { height: 300px; }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- شريط التنقل -->
    <div class="nav-bar">
        <a href="index.html" class="logo">🛤️ DevPath 180</a>
        <div class="nav-links">
            <a href="index.html" class="btn">📊 لوحة التحكم</a>
            <a href="notes.html" class="btn btn-primary">📝 الملاحظات</a>
        </div>
    </div>

    <!-- حاوية المحرر -->
    <div class="container">
        <!-- علامات التبويب -->
        <div class="tabs" id="tabsContainer">
            <button class="tab-btn active" data-tab="html">HTML</button>
            <button class="tab-btn" data-tab="css">CSS</button>
            <button class="tab-btn" data-tab="js">JavaScript</button>
            <button class="tab-btn" data-tab="react">React</button>
            <button class="tab-btn" data-tab="backend">Backend</button>
        </div>

        <!-- رأس المحرر -->
        <div class="editor-header">
            <span class="tab-title" id="tabTitle">📝 ملاحظات HTML</span>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="text" class="search-box" id="searchInput" placeholder="🔍 بحث داخل النص...">
                <span class="word-count" id="wordCount">0 كلمة</span>
            </div>
        </div>

        <!-- مربع النص -->
        <textarea id="noteTextarea" placeholder="اكتب ملاحظاتك هنا..."></textarea>

        <!-- أزرار التحكم -->
        <div class="actions">
            <button class="btn btn-primary" id="saveBtn">💾 حفظ</button>
            <button class="btn btn-danger" id="clearBtn">🗑️ مسح</button>
            <span style="font-size:0.8rem; color: var(--text-secondary); margin-right: auto;">
                ⏱️ حفظ تلقائي كل 5 ثوانٍ
            </span>
        </div>
    </div>

    <script>
        // =============================================
        // نظام الملاحظات (Notes System)
        // =============================================

        // مفاتيح التخزين المحلي
        const STORAGE_KEYS = {
            html: 'notes_html',
            css: 'notes_css',
            js: 'notes_js',
            react: 'notes_react',
            backend: 'notes_backend'
        };

        // الحالة الحالية
        let currentTab = 'html';
        let autoSaveInterval;
        let lastSavedContent = '';

        // عناصر DOM
        const textarea = document.getElementById('noteTextarea');
        const tabTitle = document.getElementById('tabTitle');
        const wordCountEl = document.getElementById('wordCount');
        const searchInput = document.getElementById('searchInput');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');
        const tabs = document.querySelectorAll('.tab-btn');

        // تحميل الملاحظة المحفوظة للتاب الحالي
        function loadNote(tab) {
            const key = STORAGE_KEYS[tab];
            const saved = localStorage.getItem(key) || '';
            textarea.value = saved;
            lastSavedContent = saved;
            updateWordCount();
            updateTabTitle(tab);
            clearHighlights();
        }

        // حفظ الملاحظة الحالية
        function saveNote() {
            const key = STORAGE_KEYS[currentTab];
            const content = textarea.value;
            localStorage.setItem(key, content);
            lastSavedContent = content;
            showToast('✔ تم الحفظ بنجاح');
        }

        // مسح الملاحظة الحالية
        function clearNote() {
            if (confirm('هل أنت متأكد من مسح جميع ملاحظات هذا القسم؟')) {
                textarea.value = '';
                saveNote(); // يحفظ المحتوى الفارغ
                updateWordCount();
                clearHighlights();
                showToast('🗑️ تم مسح الملاحظات');
            }
        }

        // تحديث عدد الكلمات
        function updateWordCount() {
            const text = textarea.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            wordCountEl.textContent = words + ' كلمة';
        }

        // تحديث عنوان التبويب
        function updateTabTitle(tab) {
            const titles = {
                html: '📝 ملاحظات HTML',
                css: '🎨 ملاحظات CSS',
                js: '📜 ملاحظات JavaScript',
                react: '⚛️ ملاحظات React',
                backend: '🖥️ ملاحظات Backend'
            };
            tabTitle.textContent = titles[tab] || 'ملاحظات';
        }

        // وظيفة البحث مع التظليل
        function searchAndHighlight() {
            const query = searchInput.value.trim();
            // إزالة التظليل السابق
            clearHighlights();

            if (!query) return;

            const textareaEl = textarea;
            const text = textareaEl.value;
            const regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
            const matches = [];
            let match;
            while ((match = regex.exec(text)) !== null) {
                matches.push({ start: match.index, end: match.index + match[0].length });
            }

            if (matches.length === 0) return;

            // لا يمكن تظليل الـ textarea مباشرة، ولكن يمكننا عرض عدد التطابقات
            // بدلاً من ذلك نستخدم canvas أو div overlays؟ الأمر معقد. سنقوم بتظليل بسيط عبر استبدال النص بمؤشرات
            // لكن الأسهل: نبرز العدد وننبه المستخدم. سنقوم بتظليل عبر إضافة علامات HTML مؤقتة ولكن النص سيتغير.
            // الأفضل: استخدام مؤشر التمرير إلى أول تطابق مع إشعار.
            // سنقوم ببساطة بتحديد أول تطابق وتغيير موضع المؤشر.
            if (matches.length > 0) {
                textareaEl.focus();
                textareaEl.setSelectionRange(matches[0].start, matches[0].end);
                // تنبيه المستخدم بعدد المطابقات
                showToast(`🔍 تم العثور على ${matches.length} تطابق`);
            }
        }

        // إزالة أي تظليل (إعادة تعيين المؤشر)
        function clearHighlights() {
            // لا يوجد تظليل فعلي في textarea، فقط نعيد المؤشر
            textarea.setSelectionRange(0, 0);
        }

        // عرض رسالة نخب
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 2200);
        }

        // التبديل بين التبويبات
        function switchTab(tab) {
            currentTab = tab;
            // تحديث الـ UI للتبويبات
            tabs.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            // تحميل الملاحظات
            loadNote(tab);
            // مسح البحث
            searchInput.value = '';
            textarea.focus();
        }

        // بدء الحفظ التلقائي (كل 5 ثواني)
        function startAutoSave() {
            stopAutoSave(); // إيقاف السابق إن وجد
            autoSaveInterval = setInterval(() => {
                if (textarea.value !== lastSavedContent) {
                    saveNote();
                }
            }, 5000);
        }

        function stopAutoSave() {
            if (autoSaveInterval) clearInterval(autoSaveInterval);
        }

        // ربط الأحداث
        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                switchTab(btn.dataset.tab);
            });
        });

        saveBtn.addEventListener('click', saveNote);
        clearBtn.addEventListener('click', clearNote);

        textarea.addEventListener('input', updateWordCount);

        searchInput.addEventListener('input', () => {
            // تنفيذ البحث عند الكتابة (مع تأخير بسيط)
            clearTimeout(searchInput.searchTimeout);
            searchInput.searchTimeout = setTimeout(() => {
                searchAndHighlight();
            }, 400);
        });

        // اختصار Ctrl+S للحفظ
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveNote();
            }
        });

        // عند الخروج من الصفحة، حفظ سريع
        window.addEventListener('beforeunload', () => {
            if (textarea.value !== lastSavedContent) {
                saveNote();
            }
        });

        // التهيئة الأولية
        function init() {
            loadNote(currentTab);
            startAutoSave();
            textarea.focus();
        }

        init();

        console.log('📝 نظام الملاحظات جاهز!');
        console.log('💡 اختصارات: Ctrl+S للحفظ الفوري');
        console.log('⏱️ الحفظ التلقائي نشط كل 5 ثوانٍ');
    </script>
</body>
</html>
