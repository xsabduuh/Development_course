<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DevPath 180 • Notes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <style>
    :root {
      --bg: #080812;
      --surface: #101018;
      --border: #202030;
      --text: #d0d0e0;
      --muted: #707090;
      --accent: #5565ff;
      --accent-hover: #7788ff;
      --green: #2dd4bf;
      --red: #f87171;
      --radius: 10px;
      --font: system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:var(--font);
      background:var(--bg);
      color:var(--text);
      display:flex;
      height:100dvh;
      overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
    }
    a{text-decoration:none;color:inherit}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    input,select,textarea{font-family:inherit;color:inherit}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:#303050;border-radius:10px}

    /* sidebar */
    .sidebar{
      width:260px;min-width:260px;
      background:var(--surface);
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      transition:width 0.25s ease, min-width 0.25s ease;
      overflow:hidden;
    }
    .sidebar.collapsed{width:0;min-width:0;border-right:none}
    .sidebar-head{
      padding:16px;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:8px;
    }
    .back-link{
      display:flex;align-items:center;gap:6px;
      font-size:0.8rem;color:var(--muted);
      padding:6px 10px;border-radius:6px;
      border:1px solid var(--border);
      white-space:nowrap;
    }
    .back-link:hover{color:#fff;border-color:#555}
    .collapse-btn{
      margin-left:auto;
      width:32px;height:32px;
      border-radius:6px;
      border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-size:1rem;color:var(--muted);
    }
    .collapse-btn:hover{color:#fff;background:rgba(255,255,255,0.04)}
    .new-btn{
      margin:12px;
      padding:10px;
      background:var(--accent);
      color:#fff;
      border-radius:var(--radius);
      font-weight:600;
      display:flex;align-items:center;justify-content:center;
      gap:6px;
      transition:background 0.2s;
    }
    .new-btn:hover{background:var(--accent-hover)}
    .notes-list{
      flex:1;overflow-y:auto;padding:6px;
    }
    .note-pill{
      padding:12px;margin:2px 0;
      border-radius:var(--radius);
      cursor:pointer;border:1px solid transparent;
    }
    .note-pill:hover{background:rgba(255,255,255,0.02);border-color:var(--border)}
    .note-pill.active{background:rgba(85,101,255,0.08);border-color:rgba(85,101,255,0.3)}
    .note-pill-title{font-weight:600;font-size:0.85rem}
    .note-pill-lang{font-size:0.65rem;color:var(--accent);margin-top:4px}
    .note-pill-delete{float:right;opacity:0;color:var(--red)}
    .note-pill:hover .note-pill-delete{opacity:1}

    /* main */
    .main{
      flex:1;display:flex;flex-direction:column;
      min-width:0;
    }
    .toolbar{
      padding:12px 16px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    }
    .title-input{
      flex:1;min-width:140px;
      background:transparent;border:none;
      font-size:1.1rem;font-weight:600;outline:none;
      color:#fff;
    }
    .title-input::placeholder{color:var(--muted)}
    .lang-select{
      background:var(--surface);border:1px solid var(--border);
      padding:6px 10px;border-radius:6px;font-size:0.8rem;outline:none;
    }
    .btn-action{
      padding:7px 14px;border-radius:6px;
      border:1px solid var(--border);
      font-size:0.8rem;font-weight:600;
      display:flex;align-items:center;gap:5px;
      background:var(--surface);color:var(--text);
    }
    .btn-action:hover{background:#1a1a2a;border-color:#555}
    .btn-save{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-save:hover{background:var(--accent-hover)}
    .btn-copy{color:var(--green);border-color:rgba(45,212,191,0.3)}
    .btn-copy:hover{background:rgba(45,212,191,0.1)}
    .btn-copy.copied{background:rgba(45,212,191,0.2);border-color:var(--green)}

    .editor-area{
      flex:1;position:relative;display:flex;overflow:hidden;
    }
    .code-mirror{
      flex:1;position:relative;
    }
    .code-text{
      width:100%;height:100%;
      background:transparent;border:none;
      padding:16px;
      font-family:var(--mono);font-size:0.9rem;
      line-height:1.7;resize:none;outline:none;
      color:transparent;caret-color:#fff;
      position:relative;z-index:2;
      white-space:pre-wrap;overflow:auto;
      tab-size:2;
    }
    .code-highlight{
      position:absolute;top:0;left:0;right:0;bottom:0;
      padding:16px;font-family:var(--mono);
      font-size:0.9rem;line-height:1.7;
      white-space:pre-wrap;pointer-events:none;z-index:1;
      overflow:hidden;
    }
    .code-highlight code{background:transparent!important}
    .empty-state{
      flex:1;display:flex;align-items:center;justify-content:center;
      flex-direction:column;color:var(--muted);
    }
    .toast-box{
      position:fixed;bottom:20px;right:20px;z-index:999;
      display:flex;flex-direction:column;gap:6px;
    }
    .toast{
      background:#111;border:1px solid var(--green);
      color:var(--green);padding:10px 18px;
      border-radius:8px;font-weight:600;
      animation:slideUp 0.3s;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .toggle-sidebar-mobile{
      display:none;position:fixed;top:10px;left:10px;
      z-index:60;background:var(--surface);border:1px solid var(--border);
      width:38px;height:38px;border-radius:8px;align-items:center;justify-content:center;
    }
    @media(max-width:700px){
      .sidebar{position:fixed;z-index:50;height:100dvh;width:280px;min-width:280px}
      .sidebar.collapsed{width:0;min-width:0}
      .toggle-sidebar-mobile{display:flex}
      .toolbar{padding:10px 12px}
    }
  </style>
</head>
<body>
<button class="toggle-sidebar-mobile" id="toggleSidebarMobile">☰</button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <a href="index.html" class="back-link">← Dashboard</a>
    <button class="collapse-btn" id="collapseBtn" title="collapse sidebar">◁</button>
  </div>
  <button class="new-btn" id="newNoteBtn">+ New Note</button>
  <div class="notes-list" id="notesList"></div>
  <div style="padding:12px;border-top:1px solid var(--border);font-size:0.7rem;color:var(--muted);text-align:center">
    <span id="noteCount">0 notes</span>
  </div>
</div>

<main class="main">
  <div class="toolbar">
    <input type="text" class="title-input" id="editorTitle" placeholder="Untitled note">
    <select class="lang-select" id="editorLang">
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="javascript">JavaScript</option>
      <option value="jsx">React JSX</option>
      <option value="python">Python</option>
      <option value="sql">SQL</option>
      <option value="json">JSON</option>
      <option value="bash">Bash</option>
      <option value="plaintext">Plain Text</option>
    </select>
    <button class="btn-action btn-copy" id="copyBtn">Copy Code</button>
    <button class="btn-action btn-save" id="saveBtn">Save</button>
  </div>
  <div class="editor-area" id="editorArea">
    <div class="empty-state" id="emptyState">
      <p>← Select or create a note</p>
    </div>
    <div class="code-mirror" id="codeMirror" style="display:none">
      <textarea class="code-text" id="codeTextarea" placeholder="// write code..." spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
      <div class="code-highlight"><pre><code class="hljs" id="codeHighlight"></code></pre></div>
    </div>
  </div>
</main>
<div class="toast-box" id="toastBox"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function(){
  const STORE = 'dp_notes_v4';
  const $ = id => document.getElementById(id);
  let notes = JSON.parse(localStorage.getItem(STORE)||'[]');
  let currentId = null;
  let saveTimer = null;

  const save = () => localStorage.setItem(STORE, JSON.stringify(notes));

  function renderList(){
    let html = '';
    notes.sort((a,b)=>b.updated - a.updated).forEach(n=>{
      const active = n.id===currentId?' active':'';
      html += `<div class="note-pill${active}" data-id="${n.id}">
        <span class="note-pill-delete" data-del="${n.id}">✕</span>
        <div class="note-pill-title">${esc(n.title||'Untitled')}</div>
        <div class="note-pill-lang">${n.lang||'text'}</div>
      </div>`;
    });
    $('notesList').innerHTML = html || '<div style="padding:20px;color:var(--muted);text-align:center">No notes yet</div>';
    $('noteCount').textContent = notes.length+' note'+(notes.length!==1?'s':'');
    document.querySelectorAll('.note-pill').forEach(el=>{
      el.addEventListener('click',e=>{
        if(e.target.closest('[data-del]')) return;
        openNote(el.dataset.id);
      });
    });
    document.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        if(confirm('Delete note?')) deleteNote(btn.dataset.del);
      });
    });
  }

  function openNote(id){
    saveCurrent(true);
    const note = notes.find(n=>n.id===id);
    if(!note)return;
    currentId=id;
    $('editorTitle').value=note.title||'';
    $('codeTextarea').value=note.content||'';
    $('editorLang').value=note.lang||'plaintext';
    $('emptyState').style.display='none';
    $('codeMirror').style.display='flex';
    highlight();
    renderList();
  }

  function newNote(){
    saveCurrent(true);
    const note = {
      id: Date.now().toString(36)+Math.random().toString(36).substr(2,7),
      title:'', content:'', lang:'html', updated: Date.now()
    };
    notes.unshift(note);
    save();
    openNote(note.id);
    toast('✨ New note');
  }

  function deleteNote(id){
    notes=notes.filter(n=>n.id!==id);
    save();
    if(currentId===id){currentId=null;clearEditor();}
    renderList();
    toast('🗑 Deleted');
  }

  function clearEditor(){
    $('editorTitle').value='';
    $('codeTextarea').value='';
    $('codeHighlight').textContent='';
    currentId=null;
    $('emptyState').style.display='flex';
    $('codeMirror').style.display='none';
  }

  function saveCurrent(silent){
    if(!currentId)return;
    const note=notes.find(n=>n.id===currentId);
    if(!note)return;
    note.title=$('editorTitle').value.trim();
    note.content=$('codeTextarea').value;
    note.lang=$('editorLang').value;
    note.updated=Date.now();
    save();
    if(!silent)toast('💾 Saved');
    renderList();
  }

  function autoSave(){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{if(currentId)saveCurrent(true);},1500);
  }

  function highlight(){
    const code=$('codeTextarea').value;
    const lang=$('editorLang').value;
    let out='';
    try{
      if(lang==='plaintext')out=esc(code);
      else out=hljs.highlight(code,{language:lang,ignoreIllegals:true}).value;
    }catch(e){out=esc(code)}
    $('codeHighlight').innerHTML=out;
    $('codeHighlight').parentElement.scrollTop=$('codeTextarea').scrollTop;
  }

  async function copyCode(){
    const code=$('codeTextarea').value;
    if(!code.trim()){toast('Nothing to copy');return}
    try{
      await navigator.clipboard.writeText(code);
      const btn=$('copyBtn');
      btn.classList.add('copied');
      btn.textContent='Copied!';
      setTimeout(()=>{btn.classList.remove('copied');btn.textContent='Copy Code';},2000);
      toast('📋 Copied');
    }catch(e){toast('Copy failed')}
  }

  function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;$('toastBox').appendChild(t);setTimeout(()=>t.remove(),2500)}

  // events
  $('newNoteBtn').addEventListener('click',newNote);
  $('saveBtn').addEventListener('click',()=>saveCurrent());
  $('copyBtn').addEventListener('click',copyCode);
  $('editorTitle').addEventListener('input',autoSave);
  $('codeTextarea').addEventListener('input',()=>{highlight();autoSave();});
  $('codeTextarea').addEventListener('scroll',()=>{$('codeHighlight').parentElement.scrollTop=$('codeTextarea').scrollTop});
  $('editorLang').addEventListener('change',()=>{highlight();autoSave()});

  // sidebar collapse
  $('collapseBtn').addEventListener('click',()=>{
    $('sidebar').classList.toggle('collapsed');
  });
  // mobile toggle
  $('toggleSidebarMobile').addEventListener('click',()=>{
    $('sidebar').classList.toggle('collapsed');
  });

  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCurrent();}
    if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();newNote();}
  });

  $('codeTextarea').addEventListener('keydown',e=>{
    if(e.key==='Tab'){
      e.preventDefault();
      const ta=$('codeTextarea');
      const s=ta.selectionStart;
      ta.value=ta.value.substring(0,s)+'  '+ta.value.substring(ta.selectionEnd);
      ta.selectionStart=ta.selectionEnd=s+2;
      highlight();
    }
  });

  renderList();
  if(notes.length>0)openNote(notes[0].id);
})();
</script>
</body>
</html>
