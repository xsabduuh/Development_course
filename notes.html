<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevPath 180 • Notes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #000;
      --card: #1a1a24;
      --border: #2a2a36;
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --accent2: #409cff;
      --green: #30d158;
      --red: #ff453a;
      --radius: 14px;
      --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* FIX 1: html/body يأخذان كامل الارتفاع بدون overflow:hidden على html */
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      overflow: hidden; /* منع تمرير الصفحة الكاملة - التمرير داخل العناصر فقط */
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* FIX 2: app-container يملأ كامل الشاشة */
    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── LOGIN ── */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .login-title { font-size: 1.6rem; font-weight: 700; text-align: center; color: var(--accent); }
    .input-field {
      background: #1c1c2e;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      user-select: auto;
      -webkit-user-select: auto;
    }
    .error-msg { color: var(--red); font-size: 0.85rem; text-align: center; }
    .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

    /* ── MAIN WRAPPER ── */
    /* FIX 3: mainContent يأخذ كامل الارتفاع ويستخدم flex */
    #mainContent {
      flex: 1;
      display: flex;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    /* ── DRAWER ── */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
      backdrop-filter: blur(4px);
    }
    .drawer-overlay.show { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 88vw; max-width: 340px;
      background: #111118;
      z-index: 60;
      transform: translateX(-100%);
      transition: transform 0.35s;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      padding: 20px 0;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 0 20px 16px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      color: var(--green);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .drawer-list { flex: 1; overflow-y: auto; padding: 12px 0; }
    .drawer-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px;
      color: var(--secondary);
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .drawer-item:hover { background: rgba(10,132,255,0.08); color: var(--text); }
    .drawer-item.logout-item { color: var(--red); border-top: 1px solid var(--border); margin-top: 12px; padding-top: 16px; }
    .drawer-item.user-item { color: var(--secondary); border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 8px; font-size: 0.8rem; }
    .menu-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.4rem;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── MAIN CONTENT INNER ── */
    /* FIX 4: main-content يملأ كامل المساحة ويتحكم في الفيو المعروض */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* ── HOME ── */
    .home-view {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 16px;
      overflow-y: auto; /* FIX: التمرير في home فقط */
      -webkit-overflow-scrolling: touch;
    }
    .home-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-shrink: 0; }
    .home-title-wrapper { display: flex; align-items: center; gap: 10px; }
    .home-title-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .home-title-icon svg { width: 100%; height: 100%; stroke: var(--accent); }
    .home-title-text {
      font-size: 1.8rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .home-new-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--accent); color: #fff;
      border: none; font-size: 1.6rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .home-tools { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; flex-shrink: 0; }
    .search-input {
      flex: 1; min-width: 150px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px;
      border-radius: 10px; font-size: 0.9rem; outline: none;
      user-select: auto; -webkit-user-select: auto;
    }
    .filter-chip { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--secondary); cursor: pointer; font-size: 0.8rem; font-weight: 600; }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .note-card-home { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; }
    .note-card-home .title { font-weight: 600; font-size: 0.9rem; }
    .note-card-home .lang { font-size: 0.65rem; color: var(--accent); background: rgba(10,132,255,0.15); padding: 2px 8px; border-radius: 4px; }
    .note-card-home .delete-btn { margin-top: 8px; background: none; border: none; color: var(--secondary); cursor: pointer; font-size: 0.8rem; }

    /* ── EDITOR ── */
    /* FIX 5: editor-view يملأ كامل الشاشة بشكل صحيح */
    .editor-view {
      display: none;
      flex-direction: column;
      flex: 1;
      height: 100%;
      overflow: hidden;
      padding: 0 16px 8px;
    }
    .editor-view.active { display: flex; }

    .editor-navbar {
      padding: 12px 0;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .back-btn { background: none; border: none; color: var(--accent); font-size: 1rem; cursor: pointer; white-space: nowrap; }
    .editor-title-input {
      flex: 1;
      background: transparent; border: none;
      font-size: 1.1rem; font-weight: 600;
      color: var(--text); outline: none;
      user-select: auto; -webkit-user-select: auto;
    }
    .editor-title-input::placeholder { color: var(--secondary); }

    /* FIX 6: code-area يملأ المساحة المتبقية بين الـ navbar والـ toolbar */
    .code-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0; /* مهم جداً لـ flexbox */
    }

    .code-stage {
      position: absolute;
      inset: 8px 8px 8px 48px;
      display: flex;
      overflow: hidden;
    }

    .code-layer {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow: auto;
      border: none;
      outline: none;
      background: transparent;
      word-break: break-all;
      user-select: auto;
      -webkit-user-select: auto;
    }

    .code-textarea {
      color: transparent;
      caret-color: var(--accent);
      resize: none;
      z-index: 2;
      -webkit-text-fill-color: transparent;
      position: relative;
    }
    .code-textarea::selection { background: rgba(10,132,255,0.3); }

    .code-preview {
      pointer-events: none;
      z-index: 1;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: auto;
    }
    .code-preview code { background: transparent !important; }

    .line-numbers {
      position: absolute;
      left: 4px; top: 8px; bottom: 8px;
      width: 36px;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--secondary);
      text-align: right;
      overflow: hidden;
      z-index: 3;
      pointer-events: none;
      line-height: 1.7;
      padding-right: 6px;
    }
    .line-numbers span { display: block; }

    .live-preview {
      position: absolute;
      inset: 0;
      border: none;
      background: #fff;
      display: none;
    }
    .live-preview.active { display: block; }

    /* FIX 7: bottom-toolbar بدون flex-wrap لضمان بقائها في سطر واحد قابل للتمرير */
    .bottom-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 0;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .bottom-toolbar::-webkit-scrollbar { display: none; }

    .lang-picker {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 7px 12px;
      border-radius: 20px; font-size: 0.8rem;
      outline: none; cursor: pointer;
      flex-shrink: 0;
    }
    .tool-btn {
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.75rem; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tool-btn:disabled { opacity: 0.4; pointer-events: none; }
    .tool-btn.save { background: var(--accent); color: #fff; border-color: var(--accent); }

    .status-bar {
      padding: 4px 0;
      display: flex; justify-content: space-between;
      font-size: 0.7rem; color: var(--secondary);
      font-family: var(--mono);
      flex-shrink: 0;
    }

    /* ── TOAST ── */
    .toast-panel {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 200;
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: none;
    }
    .toast {
      background: var(--card); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 20px;
      font-weight: 500; font-size: 0.85rem; text-align: center;
      animation: toastIn 0.4s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── DESKTOP ── */
    @media (min-width: 769px) {
      .app-container { flex-direction: row; max-width: 1000px; margin: 0 auto; }
      .drawer {
        position: relative;
        transform: none;
        width: 260px;
        flex-shrink: 0;
        height: 100%;
      }
      .drawer-overlay { display: none; }
      .menu-btn { display: none; }
      #mainContent { flex-direction: row; }
      .main-content { padding: 0 20px 0; }
    }
    @media (max-width: 768px) {
      .drawer { width: 85vw; }
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-title">DevPath Notes</div>
      <input type="email" class="input-field" id="emailInput" placeholder="Email">
      <input type="password" class="input-field" id="passwordInput" placeholder="Password">
      <div class="error-msg" id="loginError"></div>
      <button class="btn btn-primary" id="loginBtn">Sign In</button>
      <button class="btn btn-outline" id="registerBtn">Create Account</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="mainContent" style="display:none;">
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-header">📂 Menu</div>
      <div class="drawer-item user-item" id="drawerUserEmail"></div>
      <div class="drawer-item" id="drawerNewNote">+ New Note</div>
      <a href="index.html" class="drawer-item" style="text-decoration:none;">← Dashboard</a>
      <div class="drawer-item logout-item" id="drawerLogout">تسجيل الخروج</div>
    </aside>

    <main class="main-content" id="mainContentInner">
      <!-- HOME -->
      <div class="home-view" id="homeView">
        <div class="home-header">
          <div class="home-title-wrapper">
            <span class="home-title-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
            </span>
            <span class="home-title-text">Notes</span>
          </div>
          <div style="display:flex; gap:8px; align-items:center;">
            <button class="home-new-btn" id="homeNewBtn">+</button>
            <button class="menu-btn" id="menuBtn">☰</button>
          </div>
        </div>
        <div class="home-tools">
          <input type="text" class="search-input" id="homeSearch" placeholder="Search notes...">
          <button class="filter-chip active" data-lang="all">All</button>
          <button class="filter-chip" data-lang="html">HTML</button>
          <button class="filter-chip" data-lang="css">CSS</button>
          <button class="filter-chip" data-lang="javascript">JS</button>
          <button class="filter-chip" data-lang="python">Python</button>
        </div>
        <div class="notes-grid" id="notesGrid"></div>
      </div>

      <!-- EDITOR -->
      <div class="editor-view" id="editorView">
        <div class="editor-navbar">
          <button class="back-btn" id="editorBackBtn">← Back</button>
          <input type="text" class="editor-title-input" id="noteTitle" placeholder="Note title">
          <button class="menu-btn" id="menuBtnEditor">☰</button>
        </div>
        <!-- منطقة الكود الرئيسية -->
        <div class="code-area">
          <div class="line-numbers" id="lineNums"><span>1</span></div>
          <div class="code-stage" id="codeStage">
            <textarea class="code-layer code-textarea" id="codeTextarea" placeholder="Write your code here…" spellcheck="false"></textarea>
            <pre class="code-layer code-preview"><code class="hljs" id="codeHighlight"></code></pre>
          </div>
          <iframe class="live-preview" id="livePreview" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
        <!-- شريط الأدوات في الأسفل -->
        <div class="bottom-toolbar">
          <select class="lang-picker" id="langPicker">
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="sql">SQL</option>
            <option value="json">JSON</option>
            <option value="bash">Bash</option>
            <option value="plaintext">Plain Text</option>
          </select>
          <button class="tool-btn" id="undoBtn" disabled>↩ Undo</button>
          <button class="tool-btn" id="redoBtn" disabled>↪ Redo</button>
          <button class="tool-btn" id="selectAllBtn">⊞ All</button>
          <button class="tool-btn" id="previewBtn">👁 Preview</button>
          <button class="tool-btn" id="copyBtn">📋 Copy</button>
          <button class="tool-btn" id="deleteBtn" style="display:none;">🗑 Delete</button>
          <button class="tool-btn save" id="saveBtn">💾 Save</button>
        </div>
        <div class="status-bar">
          <span id="lineCount">Ln 1</span>
          <span id="charCount">0 chars</span>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast-panel" id="toastPanel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function(){
  const firebaseConfig = {
    apiKey: "AIzaSyAszFGDs1J92_53jHvj5aABmeiKZdc-mf0",
    authDomain: "gen-lang-client-0501601606.firebaseapp.com",
    projectId: "gen-lang-client-0501601606",
    storageBucket: "gen-lang-client-0501601606.firebasestorage.app",
    messagingSenderId: "1079712784218",
    appId: "1:1079712784218:web:598465155aa70938a6dd63"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let notes = [], currentId = null, filterLang = 'all', searchTerm = '', isPreview = false;
  const $ = id => document.getElementById(id);

  // ── Undo/Redo ──
  let undoStack = [], redoStack = [], lastSavedState = '';

  function pushUndoState() {
    const ta = $('codeTextarea');
    if (!ta || ta.value === lastSavedState) return;
    undoStack.push(lastSavedState);
    if (undoStack.length > 100) undoStack.shift();
    redoStack = [];
    lastSavedState = ta.value;
    updateUndoRedoButtons();
  }

  function applyState(s) {
    $('codeTextarea').value = s;
    lastSavedState = s;
    refreshHighlight(); updateStats(); drawLineNumbers(); syncScroll(); updateUndoRedoButtons();
  }

  function performUndo() {
    if (!undoStack.length) return;
    redoStack.push($('codeTextarea').value);
    applyState(undoStack.pop());
    autoSaveCurrent();
    $('codeTextarea').blur();
  }

  function performRedo() {
    if (!redoStack.length) return;
    undoStack.push($('codeTextarea').value);
    applyState(redoStack.pop());
    autoSaveCurrent();
    $('codeTextarea').blur();
  }

  function updateUndoRedoButtons() {
    $('undoBtn').disabled = !undoStack.length;
    $('redoBtn').disabled = !redoStack.length;
  }

  function autoSaveCurrent() {
    if (!currentId) return;
    const n = notes.find(x => x.id === currentId);
    if (n) { n.content = $('codeTextarea').value; saveToCloud(n); }
  }

  // ── Auth ──
  auth.onAuthStateChanged(async user => {
    if (user) {
      $('loginScreen').style.display = 'none';
      $('mainContent').style.display = 'flex';
      $('drawerUserEmail').textContent = user.email;
      await loadNotes();
    } else {
      $('loginScreen').style.display = 'flex';
      $('mainContent').style.display = 'none';
    }
  });

  $('loginBtn').addEventListener('click', async () => {
    try { await auth.signInWithEmailAndPassword($('emailInput').value, $('passwordInput').value); }
    catch(e) { $('loginError').textContent = e.message; }
  });
  $('registerBtn').addEventListener('click', async () => {
    try { await auth.createUserWithEmailAndPassword($('emailInput').value, $('passwordInput').value); }
    catch(e) { $('loginError').textContent = e.message; }
  });
  $('drawerLogout').addEventListener('click', () => auth.signOut());

  // ── Firestore ──
  async function loadNotes() {
    if (!auth.currentUser) return;
    const snap = await db.collection('users').doc(auth.currentUser.uid).collection('notes').orderBy('updated','desc').get();
    notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderHome();
  }

  async function saveToCloud(note) {
    if (!auth.currentUser) return;
    await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(note.id).set(note, { merge: true });
  }

  async function deleteFromCloud(id) {
    if (!auth.currentUser) return;
    await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(id).delete();
  }

  // ── Home ──
  function renderHome() {
    let filtered = [...notes];
    if (filterLang !== 'all') filtered = filtered.filter(n => n.lang === filterLang);
    if (searchTerm.trim()) {
      const q = searchTerm.toLowerCase();
      filtered = filtered.filter(n => (n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q));
    }
    filtered.sort((a,b) => b.updated - a.updated);

    $('notesGrid').innerHTML = filtered.length
      ? filtered.map(n => `
          <div class="note-card-home" data-id="${n.id}">
            <div class="title">${esc(n.title||'Untitled')}</div>
            <span class="lang">${n.lang||'txt'}</span>
            <button class="delete-btn" data-del="${n.id}">Delete</button>
          </div>
        `).join('')
      : '<div style="padding:60px;text-align:center;color:var(--secondary);grid-column:1/-1;">No notes yet.<br>Tap + to create.</div>';

    $('notesGrid').querySelectorAll('.note-card-home').forEach(c =>
      c.addEventListener('click', e => {
        if (!e.target.closest('[data-del]')) openEditor(c.dataset.id);
      })
    );
    $('notesGrid').querySelectorAll('[data-del]').forEach(b =>
      b.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('Delete this note?')) {
          notes = notes.filter(n => n.id !== b.dataset.del);
          deleteFromCloud(b.dataset.del);
          renderHome();
        }
      })
    );
  }

  // ── Editor ──
  function openEditor(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentId = id;
    $('noteTitle').value = note.title || '';
    $('codeTextarea').value = note.content || '';
    $('langPicker').value = note.lang || 'plaintext';
    showEditor();
    refreshHighlight(); updateStats(); drawLineNumbers();
    undoStack = []; redoStack = [];
    lastSavedState = note.content || '';
    updateUndoRedoButtons();
    $('deleteBtn').style.display = 'flex';
  }

  function openNewNote() {
    currentId = null;
    $('noteTitle').value = '';
    $('codeTextarea').value = '';
    $('langPicker').value = 'html';
    showEditor();
    refreshHighlight(); updateStats(); drawLineNumbers();
    undoStack = []; redoStack = [];
    lastSavedState = '';
    updateUndoRedoButtons();
    $('deleteBtn').style.display = 'none';

    const tempNote = {
      id: Date.now().toString(36) + Math.random().toString(36).substr(2,7),
      title: '', content: '', lang: 'html', updated: Date.now()
    };
    db.collection('users').doc(auth.currentUser.uid).collection('notes').add(tempNote).then(ref => {
      tempNote.id = ref.id;
      notes.unshift(tempNote);
      currentId = tempNote.id;
      $('deleteBtn').style.display = 'flex';
      renderHome();
    });
  }

  function showEditor() {
    closeDrawer();
    $('homeView').style.display = 'none';
    $('editorView').classList.add('active');
    switchToCode();
    setTimeout(() => $('codeTextarea').focus(), 100);
  }

  function closeEditor() {
    if (currentId) {
      const n = notes.find(x => x.id === currentId);
      if (n) {
        n.title = $('noteTitle').value.trim();
        n.content = $('codeTextarea').value;
        n.lang = $('langPicker').value;
        n.updated = Date.now();
        saveToCloud(n);
      }
    }
    currentId = null;
    $('editorView').classList.remove('active');
    $('homeView').style.display = 'flex';
    $('noteTitle').value = '';
    $('codeTextarea').value = '';
    $('codeHighlight').textContent = '';
    switchToCode();
    renderHome();
  }

  function saveAndClose() {
    if (!currentId) {
      toast('Saving…');
      setTimeout(() => {
        if (currentId) {
          const n = notes.find(x => x.id === currentId);
          if (n) { n.title = $('noteTitle').value.trim(); n.content = $('codeTextarea').value; n.lang = $('langPicker').value; n.updated = Date.now(); saveToCloud(n); }
        }
        closeEditor();
      }, 300);
      return;
    }
    const n = notes.find(x => x.id === currentId);
    if (!n) return;
    n.title = $('noteTitle').value.trim();
    n.content = $('codeTextarea').value;
    n.lang = $('langPicker').value;
    n.updated = Date.now();
    saveToCloud(n);
    toast('Saved ✓');
    closeEditor();
  }

  async function deleteCurrent() {
    if (!currentId || !confirm('Delete this note?')) return;
    await deleteFromCloud(currentId);
    notes = notes.filter(n => n.id !== currentId);
    closeEditor();
  }

  // ── Preview ──
  function switchToPreview() {
    isPreview = true;
    $('codeStage').style.display = 'none';
    $('livePreview').classList.add('active');
    const code = $('codeTextarea').value, lang = $('langPicker').value;
    let html = code;
    if (lang === 'css') html = `<!DOCTYPE html><html><head><style>${code}</style></head><body></body></html>`;
    else if (lang === 'javascript') html = `<!DOCTYPE html><html><body><script>${code}<\/script></body></html>`;
    else if (lang === 'html' && !code.includes('<!DOCTYPE')) html = `<!DOCTYPE html><html>${code}</html>`;
    $('livePreview').srcdoc = html;
    $('previewBtn').textContent = '✏️ Code';
  }

  function switchToCode() {
    isPreview = false;
    $('codeStage').style.display = 'flex';
    $('livePreview').classList.remove('active');
    $('previewBtn').textContent = '👁 Preview';
  }

  // ── Highlight ──
  function refreshHighlight() {
    const code = $('codeTextarea').value, lang = $('langPicker').value;
    let out;
    try {
      out = lang === 'plaintext' ? esc(code) : hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
    } catch(e) { out = esc(code); }
    $('codeHighlight').innerHTML = out;
    syncScroll();
  }

  function syncScroll() {
    const pre = $('codeHighlight').parentElement;
    const ta  = $('codeTextarea');
    if (!pre || !ta) return;
    pre.scrollTop  = ta.scrollTop;
    pre.scrollLeft = ta.scrollLeft;
  }

  function drawLineNumbers() {
    const lines = $('codeTextarea').value.split('\n');
    $('lineNums').innerHTML = lines.map((_,i) => `<span>${i+1}</span>`).join('');
    $('lineNums').scrollTop = $('codeTextarea').scrollTop;
  }

  function updateStats() {
    const code = $('codeTextarea').value;
    $('charCount').textContent = code.length + ' chars';
    $('lineCount').textContent = 'Ln ' + code.split('\n').length;
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    $('toastPanel').appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  function closeDrawer() {
    $('drawer').classList.remove('open');
    $('drawerOverlay').classList.remove('show');
  }

  // ── Events ──
  $('homeNewBtn').addEventListener('click', openNewNote);
  $('drawerNewNote').addEventListener('click', openNewNote);
  $('editorBackBtn').addEventListener('click', closeEditor);
  $('saveBtn').addEventListener('click', saveAndClose);
  $('deleteBtn').addEventListener('click', deleteCurrent);

  $('copyBtn').addEventListener('click', async () => {
    try { await navigator.clipboard.writeText($('codeTextarea').value); toast('Copied!'); }
    catch(e) { toast('Copy failed'); }
  });

  $('selectAllBtn').addEventListener('click', () => { $('codeTextarea').focus(); $('codeTextarea').select(); });
  $('undoBtn').addEventListener('click', performUndo);
  $('redoBtn').addEventListener('click', performRedo);

  $('previewBtn').addEventListener('click', () => isPreview ? switchToCode() : switchToPreview());

  const openMenu = () => { $('drawer').classList.toggle('open'); $('drawerOverlay').classList.toggle('show'); };
  $('menuBtn').addEventListener('click', openMenu);
  if ($('menuBtnEditor')) $('menuBtnEditor').addEventListener('click', openMenu);
  $('drawerOverlay').addEventListener('click', closeDrawer);

  // FIX 8: الكتابة في الـ textarea تُحدِّث الـ highlight والـ autosave
  $('codeTextarea').addEventListener('input', () => {
    refreshHighlight(); updateStats(); drawLineNumbers();
    if (currentId) {
      const n = notes.find(x => x.id === currentId);
      if (n) { n.content = $('codeTextarea').value; n.updated = Date.now(); saveToCloud(n); }
    }
    if (isPreview) switchToPreview();
    clearTimeout(window._undoDebounce);
    window._undoDebounce = setTimeout(pushUndoState, 500);
  });

  $('codeTextarea').addEventListener('scroll', () => { syncScroll(); drawLineNumbers(); });

  $('homeSearch').addEventListener('input', e => { searchTerm = e.target.value; renderHome(); });

  document.querySelectorAll('.filter-chip').forEach(c =>
    c.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      filterLang = c.dataset.lang;
      renderHome();
    })
  );

  $('noteTitle').addEventListener('input', () => {
    if (!currentId) return;
    const n = notes.find(x => x.id === currentId);
    if (n) { n.title = $('noteTitle').value; n.updated = Date.now(); saveToCloud(n); }
  });

  $('langPicker').addEventListener('change', () => {
    refreshHighlight();
    if (currentId) {
      const n = notes.find(x => x.id === currentId);
      if (n) { n.lang = $('langPicker').value; n.updated = Date.now(); saveToCloud(n); }
    }
    if (isPreview) switchToPreview();
  });

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key === 's') { e.preventDefault(); saveAndClose(); }
    if ((e.ctrlKey||e.metaKey) && e.key === 'n') { e.preventDefault(); openNewNote(); }
    if ((e.ctrlKey||e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); performUndo(); }
    if ((e.ctrlKey||e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); performRedo(); }
  });

  // FIX 9: Tab + auto-pairs في الـ textarea
  $('codeTextarea').addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      pushUndoState();
      const ta = this, s = ta.selectionStart, end = ta.selectionEnd;
      ta.setRangeText('  ', s, end, 'end');
      ta.selectionStart = ta.selectionEnd = s + 2;
      refreshHighlight(); updateStats(); drawLineNumbers();
      return;
    }
    const pairs = { '(':')', '[':']', '{':'}', '"':'"', "'":"'", '`':'`' };
    if (pairs[e.key]) {
      e.preventDefault();
      pushUndoState();
      const s = this.selectionStart;
      this.setRangeText(e.key + pairs[e.key], s, this.selectionEnd, 'end');
      this.selectionStart = this.selectionEnd = s + 1;
      refreshHighlight(); updateStats(); drawLineNumbers();
    }
  });

  renderHome();
})();
</script>
</body>
</html>
