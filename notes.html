<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevPath 180 • Notes</title>
    <!-- highlight.js CSS (lightweight theme) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        :root {
            --bg: #070710;
            --surface: #0d0d1f;
            --surface2: #111128;
            --border: #1e1e40;
            --border2: #2a2a55;
            --text: #e8e8ff;
            --text2: #7878aa;
            --text3: #4a4a7a;
            --accent: #4f46e5;
            --accent2: #818cf8;
            --success: #06ffa5;
            --danger: #ef4444;
            --orange: #f97316;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
            --font: 'DM Sans', sans-serif;
            --mono: 'Space Mono', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* ======== SIDEBAR ======== */
        .sidebar {
            width: 320px; min-width: 320px;
            height: 100vh;
            background: rgba(13,13,31,0.95);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            backdrop-filter: blur(20px);
            z-index: 20;
            transition: transform 0.3s;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-logo {
            font-family: var(--mono);
            font-weight: 700; font-size: 1.1rem;
            color: var(--success);
            display: flex; align-items: center; gap: 8px;
            text-decoration: none;
        }
        .sidebar-logo svg { width: 24px; height: 24px; }
        .back-link {
            margin-left: auto;
            color: var(--text2);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .back-link:hover { border-color: var(--accent); color: white; }

        .new-note-btn {
            margin: 16px;
            padding: 12px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(79,70,229,0.3);
        }
        .new-note-btn:hover { background: var(--accent2); }
        .new-note-btn svg { width: 18px; height: 18px; }

        .category-filter {
            padding: 0 16px 12px;
            display: flex; gap: 6px; flex-wrap: wrap;
        }
        .category-chip {
            padding: 6px 12px; border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            cursor: pointer; font-size: 0.75rem;
            font-weight: 600; transition: all 0.2s;
            white-space: nowrap;
        }
        .category-chip.active { background: rgba(79,70,229,0.2); border-color: var(--accent); color: var(--accent2); }

        .notes-list {
            flex: 1; overflow-y: auto; padding: 0 8px;
            scrollbar-width: thin;
        }
        .notes-list::-webkit-scrollbar { width: 4px; }
        .notes-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

        .note-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px 14px; margin: 2px 0;
            border-radius: var(--radius-sm); cursor: pointer;
            transition: all 0.2s; border: 1px solid transparent;
            position: relative;
        }
        .note-item:hover { background: rgba(255,255,255,0.03); }
        .note-item.active { background: rgba(79,70,229,0.1); border-color: rgba(79,70,229,0.3); }
        .note-item.active::before {
            content: '';
            position: absolute; left: -2px; top: 8px; bottom: 8px;
            width: 3px; background: var(--accent); border-radius: 2px;
        }
        .note-item-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: rgba(79,70,229,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; flex-shrink: 0;
        }
        .note-item-info { flex: 1; min-width: 0; }
        .note-item-title {
            font-weight: 600; font-size: 0.85rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .note-item-lang {
            font-size: 0.65rem; color: var(--accent2);
            background: rgba(79,70,229,0.2);
            padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 3px;
        }
        .note-item-delete {
            width: 28px; height: 28px; border-radius: 6px;
            border: none; background: transparent; cursor: pointer;
            color: transparent; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0; font-size: 0.9rem;
        }
        .note-item:hover .note-item-delete { color: var(--danger); }
        .note-item-delete:hover { background: rgba(239,68,68,0.15); }

        .sidebar-footer {
            padding: 16px; border-top: 1px solid var(--border);
            font-size: 0.65rem; color: var(--text3);
            text-align: center; font-family: var(--mono);
        }

        /* ======== MAIN ======== */
        .main {
            flex: 1; height: 100vh;
            display: flex; flex-direction: column;
            background: var(--bg);
            min-width: 0;
        }
        .editor-toolbar {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 24px; border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .editor-toolbar .title-input {
            flex: 1; min-width: 150px;
            background: transparent; border: none;
            font-size: 1.2rem; font-weight: 700;
            color: white; font-family: var(--font); outline: none;
        }
        .editor-toolbar .title-input::placeholder { color: var(--text3); }
        .lang-select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2); padding: 6px 12px;
            border-radius: 8px; font-size: 0.8rem; outline: none; cursor: pointer;
        }
        .preview-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2); padding: 8px 12px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
            font-weight: 600; display: flex; align-items: center; gap: 6px;
        }
        .preview-toggle.active { background: var(--accent); color: white; border-color: var(--accent); }
        .preview-toggle svg { width: 16px; height: 16px; }

        .editor-area {
            flex: 1; padding: 20px 24px;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .code-editor-wrap {
            flex: 1; display: flex; flex-direction: column;
            position: relative;
        }
        .code-textarea {
            flex: 1; width: 100%;
            background: transparent; border: none;
            color: transparent; caret-color: white;
            font-size: 0.95rem; font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            line-height: 1.8; resize: none; outline: none;
            position: relative; z-index: 2;
            white-space: pre; overflow: auto;
        }
        .code-preview {
            position: absolute; inset: 0;
            padding: 0; margin: 0;
            font-size: 0.95rem; line-height: 1.8;
            white-space: pre; overflow: auto;
            pointer-events: none; z-index: 1;
            background: transparent;
        }
        .code-preview code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: transparent;
        }
        .empty-state {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; color: var(--text3);
        }
        .empty-state svg { width: 64px; height: 64px; opacity: 0.3; }
        .editor-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 24px; border-top: 1px solid var(--border);
            flex-wrap: wrap; gap: 8px;
        }
        .btn {
            padding: 8px 16px; border-radius: 8px; border: none;
            font-weight: 600; cursor: pointer; font-size: 0.8rem;
            display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent2); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
        .btn-ghost:hover { border-color: var(--border2); color: white; }
        .btn-danger { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }
        .btn-danger:hover { background: rgba(239,68,68,0.1); }
        .btn svg { width: 16px; height: 16px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--surface); border: 1px solid var(--success);
            color: var(--success); padding: 12px 20px;
            border-radius: var(--radius-sm); font-weight: 600;
            z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease, fadeOut 0.4s 1.8s forwards;
            display: flex; align-items: center; gap: 8px;
        }
        @keyframes slideUp { from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1} }
        @keyframes fadeOut { to{opacity:0;transform:translateY(10px)} }

        /* Run output modal */
        .run-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .run-frame {
            width: 80%; height: 80%; background: white; border-radius: var(--radius);
            border: none;
        }

        /* Mobile */
        @media(max-width:680px) {
            .sidebar { position: fixed; left: 0; top: 0; z-index: 40; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.6); z-index: 35; }
            .sidebar-overlay.show { display: block; }
            .hamburger { display: flex!important; }
        }
        .hamburger {
            display: none; position: fixed; top: 14px; left: 14px;
            z-index: 50; background: var(--surface); border: 1px solid var(--border);
            color: white; width: 40px; height: 40px; border-radius: 8px;
            align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>
<body>

<!-- Hamburger for mobile -->
<button class="hamburger" id="hamburger">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="index.html" class="sidebar-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4 17 10 11 4 5"></polyline>
                <line x1="8" y1="11" x2="20" y2="11"></line>
                <polyline points="14 17 20 11 14 5"></polyline>
            </svg>
            DevPath Notes
        </a>
        <a href="index.html" class="back-link">← Dashboard</a>
    </div>
    <button class="new-note-btn" id="newNoteBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Note
    </button>
    <div class="category-filter" id="categoryFilter">
        <button class="category-chip active" data-cat="all">All</button>
        <button class="category-chip" data-cat="html">HTML</button>
        <button class="category-chip" data-cat="css">CSS</button>
        <button class="category-chip" data-cat="js">JavaScript</button>
        <button class="category-chip" data-cat="react">React</button>
        <button class="category-chip" data-cat="backend">Backend</button>
    </div>
    <div class="notes-list" id="notesList"></div>
    <div class="sidebar-footer"><span id="noteCount">0 notes</span></div>
</aside>

<!-- MAIN EDITOR -->
<main class="main" id="main">
    <div class="editor-toolbar">
        <input type="text" class="title-input" id="editorTitle" placeholder="Untitled Note">
        <select class="lang-select" id="editorLang">
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="js">JavaScript</option>
            <option value="jsx">React JSX</option>
            <option value="ts">TypeScript</option>
            <option value="json">JSON</option>
            <option value="python">Python</option>
            <option value="sql">SQL</option>
            <option value="bash">Bash</option>
            <option value="plaintext">Plain Text</option>
        </select>
        <button class="preview-toggle" id="previewToggle" title="Toggle Highlighting">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </div>
    <div class="editor-area" id="editorArea">
        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
            </svg>
            <p>Select a note or create a new one</p>
        </div>
        <div class="code-editor-wrap" id="codeEditorWrap" style="display:none;">
            <textarea class="code-textarea" id="codeTextarea" placeholder="// Write your code here..." spellcheck="false"></textarea>
            <pre class="code-preview" id="codePreview"><code class="hljs" id="codeHighlight"></code></pre>
        </div>
    </div>
    <div class="editor-footer">
        <div style="display:flex; gap:8px; align-items:center;">
            <span style="font-size:0.75rem; color:var(--text3);" id="charCounter">0 chars</span>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="btn btn-ghost" id="runBtn" title="Run HTML/CSS/JS">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Run
            </button>
            <button class="btn btn-danger" id="deleteNoteBtn" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                Delete
            </button>
            <button class="btn btn-primary" id="saveNoteBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save
            </button>
        </div>
    </div>
</main>

<!-- Run output modal -->
<div class="run-modal" id="runModal">
    <button style="position:absolute; top:10px; right:10px; background:var(--danger); color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; z-index:5;" id="closeRunModal">Close</button>
    <iframe class="run-frame" id="runFrame"></iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function() {
    // ============ STORAGE ============
    const STORAGE_KEY = 'devpath_notes_v3';

    function loadNotes() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch(e) { return []; }
    }
    function saveNotes(notes) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    // ============ STATE ============
    let notes = loadNotes();
    let currentNoteId = null;
    let activeCategory = 'all';
    let autoSaveTimer = null;
    let showHighlighting = true;

    // ============ DOM ============
    const $ = (id) => document.getElementById(id);
    const notesList = $('notesList');
    const editorTitle = $('editorTitle');
    const codeTextarea = $('codeTextarea');
    const codeHighlight = $('codeHighlight');
    const codePreview = $('codePreview');
    const editorLang = $('editorLang');
    const emptyState = $('emptyState');
    const codeEditorWrap = $('codeEditorWrap');
    const deleteNoteBtn = $('deleteNoteBtn');
    const charCounter = $('charCounter');
    const noteCountSpan = $('noteCount');
    const sidebar = $('sidebar');
    const sidebarOverlay = $('sidebarOverlay');
    const hamburger = $('hamburger');
    const runModal = $('runModal');
    const runFrame = $('runFrame');

    // ============ HELPERS ============
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
    function formatDate(ts) {
        const d = new Date(ts);
        return d.toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    }
    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    // ============ RENDER NOTES LIST ============
    function renderNotesList() {
        let filtered = notes;
        if (activeCategory !== 'all') {
            filtered = notes.filter(n => n.category === activeCategory);
        }
        filtered.sort((a,b) => b.updatedAt - a.updatedAt);

        notesList.innerHTML = filtered.map(n => `
            <div class="note-item ${n.id === currentNoteId ? 'active' : ''}" data-id="${n.id}">
                <div class="note-item-icon">${getCategoryIcon(n.category)}</div>
                <div class="note-item-info">
                    <div class="note-item-title">${escapeHtml(n.title || 'Untitled')}</div>
                    <span class="note-item-lang">${n.language || 'text'}</span>
                    <div style="font-size:0.62rem; color:var(--text3); margin-top:4px;">${formatDate(n.updatedAt)}</div>
                </div>
                <button class="note-item-delete" data-delete="${n.id}" title="Delete">✕</button>
            </div>
        `).join('');

        // Bind clicks
        notesList.querySelectorAll('.note-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (e.target.closest('[data-delete]')) return;
                openNote(item.dataset.id);
            });
        });
        notesList.querySelectorAll('[data-delete]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteNoteById(btn.dataset.delete);
            });
        });

        noteCountSpan.textContent = `${filtered.length} note${filtered.length !== 1 ? 's' : ''}`;
    }

    function getCategoryIcon(cat) {
        const map = { html: '🏗️', css: '🎨', js: '📜', react: '⚛️', backend: '🖥️' };
        return map[cat] || '📝';
    }

    // ============ OPEN NOTE ============
    function openNote(id) {
        const note = notes.find(n => n.id === id);
        if (!note) return;
        currentNoteId = id;
        editorTitle.value = note.title || '';
        codeTextarea.value = note.content || '';
        editorLang.value = note.language || 'plaintext';
        emptyState.style.display = 'none';
        codeEditorWrap.style.display = 'flex';
        deleteNoteBtn.style.display = 'flex';
        updateHighlighting();
        updateCharCount();
        renderNotesList();
        codeTextarea.focus();

        // Sync scroll between textarea and preview
        syncScroll();
    }

    function createNewNote() {
        autoSaveCurrent();
        const newNote = {
            id: generateId(),
            title: '',
            content: '',
            language: 'html',
            category: 'html',
            createdAt: Date.now(),
            updatedAt: Date.now()
        };
        notes.unshift(newNote);
        saveNotes(notes);
        openNote(newNote.id);
        renderNotesList();
        showToast('📝 New note created');
    }

    function deleteNoteById(id) {
        if (!confirm('Delete this note permanently?')) return;
        notes = notes.filter(n => n.id !== id);
        saveNotes(notes);
        if (currentNoteId === id) {
            currentNoteId = null;
            clearEditor();
        }
        renderNotesList();
        showToast('🗑 Note deleted');
    }

    function clearEditor() {
        editorTitle.value = '';
        codeTextarea.value = '';
        codeHighlight.textContent = '';
        currentNoteId = null;
        emptyState.style.display = 'flex';
        codeEditorWrap.style.display = 'none';
        deleteNoteBtn.style.display = 'none';
        updateCharCount();
    }

    function saveCurrentNote() {
        if (!currentNoteId) return;
        const note = notes.find(n => n.id === currentNoteId);
        if (!note) return;
        note.title = editorTitle.value;
        note.content = codeTextarea.value;
        note.language = editorLang.value;
        note.category = editorLang.value;
        note.updatedAt = Date.now();
        saveNotes(notes);
        renderNotesList();
    }

    function autoSaveCurrent() {
        if (autoSaveTimer) clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => {
            if (currentNoteId) {
                saveCurrentNote();
                showToast('💾 Auto-saved', true);
            }
        }, 2000);
    }

    // ============ SYNTAX HIGHLIGHTING ============
    function updateHighlighting() {
        if (!showHighlighting) {
            codePreview.style.display = 'none';
            codeTextarea.style.color = 'white';
            return;
        }
        codePreview.style.display = 'block';
        codeTextarea.style.color = 'transparent';

        const code = codeTextarea.value;
        const lang = editorLang.value;
        let highlighted = '';
        try {
            if (lang === 'plaintext') {
                highlighted = escapeHtml(code);
            } else {
                const result = hljs.highlight(code, { language: lang, ignoreIllegals: true });
                highlighted = result.value;
            }
        } catch (e) {
            highlighted = escapeHtml(code);
        }
        codeHighlight.innerHTML = highlighted;
        // Sync scroll
        syncScroll();
    }

    function syncScroll() {
        const textarea = codeTextarea;
        const preview = codePreview;
        if (!textarea || !preview) return;
        preview.scrollTop = textarea.scrollTop;
        preview.scrollLeft = textarea.scrollLeft;
    }

    // Toggle highlighting
    $('previewToggle').addEventListener('click', () => {
        showHighlighting = !showHighlighting;
        $('previewToggle').classList.toggle('active', showHighlighting);
        updateHighlighting();
    });
    // Initially active
    $('previewToggle').classList.add('active');

    // ============ RUN CODE ============
    function runCode() {
        const code = codeTextarea.value;
        const lang = editorLang.value;
        if (['html', 'css', 'js'].includes(lang)) {
            // Build HTML document
            let html = code;
            if (lang === 'css') html = `<html><head><style>${code}</style></head><body></body></html>`;
            else if (lang === 'js') html = `<html><body><script>${code}<\/script></body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            runFrame.src = url;
            runModal.style.display = 'flex';
        } else {
            showToast('⚠️ Run only supports HTML, CSS, or JavaScript');
        }
    }

    $('closeRunModal').addEventListener('click', () => {
        runModal.style.display = 'none';
        runFrame.src = '';
    });

    // ============ CHAR COUNT ============
    function updateCharCount() {
        const len = codeTextarea.value.length;
        charCounter.textContent = `${len} character${len !== 1 ? 's' : ''}`;
    }

    // ============ TOAST ============
    function showToast(msg, quick = false) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        const duration = quick ? 1200 : 2200;
        setTimeout(() => toast.remove(), duration);
    }

    // ============ EVENTS ============
    $('newNoteBtn').addEventListener('click', createNewNote);
    $('saveNoteBtn').addEventListener('click', () => { saveCurrentNote(); showToast('✔ Saved'); });
    $('deleteNoteBtn').addEventListener('click', () => { if (currentNoteId) deleteNoteById(currentNoteId); });
    $('runBtn').addEventListener('click', runCode);

    editorTitle.addEventListener('input', autoSaveCurrent);
    codeTextarea.addEventListener('input', () => {
        updateHighlighting();
        updateCharCount();
        autoSaveCurrent();
    });
    codeTextarea.addEventListener('scroll', syncScroll);
    editorLang.addEventListener('change', () => {
        updateHighlighting();
        autoSaveCurrent();
    });

    // Category filter
    document.querySelectorAll('.category-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            activeCategory = chip.dataset.cat;
            renderNotesList();
        });
    });

    // Mobile sidebar
    hamburger.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        sidebarOverlay.classList.toggle('show');
    });
    sidebarOverlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('show');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveCurrentNote();
            showToast('✔ Saved');
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
            e.preventDefault();
            createNewNote();
        }
    });

    // ============ INIT ============
    renderNotesList();
    if (notes.length > 0) {
        openNote(notes[0].id);
    }
})();
</script>
</body>
</html>
