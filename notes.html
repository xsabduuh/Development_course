<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DevPath 180 • Notes Pro</title>
  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <style>
    :root {
      --bg: #0a0a14;
      --surface: #10101e;
      --border: #202038;
      --text: #e0e0f0;
      --text-secondary: #8888aa;
      --accent: #5b5bf0;
      --accent-hover: #7777ff;
      --success: #2dd4bf;
      --danger: #f87171;
      --warning: #fbbf24;
      --radius: 12px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh; display: flex; overflow: hidden;
      user-select: none; -webkit-user-select: none;
    }

    /* شريط جانبي */
    .sidebar {
      width: 300px; min-width: 300px;
      height: 100dvh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: transform 0.3s ease;
      z-index: 30;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .back-link {
      display: flex; align-items: center; gap: 6px;
      background: var(--accent); color: white;
      padding: 8px 14px; border-radius: 8px;
      text-decoration: none; font-weight: 600;
      font-size: 0.8rem; white-space: nowrap;
    }
    .back-link:hover { background: var(--accent-hover); }

    .search-box {
      flex: 1; position: relative;
    }
    .search-box input {
      width: 100%; background: #1a1a2e;
      border: 1px solid var(--border); color: var(--text);
      padding: 8px 12px; border-radius: 8px;
      font-size: 0.8rem; outline: none;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box .search-icon {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-secondary); pointer-events: none;
    }

    .filter-row {
      display: flex; gap: 6px; padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-secondary); cursor: pointer;
      font-size: 0.7rem; font-weight: 600;
    }
    .filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

    .notes-list {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    .note-item {
      padding: 12px; margin: 4px 0; border-radius: var(--radius);
      cursor: pointer; border: 1px solid transparent;
      display: flex; justify-content: space-between; align-items: center;
    }
    .note-item:hover { background: rgba(255,255,255,0.03); }
    .note-item.active {
      background: rgba(91,91,240,0.1); border-color: var(--accent);
    }
    .note-item .info { flex: 1; min-width: 0; }
    .note-item .title { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item .lang-badge {
      font-size: 0.6rem; background: rgba(91,91,240,0.2); color: var(--accent);
      padding: 2px 8px; border-radius: 4px; text-transform: uppercase;
    }
    .note-item .delete-btn {
      background: none; border: none; color: var(--text-secondary);
      cursor: pointer; opacity: 0; transition: opacity 0.2s;
      font-size: 0.9rem; padding: 4px 8px;
    }
    .note-item:hover .delete-btn { opacity: 1; }
    .note-item .delete-btn:hover { color: var(--danger); }

    .sidebar-footer {
      padding: 12px 16px; border-top: 1px solid var(--border);
      font-size: 0.7rem; color: var(--text-secondary);
      text-align: center;
    }

    /* المحتوى الرئيسي */
    .main {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0; background: var(--bg);
    }

    .top-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .menu-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text); width: 36px; height: 36px;
      border-radius: 8px; display: none; align-items: center;
      justify-content: center; cursor: pointer; font-size: 1.2rem;
    }
    .title-input {
      flex: 1; background: transparent; border: none;
      font-size: 1.2rem; font-weight: 600; color: var(--text);
      outline: none; min-width: 0;
    }
    .title-input::placeholder { color: var(--text-secondary); }

    .lang-select {
      background: #1a1a2e; border: 1px solid var(--border);
      color: var(--text); padding: 6px 12px; border-radius: 8px;
      font-size: 0.8rem; outline: none; cursor: pointer;
    }

    .editor-area {
      flex: 1; position: relative; display: flex;
    }
    .editor-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; color: var(--text-secondary); gap: 12px;
    }
    .code-container {
      flex: 1; display: flex; position: relative;
    }
    .gutter {
      width: 40px; background: #0d0d1a; border-right: 1px solid var(--border);
      padding: 12px 0; text-align: right; font-family: var(--mono);
      font-size: 0.8rem; color: var(--text-secondary); overflow: hidden;
      user-select: none; line-height: 1.6;
    }
    .gutter span { display: block; padding-right: 8px; }

    .code-wrapper {
      flex: 1; position: relative; overflow: hidden;
    }
    .code-textarea {
      position: absolute; inset: 0;
      background: transparent; border: none; padding: 12px 16px;
      font-family: var(--mono); font-size: 0.85rem; line-height: 1.6;
      resize: none; outline: none; color: transparent; caret-color: white;
      z-index: 2; white-space: pre-wrap; overflow: auto;
      tab-size: 2; -moz-tab-size: 2;
    }
    .code-highlight {
      position: absolute; inset: 0; padding: 12px 16px;
      font-family: var(--mono); font-size: 0.85rem; line-height: 1.6;
      white-space: pre-wrap; pointer-events: none; z-index: 1;
      overflow: hidden;
    }
    .code-highlight code { background: transparent !important; }

    .bottom-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--text-secondary);
      flex-wrap: wrap; gap: 8px;
    }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: #1a1a2e;
      color: var(--text); font-weight: 500; cursor: pointer;
      font-size: 0.78rem; transition: all 0.2s;
    }
    .btn:hover { background: #222240; }
    .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn.danger { color: var(--danger); border-color: rgba(248,113,113,0.3); }
    .btn.success { color: var(--success); border-color: rgba(45,212,191,0.3); }

    .toast-container {
      position: fixed; bottom: 20px; right: 20px;
      z-index: 100; display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: #1a1a2e; border: 1px solid var(--success);
      color: var(--success); padding: 10px 20px;
      border-radius: 8px; font-weight: 500;
      animation: fadeInUp 0.3s;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    /* Mobile */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0;
        transform: translateX(-100%);
        width: 85vw; max-width: 340px;
      }
      .sidebar.open { transform: translateX(0); }
      .overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.6); z-index: 25;
      }
      .overlay.show { display: block; }
      .menu-btn { display: flex; }
    }
  </style>
</head>
<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Dashboard
    </a>
  </div>

  <div class="search-box" style="padding:8px 16px;">
    <input type="text" id="searchInput" placeholder="Search notes..." autocomplete="off">
    <span class="search-icon">🔍</span>
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-chip active" data-lang="all">All</button>
    <button class="filter-chip" data-lang="html">HTML</button>
    <button class="filter-chip" data-lang="css">CSS</button>
    <button class="filter-chip" data-lang="javascript">JS</button>
    <button class="filter-chip" data-lang="python">Python</button>
    <button class="filter-chip" data-lang="sql">SQL</button>
  </div>

  <div class="notes-list" id="notesList"></div>
  <div class="sidebar-footer">Total: <span id="totalCount">0</span> notes</div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="top-bar">
    <button class="menu-btn" id="menuBtn">☰</button>
    <input type="text" class="title-input" id="noteTitle" placeholder="Note title">
    <select class="lang-select" id="langSelect">
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="javascript">JavaScript</option>
      <option value="python">Python</option>
      <option value="sql">SQL</option>
      <option value="json">JSON</option>
      <option value="bash">Bash</option>
      <option value="plaintext">Plain Text</option>
    </select>
  </div>

  <div class="editor-area">
    <div class="editor-empty" id="emptyState">
      <span style="font-size:3rem;">📄</span>
      <span>Select a note from the sidebar or create new</span>
    </div>
    <div class="code-container" id="codeContainer" style="display:none">
      <div class="gutter" id="gutter">1</div>
      <div class="code-wrapper">
        <textarea class="code-textarea" id="codeTextarea" placeholder="Write your code..." spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
        <pre class="code-highlight"><code class="hljs" id="codeHighlight"></code></pre>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div>
      Lines: <span id="lineCount">0</span> |
      Chars: <span id="charCount">0</span>
    </div>
    <div class="btn-group">
      <button class="btn success" id="copyBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
      <button class="btn danger" id="deleteBtn" style="display:none">Delete</button>
      <button class="btn primary" id="saveBtn">Save</button>
    </div>
  </div>
</main>

<div class="toast-container" id="toastBox"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function(){
  const STORAGE = 'dp_notes_v6';
  let notes = JSON.parse(localStorage.getItem(STORAGE) || '[]');
  let currentId = null;
  let filterLang = 'all';
  let searchTerm = '';
  let autoSaveTimer = null;

  const $ = id => document.getElementById(id);
  const sidebar = $('sidebar');
  const overlay = $('overlay');

  function saveNotes() { localStorage.setItem(STORAGE, JSON.stringify(notes)); }

  // RENDER SIDEBAR
  function renderSidebar() {
    let filtered = [...notes];
    if (filterLang !== 'all') filtered = filtered.filter(n => n.lang === filterLang);
    if (searchTerm.trim()) {
      const q = searchTerm.toLowerCase();
      filtered = filtered.filter(n => (n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q));
    }
    filtered.sort((a,b) => b.updated - a.updated);

    const list = $('notesList');
    list.innerHTML = filtered.map(n => `
      <div class="note-item ${n.id===currentId?'active':''}" data-id="${n.id}">
        <div class="info">
          <div class="title">${escHtml(n.title || 'Untitled')}</div>
          <span class="lang-badge">${n.lang||'txt'}</span>
        </div>
        <button class="delete-btn" data-del="${n.id}">✕</button>
      </div>
    `).join('') || '<div style="padding:20px;color:var(--text-secondary);text-align:center">No notes</div>';

    list.querySelectorAll('.note-item').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('[data-del]')) return;
        openNote(el.dataset.id);
        closeSidebar();
      });
    });
    list.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm('Delete this note?')) deleteNote(btn.dataset.del);
      });
    });
    $('totalCount').textContent = filtered.length;
  }

  function openNote(id) {
    if (currentId && currentId !== id) saveCurrent(true);
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentId = id;
    $('noteTitle').value = note.title || '';
    $('codeTextarea').value = note.content || '';
    $('langSelect').value = note.lang || 'plaintext';
    $('emptyState').style.display = 'none';
    $('codeContainer').style.display = 'flex';
    $('deleteBtn').style.display = '';
    updateHighlight();
    updateStats();
    renderSidebar();
    $('codeTextarea').focus();
  }

  function newNote() {
    saveCurrent(true);
    const note = {
      id: Date.now().toString(36) + Math.random().toString(36).substr(2,7),
      title: '', content: '', lang: 'html', updated: Date.now()
    };
    notes.unshift(note); saveNotes();
    openNote(note.id);
    toast('+ New note created');
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id); saveNotes();
    if (currentId === id) { currentId = null; clearEditor(); }
    renderSidebar();
    toast('Note deleted');
  }

  function clearEditor() {
    $('noteTitle').value = '';
    $('codeTextarea').value = '';
    $('codeHighlight').textContent = '';
    currentId = null;
    $('emptyState').style.display = 'flex';
    $('codeContainer').style.display = 'none';
    $('deleteBtn').style.display = 'none';
    updateStats();
  }

  function saveCurrent(silent) {
    if (!currentId) return;
    const note = notes.find(n => n.id === currentId);
    if (!note) return;
    note.title = $('noteTitle').value.trim();
    note.content = $('codeTextarea').value;
    note.lang = $('langSelect').value;
    note.updated = Date.now();
    saveNotes();
    if (!silent) toast('Saved');
    renderSidebar();
  }

  function autoSave() {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => { if (currentId) saveCurrent(true); }, 2000);
  }

  // SYNTAX HIGHLIGHT
  function updateHighlight() {
    const code = $('codeTextarea').value;
    const lang = $('langSelect').value;
    let result;
    try {
      result = lang === 'plaintext' ? escHtml(code) : hljs.highlight(code, {language: lang, ignoreIllegals: true}).value;
    } catch(e) { result = escHtml(code); }
    $('codeHighlight').innerHTML = result;
    syncScroll();
    drawGutter();
  }

  function syncScroll() {
    const pre = $('codeHighlight').parentElement;
    pre.scrollTop = $('codeTextarea').scrollTop;
    pre.scrollLeft = $('codeTextarea').scrollLeft;
    $('gutter').scrollTop = $('codeTextarea').scrollTop;
  }

  function drawGutter() {
    const lines = $('codeTextarea').value.split('\n');
    $('gutter').innerHTML = lines.map((_,i) => `<span>${i+1}</span>`).join('');
  }

  // COPY
  async function copyCode() {
    const code = $('codeTextarea').value;
    if (!code.trim()) { toast('Nothing to copy'); return; }
    try {
      await navigator.clipboard.writeText(code);
      const btn = $('copyBtn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy', 2000);
      toast('Copied to clipboard');
    } catch(e) { toast('Copy failed'); }
  }

  // STATS
  function updateStats() {
    const code = $('codeTextarea').value;
    $('lineCount').textContent = code.split('\n').length;
    $('charCount').textContent = code.length;
  }

  // UTILS
  function escHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
  function toast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    $('toastBox').appendChild(t); setTimeout(() => t.remove(), 2500);
  }

  // SIDEBAR MOBILE
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }

  // EVENTS
  $('menuBtn').addEventListener('click', openSidebar);
  overlay.addEventListener('click', closeSidebar);

  $('filterRow').addEventListener('click', (e) => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    filterLang = chip.dataset.lang;
    renderSidebar();
  });

  $('searchInput').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderSidebar();
  });

  $('saveBtn').addEventListener('click', () => saveCurrent());
  $('deleteBtn').addEventListener('click', () => { if (currentId) deleteNote(currentId); });
  $('copyBtn').addEventListener('click', copyCode);

  $('noteTitle').addEventListener('input', autoSave);
  $('langSelect').addEventListener('change', () => { updateHighlight(); autoSave(); });
  $('codeTextarea').addEventListener('input', () => { updateHighlight(); updateStats(); autoSave(); });
  $('codeTextarea').addEventListener('scroll', () => { syncScroll(); });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey||e.metaKey) && e.key === 's') { e.preventDefault(); saveCurrent(); }
    if ((e.ctrlKey||e.metaKey) && e.key === 'n') { e.preventDefault(); newNote(); }
  });

  // Tab support
  $('codeTextarea').addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const ta = $('codeTextarea');
      const s = ta.selectionStart;
      ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = s + 2;
      updateHighlight(); updateStats();
    }
  });

  // INIT
  if (notes.length > 0) openNote(notes[0].id);
  renderSidebar();
})();
</script>
</body>
</html>
