<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevPath 180 • Notes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg: #000;
      --card: #1a1a24;
      --border: #2a2a36;
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --green: #30d158;
      --red: #ff453a;
      --radius: 14px;
      --font: -apple-system, 'SF Pro Text', sans-serif;
      --mono: 'SF Mono', 'JetBrains Mono', monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{
      font-family:var(--font);background:var(--bg);color:var(--text);
      display:flex;overflow:hidden;-webkit-font-smoothing:antialiased;
      user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
    }
    .app{flex:1;display:flex;flex-direction:column;height:100%}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:14px}
    .login-title{font-size:1.6rem;font-weight:700;text-align:center;color:var(--accent)}
    .input-field{background:#1c1c2e;border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:12px;font-size:1rem;outline:none}
    .error-msg{color:var(--red);font-size:0.85rem;text-align:center;min-height:20px}

    .home-view{display:flex;flex-direction:column;flex:1;padding:16px;overflow-y:auto}
    .home-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .home-title{font-size:1.7rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .home-new-btn{width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.8rem;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .home-tools{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .search-input{flex:1;min-width:150px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:0.9rem;outline:none}
    .search-input::placeholder{color:var(--secondary)}
    .filter-chip{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--secondary);cursor:pointer;font-size:0.8rem;font-weight:600}
    .filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
    .note-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer}
    .note-card .title{font-weight:600;font-size:0.9rem}
    .note-card .lang{font-size:0.65rem;color:var(--accent);background:rgba(10,132,255,0.15);padding:2px 8px;border-radius:4px;margin-top:6px;display:inline-block}
    .note-card .del-btn{margin-top:8px;background:none;border:none;color:var(--secondary);cursor:pointer;font-size:0.8rem}
    .note-card .del-btn:hover{color:var(--red)}
    .dashboard-link{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-weight:500;margin-top:16px}

    .editor-view{display:none;flex-direction:column;flex:1}
    .editor-view.active{display:flex}
    .navbar{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
    .back-btn{background:none;border:none;color:var(--accent);font-size:1rem;cursor:pointer}
    .title-input{flex:1;background:transparent;border:none;font-size:1.1rem;font-weight:600;color:var(--text);outline:none}
    .title-input::placeholder{color:var(--secondary)}
    .code-area{flex:1;position:relative;overflow:hidden}
    .code-stage{position:absolute;inset:8px 8px 8px 48px;display:flex}
    .code-layer{flex:1;font-family:var(--mono);font-size:0.9rem;line-height:1.7;white-space:pre-wrap;overflow:auto;border:none;outline:none;background:transparent}
    .code-textarea{color:#f5f5f7;caret-color:var(--accent);resize:none;z-index:2}
    .code-preview{pointer-events:none;z-index:1;position:absolute;top:0;left:0;right:0;bottom:0}
    .code-preview code{background:transparent!important}
    .line-numbers{position:absolute;left:4px;top:8px;bottom:8px;width:36px;font-family:var(--mono);font-size:0.8rem;color:var(--secondary);text-align:right;overflow:hidden;z-index:3;pointer-events:none;line-height:1.7;padding-right:6px}
    .line-numbers span{display:block}
    .live-preview{position:absolute;inset:0;border:none;background:#fff;display:none;z-index:10}
    .live-preview.active{display:block}

    .bottom-bar{display:flex;align-items:center;gap:6px;padding:8px 16px;border-top:1px solid var(--border);flex-shrink:0;overflow-x:auto}
    .lang-picker{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:20px;font-size:0.8rem;outline:none;cursor:pointer}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:0.8rem;font-weight:500;cursor:pointer;white-space:nowrap}
    .btn.save{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn.copy{color:var(--green)}
    .btn.delete{color:var(--red)}
    .status-bar{padding:4px 16px;display:flex;justify-content:space-between;font-size:0.7rem;color:var(--secondary);font-family:var(--mono)}

    .toast-panel{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
    .toast{background:var(--card);border:1px solid var(--border);padding:10px 20px;border-radius:20px;font-weight:500;font-size:0.85rem;text-align:center;animation:toastIn 0.4s ease}
    @keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}

    @media(min-width:769px){.app{flex-direction:row;max-width:1000px;margin:0 auto}}
    @media(max-width:480px){.notes-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-title">DevPath Notes</div>
      <input type="email" class="input-field" id="emailInput" placeholder="Email">
      <input type="password" class="input-field" id="passwordInput" placeholder="Password">
      <div class="error-msg" id="loginError"></div>
      <button class="btn save" id="loginBtn" style="width:100%;justify-content:center;padding:12px">Sign In</button>
      <button class="btn" id="registerBtn" style="width:100%;justify-content:center;padding:12px">Create Account</button>
    </div>
  </div>

  <!-- HOME -->
  <div class="home-view" id="homeView" style="display:none">
    <div class="home-header">
      <span class="home-title">Notes</span>
      <button class="home-new-btn" id="homeNewBtn">+</button>
    </div>
    <div class="home-tools">
      <input type="text" class="search-input" id="homeSearch" placeholder="Search notes...">
      <button class="filter-chip active" data-lang="all">All</button>
      <button class="filter-chip" data-lang="html">HTML</button>
      <button class="filter-chip" data-lang="css">CSS</button>
      <button class="filter-chip" data-lang="javascript">JS</button>
      <button class="filter-chip" data-lang="python">Python</button>
    </div>
    <div class="notes-grid" id="notesGrid"></div>
    <a href="index.html" class="dashboard-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Dashboard
    </a>
  </div>

  <!-- EDITOR -->
  <div class="editor-view" id="editorView">
    <div class="navbar">
      <button class="back-btn" id="editorBackBtn">← Back</button>
      <input type="text" class="title-input" id="noteTitle" placeholder="Note title">
    </div>
    <div class="code-area">
      <div class="line-numbers" id="lineNums"><span>1</span></div>
      <div class="code-stage" id="codeStage">
        <textarea class="code-layer code-textarea" id="codeTextarea" placeholder="Write code…" spellcheck="false"></textarea>
        <pre class="code-layer code-preview"><code class="hljs" id="codeHighlight"></code></pre>
      </div>
      <iframe class="live-preview" id="livePreview" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
    <div class="bottom-bar">
      <select class="lang-picker" id="langPicker">
        <option value="html">HTML</option><option value="css">CSS</option>
        <option value="javascript">JavaScript</option><option value="python">Python</option>
        <option value="sql">SQL</option><option value="json">JSON</option>
        <option value="plaintext">Plain Text</option>
      </select>
      <button class="btn" id="undoBtn" disabled>↩</button>
      <button class="btn" id="redoBtn" disabled>↪</button>
      <button class="btn" id="previewBtn">👁</button>
      <button class="btn copy" id="copyBtn">📋 Copy</button>
      <button class="btn delete" id="deleteBtn">🗑 Delete</button>
      <button class="btn save" id="saveBtn">💾 Save</button>
    </div>
    <div class="status-bar">
      <span id="lineCount">Ln 1</span>
      <span id="charCount">0 chars</span>
    </div>
  </div>
</div>

<div class="toast-panel" id="toastPanel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function(){
  const firebaseConfig = {
    apiKey: "AIzaSyAszFGDs1J92_53jHvj5aABmeiKZdc-mf0",
    authDomain: "gen-lang-client-0501601606.firebaseapp.com",
    projectId: "gen-lang-client-0501601606",
    storageBucket: "gen-lang-client-0501601606.firebasestorage.app",
    messagingSenderId: "1079712784218",
    appId: "1:1079712784218:web:598465155aa70938a6dd63"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let notes = [], currentId = null, filterLang = 'all', searchTerm = '', isPreview = false;
  const $ = id => document.getElementById(id);

  // ── Undo/Redo ──
  let undoStack = [], redoStack = [], lastSavedState = '';
  function pushUndo(){ const t=$('codeTextarea'); if(t&&t.value!==lastSavedState){ undoStack.push(lastSavedState); if(undoStack.length>100)undoStack.shift(); redoStack=[]; lastSavedState=t.value; updateUR(); } }
  function apply(s){ $('codeTextarea').value=s; lastSavedState=s; refresh(); stats(); lines(); updateUR(); }
  function undo(){ if(!undoStack.length)return; redoStack.push($('codeTextarea').value); apply(undoStack.pop()); autosave(); }
  function redo(){ if(!redoStack.length)return; undoStack.push($('codeTextarea').value); apply(redoStack.pop()); autosave(); }
  function updateUR(){ $('undoBtn').disabled=!undoStack.length; $('redoBtn').disabled=!redoStack.length; }

  // ── Auth ──
  auth.onAuthStateChanged(async u=>{
    if(u){ $('loginScreen').style.display='none'; $('homeView').style.display='flex'; await load(); }
    else{ $('loginScreen').style.display='flex'; $('homeView').style.display='none'; editorView.classList.remove('active'); }
  });
  $('loginBtn').onclick=async()=>{try{await auth.signInWithEmailAndPassword($('emailInput').value,$('passwordInput').value)}catch(e){$('loginError').textContent=e.message}};
  $('registerBtn').onclick=async()=>{try{await auth.createUserWithEmailAndPassword($('emailInput').value,$('passwordInput').value)}catch(e){$('loginError').textContent=e.message}};

  // ── Firestore ──
  async function load(){ if(!auth.currentUser)return; const s=await db.collection('users').doc(auth.currentUser.uid).collection('notes').orderBy('updated','desc').get(); notes=s.docs.map(d=>({id:d.id,...d.data()})); renderHome(); }
  async function cloud(n){ if(!auth.currentUser)return; await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(n.id).set(n,{merge:true}); }
  async function delCloud(id){ if(!auth.currentUser)return; await db.collection('users').doc(auth.currentUser.uid).collection('notes').doc(id).delete(); }

  // ── Home ──
  function renderHome(){
    let f=[...notes];
    if(filterLang!=='all')f=f.filter(n=>n.lang===filterLang);
    if(searchTerm.trim()){ const q=searchTerm.toLowerCase(); f=f.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q)); }
    f.sort((a,b)=>b.updated-a.updated);
    const g=$('notesGrid');
    g.innerHTML=f.length?f.map(n=>`<div class="note-card" data-id="${n.id}"><div class="title">${esc(n.title||'Untitled')}</div><span class="lang">${n.lang||'txt'}</span><button class="del-btn" data-del="${n.id}">Delete</button></div>`).join(''):'<div style="padding:60px;text-align:center;color:var(--secondary);grid-column:1/-1">No notes yet.<br>Tap + to create.</div>';
    g.querySelectorAll('.note-card').forEach(c=>c.onclick=e=>{if(!e.target.closest('[data-del]'))open(c.dataset.id)});
    g.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{e.stopPropagation();if(confirm('Delete?')){notes=notes.filter(n=>n.id!==b.dataset.del);delCloud(b.dataset.del);renderHome();toast('Deleted')}});
  }

  function open(id){
    const n=notes.find(x=>x.id===id); if(!n)return;
    currentId=id; $('noteTitle').value=n.title||''; $('codeTextarea').value=n.content||''; $('langPicker').value=n.lang||'plaintext';
    $('homeView').style.display='none'; editorView.classList.add('active'); switchCode();
    refresh(); stats(); lines(); undoStack=[]; redoStack=[]; lastSavedState=n.content||''; updateUR();
  }

  // زر + يعمل الآن
  async function newNote(){
    if(!auth.currentUser){ toast('Please sign in'); return; }
    const note={id:Date.now().toString(36)+Math.random().toString(36).substr(2,7),title:'',content:'',lang:'html',updated:Date.now()};
    const ref=await db.collection('users').doc(auth.currentUser.uid).collection('notes').add(note);
    note.id=ref.id; notes.unshift(note);
    open(note.id); toast('New note');
  }

  function close(){
    if(currentId){ const n=notes.find(x=>x.id===currentId); if(n){n.title=$('noteTitle').value.trim();n.content=$('codeTextarea').value;n.lang=$('langPicker').value;n.updated=Date.now();cloud(n);} }
    currentId=null; editorView.classList.remove('active'); $('homeView').style.display='flex';
    $('noteTitle').value=''; $('codeTextarea').value=''; $('codeHighlight').textContent=''; switchCode(); renderHome();
  }

  function saveClose(){
    if(!currentId){ toast('Saving…'); setTimeout(()=>{if(currentId){const n=notes.find(x=>x.id===currentId);if(n){n.title=$('noteTitle').value.trim();n.content=$('codeTextarea').value;n.lang=$('langPicker').value;n.updated=Date.now();cloud(n);}}close();},200); return; }
    const n=notes.find(x=>x.id===currentId); if(!n)return;
    n.title=$('noteTitle').value.trim(); n.content=$('codeTextarea').value; n.lang=$('langPicker').value; n.updated=Date.now();
    cloud(n); toast('Saved'); close();
  }

  async function delCur(){ if(!currentId||!confirm('Delete?'))return; await delCloud(currentId); notes=notes.filter(n=>n.id!==currentId); close(); }

  // ── Preview ──
  function switchPreview(){ isPreview=true; $('codeStage').style.display='none'; $('livePreview').classList.add('active'); updatePreview(); }
  function switchCode(){ isPreview=false; $('codeStage').style.display='flex'; $('livePreview').classList.remove('active'); }
  function updatePreview(){ if(!isPreview)return; const c=$('codeTextarea').value,l=$('langPicker').value; let h=c; if(l==='css')h=`<!DOCTYPE html><html><head><style>${c}</style></head><body></body></html>`; else if(l==='javascript')h=`<!DOCTYPE html><html><body><script>${c}<\/script></body></html>`; else if(l==='html'&&!c.includes('<!DOCTYPE'))h=`<!DOCTYPE html><html>${c}</html>`; $('livePreview').srcdoc=h; }

  // ── Highlight ──
  function refresh(){ const c=$('codeTextarea').value,l=$('langPicker').value; let o; try{o=l==='plaintext'?esc(c):hljs.highlight(c,{language:l,ignoreIllegals:true}).value}catch(e){o=esc(c)} $('codeHighlight').innerHTML=o; sync(); }
  function sync(){ const p=$('codeHighlight').parentElement,t=$('codeTextarea'); if(!p||!t)return; p.scrollTop=t.scrollTop; p.scrollLeft=t.scrollLeft; }
  function lines(){ const ls=$('codeTextarea').value.split('\n'); $('lineNums').innerHTML=ls.map((_,i)=>`<span>${i+1}</span>`).join(''); $('lineNums').scrollTop=$('codeTextarea').scrollTop; }
  function stats(){ const c=$('codeTextarea').value; $('charCount').textContent=c.length+' chars'; $('lineCount').textContent='Ln '+c.split('\n').length; }
  function autosave(){ if(!currentId)return; const n=notes.find(x=>x.id===currentId); if(n){n.content=$('codeTextarea').value;cloud(n);} }
  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function toast(m){ const t=document.createElement('div'); t.className='toast'; t.textContent=m; $('toastPanel').appendChild(t); setTimeout(()=>t.remove(),2200); }

  // ── Events ──
  $('homeNewBtn').addEventListener('click', newNote);
  $('editorBackBtn').addEventListener('click', close);
  $('saveBtn').addEventListener('click', saveClose);
  $('deleteBtn').addEventListener('click', delCur);
  $('copyBtn').addEventListener('click', async()=>{try{await navigator.clipboard.writeText($('codeTextarea').value);toast('Copied!')}catch(e){toast('Copy failed')}});
  $('previewBtn').addEventListener('click', ()=>isPreview?switchCode():switchPreview());
  $('undoBtn').addEventListener('click', undo);
  $('redoBtn').addEventListener('click', redo);

  $('codeTextarea').addEventListener('input', ()=>{
    refresh(); stats(); lines(); autosave();
    if(isPreview)updatePreview();
    clearTimeout(window._ud); window._ud=setTimeout(pushUndo,500);
  });
  $('codeTextarea').addEventListener('scroll', ()=>{sync();lines();});
  $('homeSearch').addEventListener('input', e=>{searchTerm=e.target.value;renderHome();});
  document.querySelectorAll('.filter-chip').forEach(c=>c.addEventListener('click',()=>{document.querySelectorAll('.filter-chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');filterLang=c.dataset.lang;renderHome();}));
  $('noteTitle').addEventListener('input', ()=>{if(currentId){const n=notes.find(x=>x.id===currentId);if(n){n.title=$('noteTitle').value;cloud(n);}}});
  $('langPicker').addEventListener('change', ()=>{refresh();if(currentId){const n=notes.find(x=>x.id===currentId);if(n){n.lang=$('langPicker').value;cloud(n);}}if(isPreview)updatePreview();});

  document.addEventListener('keydown', e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveClose();}
    if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();newNote();}
    if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
    if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
  });

  $('codeTextarea').addEventListener('keydown', function(e){
    if(e.key==='Tab'){e.preventDefault();pushUndo();const t=this,s=t.selectionStart;t.setRangeText('  ',s,t.selectionEnd,'end');t.selectionStart=t.selectionEnd=s+2;refresh();stats();lastSavedState=t.value;return}
    const p={'(':')','[':']','{':'}','"':'"',"'":"'",'`':'`'};
    if(p[e.key]){e.preventDefault();pushUndo();const s=this.selectionStart;this.setRangeText(e.key+p[e.key],s,this.selectionEnd,'end');this.selectionStart=this.selectionEnd=s+1;refresh();stats();lastSavedState=this.value}
  });

  renderHome();
})();
</script>
</body>
</html>
