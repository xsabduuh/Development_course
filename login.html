<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevPath 180 • Login</title>
  <!-- نفس إعدادات Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <style>
    :root {
      --bg: #000;
      --card: #1a1a24;
      --border: #2a2a36;
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --red: #ff453a;
      --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --radius: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    .login-title {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      color: var(--accent);
    }
    .input-field {
      background: #1c1c2e;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
    }
    .error-msg {
      color: var(--red);
      font-size: 0.85rem;
      text-align: center;
      min-height: 20px;
    }
    .btn {
      padding: 10px 16px;
      border-radius: 20px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:active { background: #409cff; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:active { background: rgba(255,255,255,0.05); }
    .divider {
      text-align: center;
      color: var(--secondary);
      font-size: 0.8rem;
      margin: 8px 0;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">DevPath 180</div>
    <input type="email" class="input-field" id="emailInput" placeholder="Email" autocomplete="email">
    <input type="password" class="input-field" id="passwordInput" placeholder="Password" autocomplete="current-password">
    <div class="error-msg" id="loginError"></div>
    <button class="btn btn-primary" id="loginBtn">Sign In</button>
    <button class="btn btn-outline" id="registerBtn">Create Account</button>
    <div class="divider">or</div>
    <a href="index.html" style="text-align:center; font-size:0.9rem;">← Back to Dashboard (if already logged in)</a>
  </div>

  <script>
    // إعدادات Firebase (نفس الإعدادات)
    const firebaseConfig = {
      apiKey: "AIzaSyAszFGDs1J92_53jHvj5aABmeiKZdc-mf0",
      authDomain: "gen-lang-client-0501601606.firebaseapp.com",
      projectId: "gen-lang-client-0501601606",
      storageBucket: "gen-lang-client-0501601606.firebasestorage.app",
      messagingSenderId: "1079712784218",
      appId: "1:1079712784218:web:598465155aa70938a6dd63",
      measurementId: "G-CRHRGYX74V"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // إذا كان المستخدم مسجلاً بالفعل، ننتقل مباشرة للوحة التحكم
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = 'index.html';
      }
    });

    const email = document.getElementById('emailInput');
    const password = document.getElementById('passwordInput');
    const error = document.getElementById('loginError');

    document.getElementById('loginBtn').addEventListener('click', async () => {
      try {
        await auth.signInWithEmailAndPassword(email.value, password.value);
        window.location.href = 'index.html';
      } catch(e) {
        error.textContent = e.message;
      }
    });

    document.getElementById('registerBtn').addEventListener('click', async () => {
      try {
        await auth.createUserWithEmailAndPassword(email.value, password.value);
        window.location.href = 'index.html';
      } catch(e) {
        error.textContent = e.message;
      }
    });
  </script>
</body>
</html>
