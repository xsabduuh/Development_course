<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevPath 180 • Login</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: rgba(26, 26, 36, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f5f5f7;
      --secondary: #8e8e93;
      --accent: #0a84ff;
      --accent2: #409cff;
      --red: #ff453a;
      --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --radius: 16px;
      --glass-bg: rgba(30, 30, 46, 0.5);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* خلفية متحركة بنبضات ناعمة */
    .background {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(ellipse at 50% 50%, rgba(10, 132, 255, 0.15) 0%, transparent 70%);
      animation: bgPulse 8s ease-in-out infinite;
    }

    @keyframes bgPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .login-card {
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
      animation: cardEntry 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardEntry {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-title {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), #5e5ce6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: var(--secondary);
      font-size: 0.9rem;
      margin-top: -12px;
    }

    .input-group {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      width: 20px;
      height: 20px;
      color: var(--secondary);
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-field {
      width: 100%;
      background: rgba(28, 28, 46, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      padding: 14px 16px 14px 48px;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.15);
      background: rgba(28, 28, 46, 0.9);
    }

    .input-field:focus + .input-icon,
    .input-field:focus ~ .input-icon {
      color: var(--accent);
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      width: 22px;
      height: 22px;
      color: var(--secondary);
      cursor: pointer;
      background: none;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: var(--accent);
    }

    .error-msg {
      color: var(--red);
      font-size: 0.85rem;
      text-align: center;
      min-height: 20px;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .btn {
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 8px 20px rgba(10, 132, 255, 0.3);
    }

    .btn-primary:hover {
      background: var(--accent2);
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(10, 132, 255, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(10, 132, 255, 0.2);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .btn-outline:active {
      transform: translateY(0);
      background: rgba(255, 255, 255, 0.1);
    }

    .divider {
      text-align: center;
      color: var(--secondary);
      font-size: 0.8rem;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      text-align: center;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #fff;
    }

    @media (max-width: 480px) {
      .login-card {
        margin: 20px;
        padding: 28px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="login-card">
    <div class="login-title">DevPath 180</div>
    <p class="subtitle">Welcome back! Sign in to continue</p>

    <!-- Email Field -->
    <div class="input-group">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M22 4L12 13 2 4"/>
      </svg>
      <input type="email" class="input-field" id="emailInput" placeholder="Email" autocomplete="email">
    </div>

    <!-- Password Field with Toggle -->
    <div class="input-group">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <input type="password" class="input-field" id="passwordInput" placeholder="Password" autocomplete="current-password">
      <button class="password-toggle" id="togglePassword" type="button" aria-label="Toggle password visibility">
        <!-- Eye icon (open) -->
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div class="error-msg" id="loginError"></div>

    <button class="btn btn-primary" id="loginBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h6v6"/>
        <path d="M10 14L21 3"/>
        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
      </svg>
      Sign In
    </button>

    <div class="divider">or</div>

    <button class="btn btn-outline" id="registerBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="8.5" cy="7" r="4"/>
        <line x1="20" y1="8" x2="20" y2="14"/>
        <line x1="23" y1="11" x2="17" y2="11"/>
      </svg>
      Create Account
    </button>

    <a href="index.html" class="back-link">← Back to Dashboard</a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAszFGDs1J92_53jHvj5aABmeiKZdc-mf0",
      authDomain: "gen-lang-client-0501601606.firebaseapp.com",
      projectId: "gen-lang-client-0501601606",
      storageBucket: "gen-lang-client-0501601606.firebasestorage.app",
      messagingSenderId: "1079712784218",
      appId: "1:1079712784218:web:598465155aa70938a6dd63",
      measurementId: "G-CRHRGYX74V"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // توجيه المسجلين مباشرة
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = 'index.html';
      }
    });

    const email = document.getElementById('emailInput');
    const password = document.getElementById('passwordInput');
    const error = document.getElementById('loginError');
    const toggleBtn = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    // Toggle password visibility
    toggleBtn.addEventListener('click', () => {
      const isPassword = password.type === 'password';
      password.type = isPassword ? 'text' : 'password';

      // Change icon
      if (isPassword) {
        // Show eye-off icon
        eyeIcon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        // Show eye icon
        eyeIcon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    });

    // Sign In
    document.getElementById('loginBtn').addEventListener('click', async () => {
      error.textContent = '';
      try {
        await auth.signInWithEmailAndPassword(email.value, password.value);
        window.location.href = 'index.html';
      } catch(e) {
        error.textContent = e.message;
      }
    });

    // Create Account
    document.getElementById('registerBtn').addEventListener('click', async () => {
      error.textContent = '';
      try {
        await auth.createUserWithEmailAndPassword(email.value, password.value);
        window.location.href = 'index.html';
      } catch(e) {
        error.textContent = e.message;
      }
    });
  </script>
</body>
</html>
